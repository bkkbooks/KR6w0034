body:
  text: 智山沙門釋龍謙撰四門分別略有等者第三四門大於中二初摽列二釋此中草二𫨻四諦等者第一四諦分別於中二初列名出體二至法分別論一三丁草八初丁集異門足論六十二丁品類足論七三丁十二十六丁十八八丁婆沙七十七五丁云云若諦謂有漏果者出體論云此中果性取薀名為苦諦文婆沙七十七六丁評家云若隨自相續五薀若隨他相續五薀若有情數及無情數諸薀如是一切皆是苦諦文通迫者釋苦義七十七十二丁云何苦集滅道各有何相脅尊者曰逼迫是苦相生長是集相寂靜是滅相出離是道相尊者世友云云復作是說云云大德說云云諦者姣七十七七丁云問何故名諦諦是何義實義是諦真義如義不顛倒義無虛誑義是諦義云云二集等者招集者釋集義有漏因者出體論云因性取薀名為集諦出體是能集故辨相如婆沙釋集相前引出體釋婆沙七十七七丁評家云若隨自相續五蘊因若隨他相續五蘊因若有情數及無情數諸蘊因如是一切皆是集是集諦文三滅等者生死斷故者并滅義謂擇滅者出體滅相上引婆沙見出體婆沙七十七七丁評家云若隨自相續五蘊尽若隨他相續五蘊尽若有情數及無情數諸蘊尽如是一切皆是滅是滅諦文四道等者通行義故者釋道義論草五十一丁云道於余處立通行以能通建輒濕拌故文謂無漏道者出體道相上引婆沙見出體姣七十七七丁評家云若隨自相續五蘊對治若隨他相續五蘊對治若有情數及無情諸蘊對治如是一切皆是道是道諦文又四諦建立姣七十七七丁聖諦義七十八三丁論草二三丁四諦次第㕝七十八十二丁論草二初丁無表心王等者道俱無表道諦定俱及散無表若集諦無漏第六意𧥾道諦余者有漏意𧥾者若集諦善地法大地法尋伺得四相無漏一分道諦有漏一分苦諦擇滅一種唯滅諦者三界九地一切擇滅唯諦余等者余四十三謂除無表余色大地小惑貪瞋慢疑𢙣作除得四相余九不相應余分有漏故通苦集諦此四十三唯有漏故不通道諦有為故不通滅諦也虛空非擇滅此四諦攝如前釋也者此章本十二丁又如上姣引四諦體私圖四食等者第二四食此中二初列名釋食義二經法分別論十十二丁婆沙百草二十四丁集異門足論八八丁品類足論七五丁正理卅二丁顯宗十五十丁云云𫨻食釋名論十十三丁云可成𫨻別而飲噉故以口鼻分分受之文婆沙百卅九三丁問𫨻食何義分𫨻而食故名𫨻食云云食體婆沙百卅九十五丁問食體是何是十六㕝於中十三㕝是𫨻食體即十一觸及香味觸處觸思義識三是余食體薀界處根者是十一界五處三薀少分所攝云云資糧名食者婆沙百廾九十五丁云何故名食食何義牽有義是食義續有義持有義義生有義養有義增有義是食義此四於有能牽乃至能增故名食文四身繫等者第三四身繫於中四初列名二出體三釋身繫義四經法分別發智三初丁集異門足論八六丁婆沙四十八七丁一貪欲等者初列名也欲界五部等木者第二出體婆沙四十八七丁問此四身繫以何為自性以二十八㕝為自性謂貪欲瞋恚身繫各欲界五部為十㕝戒禁取身繫三界各二部為六㕝以實執身繫三界各四部為十二㕝由此四身繫以二十八㕝為自性文種種纏等者第三釋身繫義婆沙四十八七丁問何故名身繫身繫是何義得身義結生義是身繫義云云前二以等者第四經法分別四顛倒等者第四四顛倒釋於中三初列名二出體三經法分別論十九八丁婆沙百四四丁八初丁雜心八下八丁正理四十七七丁顯宗草五九丁初一等者論第一說有說者論第二師也四顛倒體婆沙百四十一丁云云顛倒釋名㕝百四三丁云問何故名顛倒顛倒是何義答于諦理顛倒而轉故名顛倒由此四顛倒惟見苦斷云云四識住等者第五四識住釋此中四初列名二釋識住名三出體四經法分別論八十丁發智論十三草二丁集異門足論八十丁正理草二十三丁顯十二十三丁婆沙卅七三丁識著彼等者第二釋釋名論云識所依著名識住文婆沙三十七四丁云何因緣故說名識住識於己說自性住近住故名識住如馬等住有說此中喜所潤識增長廣大故名識住有說北中愛所潤識攝受不離故名識住有說此中諸有漏識隨順取識生起執著安住增上故名識住文有漏四蘊等者第三出體唯有情類者婆沙百卅七三丁第一說也第二說者亦通非有情類也七十等者第四經法分別四靜慮等者第六四靜慮釋此中三初列名二釋名三經法分別論草六初丁婆沙八十初丁品類足論七三丁十三九丁正理七十七初丁顯卅八初丁由定等者釋名瑜伽論記四上二丁梵云馱衍那此云靜慮通有心無心有漏無漏染依色四地非余地文論草八二丁云依何義故立靜慮名由寂靜能審慮故審慮即是實了知義如說心在定能如實了知文婆沙八十初丁云問何故名靜慮為能斷結故名靜慮為能正觀故名靜慮若能斷諸故名靜慮則無邊色定亦能斷結應名靜慮若能觀心故名靜慮則欲界三摩亦能視正應名靜慮有作是說以能斷結故名靜慮云云復有說者以能正觀故名靜慮云云如是說者要具二義方名靜慮云云又出體婆沙論草初丁四靜慮各有二謂定及生靜慮論第八及婆沙百五十四十五丁九十八十五丁云云四無色等者第七四無色釋此中三初列名二釋名三經法分別論草八二丁婆沙八十三十六丁集異門足論六十四丁品類足七三丁十四初丁正理七十七三丁顯三十八三丁四無色亦有二生及定生姣八十四初丁及世間品說定婆沙八十四初丁及定品說也四中前三加行等者論草八五丁云已釋總名空無色近等緣空等得別名耶不尓云何下三無色如其次第修加行時思無邊空及無邊識無所有故建立三名立第四名由想昧劣謂無明勝想得非想名有昧劣想故名非非想𧈧加行時亦作是論諸想如病如箭如癰若想全無便同癡暗唯有非想非非想中與上相寂靜美妙而不就此加行立名以若結言何緣加行作如是念心應言以於彼處想昧劣故由此昧劣故是立名正因文婆沙八十四二丁釋名又四無色教興因緣婆沙八十三十六丁四無色乃至問何故作此論為止他宗顯正義故或有說無色界有色如分別論者或復有說無色界無色如應理論者云云四緣等者第八四緣釋此中二初釋名出體二經法分別論七初丁品類足七五丁正理十八十七丁顯十十丁婆沙十十五丁十一初丁十六八丁廾一十五丁百九十六十四丁百六十六十七丁百九十七初丁五因性者性言緣種類論七初丁云云等而百卅二十丁百七十二丁無間等者釋名論云此緣生法等而無間依此義立等無間名文謂除無等者出體余文可知四生者第九四生釋此中三初列名二出體三經法分別論八十一丁正理草二草丁顯二十七丁婆沙百二十十七丁論八十一丁頌曰於中有四生有情謂等人謗生具四地獄及諸大十有唯化生鬼通胎化二文四業等者第十四業釋此中二初列名辨相二經法分別論十五十四丁正理四十五丁顯宗草一八丁發智十一二丁品類足七初丁婆沙百十四九丁雜心論三卅丁婆沙百十四九丁已下一說三業復有余四業復有余師五業復有余師八業云云四念等者第十一四念住釋此中三初列名二經法分別三釋名論草三初丁集異門釋論六十丁品類足論七二丁十一十六丁十二初丁正理六十十丁顯卅初丁法薀足四八丁雜心𭇥草四初丁雜心五三丁八下三丁婆沙百四十一初丁百八十五五丁百八十七初丁此四念住體名有三自性相雜所緣別緣別故自性念住以惠為體通聞思冬相雜念住以惠余俱有為體所緣念記以惠所緣諸法為體也四善根等者第十二四善根釋此中四初列名二釋名此惠下三出體四經法分別論草三三丁正理六十一二丁𩔰卅六丁婆沙二至八終諸聖道等者第二釋名論二釋中依第二釋婆沙六八丁五說依第五復次也論云此法如暖立暖法名是能惑薪聖道火前相如火前相故名為暖文進退等者論二釋中依第二釋婆沙六初丁五說論云動善根中北法最勝如人頂故名為頂法或由此是進退兩際如山頂故說名為頂文於四諦等者論二釋中依第一釋論云於四諦理能思可中此故勝故此位忍無退隨故名為忍法文有漏故等者依論論云此有漏故名為世第一法文婆沙三四丁多說皆惠乃至五薀為性者第三出體論草二四丁云如是暖等四種善根念住性故皆惠為體若併助伴皆五薀性然除彼得勿諸聖者暖等善根重現前故文婆沙二八丁世第二法體說六十四丁問如是四種自性云何答皆以五薀為自性尊者妙音說順决擇分有欲界繫色界繫欲界𫡏中下者名暖上者名頂此二自性惟有四種欲界中無隨轉色故色界𫡏中下者名忍上者名為世第一法此二自性皆具五薀色界中有隨轉色故如是說者此四善根皆是色界㝎地修地行聖行法故四自性皆具五薀文得四相皆通四種者得字恐衍字也得非四善根體故論婆娑並得云非四善根體故四向等者第十三四向釋於中四初列名二出體三釋尚名四經法分別論二十三十四丁正理六十四初丁顯宗卅一初丁婆沙五十三七丁五十四七丁四果等者第十四四果釋於中四初列名二釋名三出體四經法分別論草三十四丁草四十六丁集異門足六十五丁品類足十一二丁七四丁法薀足土十七丁集異門五五丁正理六十四初丁顯卅一初丁婆沙四十六十二丁六十六十四丁六十五七丁百四十一十二丁預流果者謂無漏等者第二釋名論草三十七丁云諸無口道總名為流由此為因趣𣵀槃故預言為顯最初至得彼預流故說名預流云云婆沙四十六十四丁問以何義故名預流耶流謂聖道預謂入佊入聖道故名預流云云一者佊住等者論草四初丁云佊往天上一來人間而般𣵀拌名一果遇此以後更無生故或名曰薄貪瞋癡唯余下品貪瞋癡故文下還等者論云必不還生欲界故此或名曰五下結斷𧈧必先斷或二或三然於此時總集斷故文阿羅漢等者論草四十三石云諸有染者所應供故依此義立阿羅漢名婆沙九十四十二丁間何故名阿羅漢應受世間勝供養故名阿羅漢謂世無有情淨命緣非阿羅漢所應受者復次阿羅者謂一切阿羅漢名能害用利惠刀害賊令無余故名阿羅漢復次羅漢無生阿是無義以無生故名阿羅漢彼於諸界諸趣諸生生死法中不復生故復次漢名一切𢙣不善法言阿羅者是遠離義遠離諸𢙣不善法故名阿羅漢此中愚者謂不善業不善者謂一切障善法故說為不善是遠𮥷義如有頌言遠離𢙣不善安住勝義中應受世上供故名阿羅漢文隨其所等者第二出體論草四十六丁頌曰淨道沙門性有為無為果此有八十九解脫道及滅文婆沙六十五八丁百四十一十二丁七十五法等者無表中道俱無表通四果體非余無表心王中無口意識通四果體非余大地法大善法尋伺得四相無口一分通四果體非余擇滅中三界見處斷擇滅通四果體欲界修所斷前六品擇滅除預流果後通三果體欲界修所斷三品擇滅及欲界修道緣縛斷擇滅除前二果通後二果修所斷擇滅除前三果為阿羅漢果也四無畏等者第十五無畏釋于中二初釋名出體二經法分別論草七三丁婆沙世一初丁正理七十五十丁顯卅六十六丁無畏釋名㕝論云如何於智立無畏名此無畏名目無法懼由有智故不怯懼他故無畏名目諸智體理實無畏是智所成不應說言體即是智文婆沙卅一二丁問何故名無畏無畏是何義不法弱義是無畏義不傾動義勇猛義安隱義清淨義鮮白義不驚怖義是無畏義文出體㕝論婆沙云云四無礙解等者第十六四無解釋於中五初列名二略釋名三明建立四出體五經法分別論草七八丁婆沙百八十九丁品類足七五丁正理七十六二丁顯卅七六丁無礙解釋名婆沙百八十九丁問何故名無礙於所智境通達無滯名無礙解云云有說云云有說云云有說云云四無量等者第十七四無量釋于中三初列名二釋名三經法分別論草九初丁婆沙八十一十四丁集異門足六十三丁品類足七三丁十三九丁正理七十九十一丁顯四十初丁緣無量等者論云言無量者無量有情為所緣故引無量福故感無量果故文婆沙八十一十五丁多說有說悲以不害為性者依論草九初丁婆沙八十一十四丁百四十一十石有說以欣等者姣八十一十五丁說有說亦以無嗔為性者論草九初丁云云此章中四無量自性體出若約相應隨標欲界四薀色界五薀也草九初丁云云婆沙八十一十四丁云云四正斷等者第十八正斷釋於中三初列名二經法分別三釋名論草五十二丁正理七十一五丁𩔰草四五丁集異門足六十一丁品類足七二丁婆沙百四十一初丁言正斷等者以下釋名於正修以下文論草五十三丁全文也又婆沙四十一三丁問此四何緣說為正斷由此四種能正斷故云云四神足等者第十九四神足釋於中三初列名二經法三釋名論草五十一丁七理七十一五丁顯卅四五丁集異門足六十一丁品類足七三丁婆沙百四十一五丁言神足者定果等者釋名論草五十三丁云問何緣于定立神足名諸量妙德所依止故有余師說神即是定足謂欲等彼應覺分㕝有十三增欲心故又違經說如契經言吾今為汝說神足等神謂受用種種神境分一為多乃至廣說足謂欲等四三摩地此中佛說定果名神欲等所生等持名定文從因為果當體為名也者謂欲𭄿心觀四字從因立名神足二字從果立名也四通行等者第草四通行釋於中四初列名二釋名三出體四經法分別論草五十一丁從九十三十三丁至九十四八丁品類足十七七丁法薀足二十九丁正理七十一初丁顯卅三十八丁道依根等者第二釋名依論草五十一丁也又婆沙何故名通行是何義通謂達行謂行迹能正通達趣向𣵀拌是通行義苦遲通行義者問聖道非苦受自性亦非苦受相應何故名苦近分無色成辨故所起聖道說名為苦根本靜慮易成辨故所起聖道說名為此廣分別如前結薀四靜慮中問何故聖道說名為遲由鈍根者所起聖道不能速趣究竟𣵀拌故說名遲諸利根者所起聖道疾趣𣵀拌故說名遲文此四通等者第三出體婆沙九十三十三丁七十五法等者第四經法分別無表中唯道俱無表非余心三大地法大善地法尋伺得四相無漏一分非余也四道等者第草一四道釋於中四初列名辨相二釋道義三出體四經法分別論草五十一丁正理七十一初丁顯卅三十八丁所言道者等者第二釋道義論二釋中第一釋也論云道義云何謂𣵀拌路乘此能往涅槃城故或復道者謂求所依依此尋求涅槃故解脫勝進如何名道與道類同轉上品故或前前力至後後故或能趣入無余依故文又婆沙百四十一十丁所履通達故名為道文此四皆等者第三出體七十等者第四經法分別無表中是俱及道俱非余心王大地法大善地法尋伺得四相中加行善學無學非余四證等者第草二四證淨釋此中四初列名二釋名三經法分別四別釋信戒名淨論草五十六丁婆沙百三九丁集異門足論六十七丁品類足十十四丁法蘊足二初丁正理七十二初丁顯卅四十二丁由證等者第二釋名論云為依何義立證淨名如實覺知四聖諦理故名為證正信三寶及妙部羅皆名淨離不信垢破戒垢由證得淨立證淨名文婆沙百三十三丁多說證淨相論釋云且見近見三諦一一唯得法戒證淨見道諦位兼得佛僧謂于尓時兼於成佛諸無學法成羅法僧學無學法亦得證淨兼言為顯見道諦時亦得於法及戒證淨然所位法略有二種一別總總通四辨別唯三諦全𦬇獨學道故見四諦時皆得法證淨聖所受戒與現觀俱故一切時無不亦得由所信別故名有四應知實㕝唯有二種謂于佛果等三種證淨以信為體聖戒證淨以戒為體故唯有二如是四種唯是無漏以有口法非證淨故云云前三以心等者第三經法分別前三以無漏信為證後一以通俱無表為證也信戒二種等者第四別釋信戒名淨人愚按云信戒二種等十六字文恐錯亂上由證得淨等上置若依此義分別四種淨釋三初列名二釋名信戒二種已下文三經法分別別三已下學者可考五門分別略有等者第四五門分別釋于中二初票列二釋此中十五𫨻五取蘊等者第一𫨻論一五丁集異門足十一十三丁正理一十四丁顯一十四丁從取生故者煩𢙉名取蘊取生故名取薀依主釋能生取故者薀生取故名取薀依主釋北二釋共論依也此𫨻只釋名私經法分別七十五法中色中無表一分定俱及欲無表余十色取薀心王中除無漏有漏心王識取薀心所中受一分有漏受取蘊想一分有漏想取蘊余四十四心所隨應除無口一分有漏分行取薀不相應中得四相一分有漏余九全行取薀三無為非取薀根也五濁等者第二𫨻此中二初釋名出體二經法分別論十二八丁正理卅二十丁顯十七十一丁雜𭇥卅二三丁劫即是時乃至為體者論十二五丁劫惟是何謂五薀文五趣等者第三假此中初列名二釋名三出體四至法分別論八五丁集異門足十一十六丁品類足七二丁正理二十一十三丁顯宗十二七丁聖百七十二二丁光明名天者梵云提婆此云天翻譯名義集章釋婆沙百七十二十二丁天釋名六說中當第四說歟百七十二十二丁二初丁有說光明增故名天以彼自然光恆照晝夜等故文因示天住處百七十二十四丁問諸天住在何處四大衆天位七金山及妙高山層級上并日月星中三十三天住妙高山頂夜摩乃至色究竟天皆在空中密雲如地各有宮殿于中居止差別廣說如大地種薀無色界天無形色故無別住處文論十一九丁云云思慮名人者梵云摩冤舍喃此云人翻名集義二十九丁人釋名有五說中當第一說歟百七十二十二丁云問何故此趣名未奴山沙昔有轉輪王名蔓馱多告諸人曰汝等欲有所作應先思惟量觀察尓時諸人即如王教欲有所作皆先思惟量觀察便於種種工巧業處而得善巧以四能用意思惟視察所作㕝故名未奴沙是已傳立斯先未流此未奴沙時人或相呼以為雲或名多羅脛或名底落迦或名阿沙茶文因示人住處百七十二十二丁問人住何處住四大洲謂膽部洲毗提河洲瞿陀尼洲拘盧洲亦住八中洲何等為八謂抅盧洲有二眷屬一矩拉婆洲二憍拉婆洲毗提河洲有二眷屬一提河洲二蘇提河洲瞿陀𡰱洲有二眷屬一舍𢮎洲二嗢恆羅漫恆里拏洲膽部洲有二眷屬一未羅洲二笩羅末暹洲此八洲中人形短小如此方侏儒有說云云有說云云如是說者應如初說此八中洲一一復有五百十洲以眷屬於中或有人住或非人住或有空者文論十一四丁由飢餓故名為餓鬼者名義集二草四丁云薜荔多廣法師云正言閉麗多此云𥘵人鬼或云餓鬼劣者孔雀至作𤰞𥧌禮多云云章釋婆沙百七十二十丁餓鬼釋名六說中當第四說歟婆沙云有說飢渴增故名鬼云云因示鬼住處婆娑百七十三十丁問鬼住何處膽部洲下五百踰繕那有琰魔王界是一切鬼本所住所彼流轉亦在余處於此門中有二種鬼一有威德二無威德有威德者或住華林果住余清淨受諸福樂無威德者或住厠溷糞壤水竇坑塹之中乃至或住種種雜穢諸不淨所薄福貧窮飢渴所苦東毗或住提河西瞿陀𡰱亦在此二北拘盧洲惟有大威往云云論十一八丁身多橫住名曰傍生者名義集二卅九丁云帝剎耶瞿偷𭰖伽此云傍行云云章釋婆娑百七十二九丁傍生釋名五說中當初說歟婆沙初說云其形旁故行亦旁以行旁形亦旁是故名傍生文因示傍生住處婆沙百七十二十丁云問傍生本住何處本處住處在大海中後眨流轉遍在諸趣文論十一八丁地下有獄名為地獄者頌流云梵云那落迦此云若具義翻為地獄以地下有獄故非正引云云又唯𧥾述記五未八十八丁云捺落迦者此云苦器受罪處也那落迦者受彼苦者故二別也玄應音義云捺落迦奴葛切受苦也或言那落迦受罪人也云云光記八十二丁地下有獄名為地獄此乃義翻梵云那落迦云云婆沙百七十二四丁捺落迦釋多說且初說云是那落迦所趣處故是中有那落迦故名捺落迦彼諸有無悅無愛無味無利無喜樂故名那落迦文因示地獄住所婆沙百七十二六丁問地獄在何所多分在此膽部洲下云何安立有說此洲下四方踰踰繕那至無間地獄底無間地獄縱橫廣高下各二踰繕那次上一万九千踰繕那中安立余七地獄謂次上有極熱地獄次上有熱地獄有大嘷呌地獄次上有嘷叫地獄次上有衆合地獄次上有黑繩地獄次上有等活地獄此七地獄一一縱廣踰繕那次上余有一千踰繕那五百踰繕那是白墡五百踰繕那是𭰖有說云云有說云云有說云云又一一大地獄有十六增乃至如是八大地獄并部眷屬便有一百三十六所云云又云膽部洲下有大地獄膽部洲上亦有邊地獄及獨地獄或有谷中或有山上或在曠野或在空中于余三洲惟有邊地獄獨地獄無大地獄所以者何惟膽部洲人造善猛利彼作𢙣業又復猛利非余洲故有說北抅盧洲亦無邊地獄等是受淳淨業果處故問𠰥余洲無大地獄者彼諸有情造無間業斷善根等當於何所受異熟耶即於此瞻洲部下大地獄受文論十一五丁又因示獄卒說論十一七丁地獄卒非實有情有說有情云云婆娑百七十二七丁二說二十唯識述記上四丁二十八八師等說獄卒等非實有情業生大種相異是𢙣業所感增上大種轉及所生經部師等說𧈧非有情然心外造業熏內識其受果乃在心外大種轉及形顯等大衆部正量等說是實有情今大乘意亦非有情云云趣是所住者婆沙百七十二四丁問何故名趣趣何義所住義是趣義是諸有情所應住所應生結生處故名趣文異熟無記五薀為體者第三出體婆沙評家義也婆沙百七十二二丁問趣體情是何乃至應作是說趣體性是無覆無記乃至有說通三性乃至評曰應說趣體惟是無覆無記云云又大衆部通染善云云光記八十五丁問何素洛何趣所攝依正義是鬼趣攝婆沙百七十二十五丁問阿素洛何趣所攝有說是天趣攝云云如是說者鬼趣攝云云七十等者第四經法分別私圖云五無間等者第四假于中三初列名二釋名三辨相經法分別論十七十五丁正理四十三八丁顯宗草三十丁婆沙百十五十五丁百十六初丁百十九四丁出佛身血者讀習㕝出佛身血訓故音可讀出佛身血依習音讀讀出佛身血訓出音讀出常例今依習也言無間等者第二釋名婆沙百十五十八丁百十九四丁論十七十六丁釋名前三等者第三辨相經法分別五無間體相廣釋論婆沙開見且就破和合僧破法輪僧破羯磨僧差別辨破羯磨者謂一界內有二部僧各各別住作布灑陀羯磨說戒破法論者謂立異師異道如提婆達多言我是大師非沙門喬磨五法是道非喬磨所說八支聖道所以者何若能修習是五法者速證𣵀拌非八支道云何五法一者尽壽著糞掃衣二者尽壽常乞食三者尽壽惟一坐食四者尽壽常居逈露五者尽壽不食一切𩵋肉血鹽酥乳等是破羯磨僧破法輪僧差別婆沙百十六四十丁說又略辨破法輪僧相能破僧者要大苾芻非在家苾芻𡰱等唯見行者非愛行者住淨行人非犯戒者要異處破非對大師唯破異生非破聖者要所破僧忍師異佛忍異佛說有余聖道應說僧破在如是時此夜必和不經宿住唯瞻部人亦至九或復過此能法輪非于余例以無佛故有佛處方有異師要八苾芻分為二衆以為所破能破第九故衆極少于須九人此過無限如是名曰破法轉僧能障聖道壞僧和合故委如論也五根等者第五假此二初列名二釋名論草五十二丁正理七十一五丁顯宗卅四初丁集異門足論十四七丁婆沙百四十一九丁勝用等者釋名依婆沙百四十一九丁論三初丁也不可屈等者第六𫨻五力釋于中二初釋名二出體論二十五十二丁正七十一五丁顯卅四初丁集異門足十四七丁婆沙百四十一九丁不可屈伏名力者釋名依姣釋也出體如等者第二出體也五因等者第七𫨻於中三初列名二釋名三經法分別論一八丁正理草十丁顯宗十一七丁彼等者第二釋名色十一等者第三經法分別也五類等者第八𫨻此中四初列名二釋名三廢立四經法分別論二八丁正理五十四丁顯宗三十四丁應知等者第二釋名於中異熟生釋名初釋依主釋次釋持業釋若據但等者第三廢立色十一等者第四經法分別也五果等者第九𫨻于中三初列名二釋名三經法分別論六十九丁正理十八初丁顯宗九十六丁入阿等者第二釋名色十一等者第三經法分別五蓋等者第十𫨻于中四初列名二辨相三經法四分界繫論草一八丁宗異門足十二初丁發智論三初丁婆沙四十八九丁正理五十五五丁顯宗草八二丁蓋義障義覆義破義壞義隨義卧義是蓋義廣如婆沙唯此等者第二辨相初二後等者第三經法分別皆唯等者第四分界繫也五順下等者第十一𫨻於中四初列名二釋名三經法分別四判界繫論草一二丁發智論三初丁集異門足十二十三丁婆沙四十九二丁正理三十四五丁顯宗草七九丁此五順等者第二釋名章近依論歟婆沙四十九二丁順下分釋名十說且引初說云問何故名順下分結順下分結是何義耶如是五結下界現行下界所斷結下界生取下界等流異熟異故名順下分結下界者謂欲界文婆沙第七說論舉論草一二丁何緣此五名順下分此五順蓋下分界故謂唯欲界得下分名此五於佊能為順蓋由後二種不能超欲界沒有能超由前三還下如守獄卒防羅人故文前二以等者第三經法分別前三通等者第四判界繫也五順上分等者第十二𫨻于中四初列名二釋名三經法分別四諸門分別論草一三丁集異門足十二十四丁發智論三初丁婆沙四十九六丁正理五十四七丁顯宗草七十一丁順蓋上界等者第二釋名依論也姣四十九六丁說以心所等者第三經法分別唯修所斷等者第四諸門分別五分法身等者第十三𫨻于中三初列名出體二釋身名三經法分別婆沙卅三九丁謂無漏戒者謂無學相中身語業道俱無表依地末至中間四靜慮地也謂無漏定者謂無學空無相無願三摩地依地至中間四靜慮下三無色地也謂無漏正見者恐脫智字歟謂無學正見智依地末至中間四靜慮下三無色地也謂無漏勝解者謂無學作意應應心已勝解今勝解當勝解謂尽無生無學正見相應勝解此薀所根故謂尽智無生智者依地未至中間四靜慮下三無色地也解脫身中等者婆沙卅三十三丁問何故此二智名解脫智見蘊解脫身中獨有此故最能審决解脫㕝故文以此五等者二釋身名此五分法身上中下上佛中獨覺下聞也或上利根中中根下鈍根戒身以色等者三經法分別五戒等者第十四𫨻于中三初列名二出體三經法分別論十四卅八丁正理三十六十四丁顯宗十九六丁婆沙百草三十三丁四分行㕝鈔資持記中一四初下至中一五終十三三草九丁僧祗律一草二丁四分律一至二十八丁又十六五丁又五分二十四丁九初丁十誦律二六草乂乂三三丁草八夕論一十二丁三七丁九四丁如制四波羅夷時分依僧祗律說戒佛成道後五年冬分制余三戒並六年冬分制也不殺生者先制戒因緣者佛在毗舍離諸比丘修不淨觀厭身歎死外道比丘提受雇行殺居士驚怖因制也次明犯緣者具五一是人二人想三起殺心四與方便五命斷也犯境唯人也如斷畜命九十草提中第六十一奪畜生命戒犯攝𠂇𠂊二不偷盜者先制因緣者佛在羅閲城檀𡰱迦比丘在靜慮作瓦屋佛令打破遂取王材王臣訶責因制次名釋畏主覺知為喻非理損者為盜不作偷盜云不偷盜也次明犯緣者具五種一要發欲盜放思二於他物中三起他物想四或力或𥨱起盜加行五不誤而取令屬己身必具成犯初緣中有三五丁一盜三寶物二盜人物三盜非畜物四重物中二謂五錢若直五錢即余雜物五錢㕝草八論二十四丁三釋資持記中一五十四丁引往見不欲耶行者今約進士五戒故云不欲耶見名約出家戒不欲也先制戒因緣者佛在毗舍離國須提那子出家已𨗴本村與故二共行不淨因制也次明犯境有人非人無子鬼神等畜生三起據報則男女二形據處則女人王道謂大小便道及口男子二通次明犯緣者二緣一自有心向前境縱有裏隔互障但人如毛頭結成大重具四緣成一是正境男二通女三處二與染心三起方便四與境合便犯二者若為偏或博至前境或就其身佛開身會制令不染亦具四緣一是正境二為𭜨福三與境合四受樂便犯也又欲邪行有四種斷不應行一於非境謂于他妻妾或母或父或父母親乃至或王於所守護境二於非道謂于自妻口及余道三于非處謂于寺中制多逈處四於非時謂懷胎時飲兒乳時受齊戒時設自妻亦犯邪行也不虛誑者先制戒因緣者佛在毗舍離時世穀貴婆求河邊有安居者共相美得上人法遂獲利養佛呵而制也次明犯緣者具九緣一對境是人二人想三境虛四自知境虛五有誑他心六說過人法七自言已證八言章了九前人解十誦多論云得不淨觀已上至四果若云我得皆犯重云次明遠近根本罪文若依明了論四波羅具部有十六罪一一各有四部或十六罪一遠方便如行時先起心未動身口貴心滅二次方便謂動身就彼或口說欲作此對人懺滅通名吉羅三近方便至佊人邊或欲以摩觸身未交前是偷蘭期行㕝故摩觸非為戲樂故成偷蘭不成僧殘此罪對人懺第四身交是根本也不飲酒等者若約比丘大戒中單提中第五十一飲酒戒也先制戒因緣者佛在支陀國婆伽陀比丘際毫示俱睒王得酒飲醉卧路因制也次明犯緣者三緣一是酒二無重病緣三飲咽犯次明制意者多論十二丁云此戒極重能作四逆除破僧又能破一切戒及余衆𢙣故若依五分九丁初丁以降龍故得酒醉衣鉢縱橫佛與阿舁至井邊佛自汲水阿洗之著衣卧於上令頭向佛頃更轉側伸腳踏佛佛集僧言昔日敬佛今不能敬昔伏毒龍今不能降蝦嗼因說漸斷酒制乃至嗔酒器也初三後一等者第三經法分別也身語無表以無表為性者謂身語無表以別解脫無表為性也世五眼等者第十五𫨻于中四初列名二出體三經法分別四釋眼名有部論藏中無五眼列並說大乘觀照等者眼根唯有觀照推度如光二四十八丁云云前引也
