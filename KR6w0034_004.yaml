body:
  text: 智山沙門釈龍謙撰四門分別畧有等者第三四門大於中二初摽列二釈此中廿二𫨻四諦等者第一四諦分別於中二初列名出体二至法分別論一三丁廿八初丁集異門足論六十二丁品類足論七三丁十二十六丁十八八丁婆沙七十七五丁云云若諦謂有漏果者出体論云此中果性取薀名為苦諦文婆沙七十七六丁評家云若隨自相續五薀若隨他相續五薀若有情数及无情数諸薀如是一切皆是苦諦文通迫者釈苦義七十七十二丁云何苦集滅道各有何相脅尊者曰逼迫是苦相生長是集相寂靜是滅相出离是道相尊者世友云云復作是說云云大德說云云諦者㚣七十七七丁云問何故名諦諦是何義實義是諦真義如義不顛倒義無虛誑義是諦義云云二集等者招集者釈集義有漏囙者出体論云因性取薀名為集諦出体是能集故弁相如婆沙釈集相前引出体釈婆沙七十七七丁評家云若隨自相續五蘊囙若隨他相續五蘊囙若有情數及无情数諸蘊囙如是一切皆是集是集諦文三滅等者生死断故者并滅義謂択滅者出体滅相上引婆沙見出体婆沙七十七七丁評家云若隨自相續五蘊尽若隨他相續五蘊尽若有情数及無情数諸蘊尽如是一切皆是滅是滅諦文四道等者通行義故者釈道義論廿五十一丁云道於余処立通行以能通建輙濕拌故文謂無漏道者出体道相上引婆沙見出体㚣七十七七丁評家云若隨自相續五蘊対治若隨他相續五蘊対治若有情数及無情諸蘊対治如是一切皆是道是道諦文又四諦建立㚣七十七七丁聖諦義七十八三丁論廿二三丁四諦次第㕝七十八十二丁論廿二初丁无表心王等者道俱无表道諦定俱及散无表若集諦无漏第六意𧥾道諦余者有漏意𧥾者若集諦善地法大地法尋伺得四相无漏一分道諦有漏一分苦諦択滅一種唯滅諦者三界九地一切択滅唯諦余等者余四十三謂除无表余色大地小惑貪瞋慢疑𢙣作除得四相余九不相應余分有漏故通苦集諦此四十三唯有漏故不通道諦有為故不通滅諦也虛空非択滅此四諦摂如前釈也者此章本十二丁又如上㚣引四諦体私圖四食等者第二四食此中二初列名釈食義二經法分別論十十二丁婆沙百廿二十四丁集異門足論八八丁品類足論七五丁正理卅二丁顕宗十五十丁云云𫨻食釈名論十十三丁云可成𫨻別而飲噉故以口鼻分分受之文婆沙百卅九三丁問𫨻食何義分𫨻而食故名𫨻食云云食体婆沙百卅九十五丁問食体是何是十六㕝於中十三㕝是𫨻食体即十一触及香味触処触思義識三是余食体薀界処根者是十一界五処三薀少分所摂云云資糧名食者婆沙百廾九十五丁云何故名食食何義牽有義是食義續有義持有義義生有義養有義增有義是食義此四於有能牽乃至能增故名食文四身繫等者第三四身繫於中四初列名二出体三釈身繫義四經法分別発智三初丁集異門足論八六丁婆沙四十八七丁一貪欲等者初列名也欲界五部等木者第二出体婆沙四十八七丁問此四身繫以何為自性以二十八㕝為自性謂貪欲瞋恚身繫各欲界五部為十㕝戒禁取身繫三界各二部為六㕝以実執身繫三界各四部為十二㕝由此四身繫以二十八㕝為自性文種種纏等者第三釈身繫義婆沙四十八七丁問何故名身繫身繫是何義得身義結生義是身繫義云云前二以等者第四經法分別四顛倒等者第四四顛倒釈於中三初列名二出体三經法分別論十九八丁婆沙百四四丁八初丁雜心八下八丁正理四十七七丁顕宗廿五九丁初一等者論第一說有說者論第二師也四顛倒体婆沙百四十一丁云云顛倒釈名㕝百四三丁云問何故名顛倒顛倒是何義荅扵諦理顛倒而轉故名顛倒由此四顛倒惟見苦断云云四識住等者第五四識住釈此中四初列名二釈識住名三出体四經法分別論八十丁発智論十三廿二丁集異門足論八十丁正理廿二十三丁顕十二十三丁婆沙卅七三丁識著彼等者第二釈釈名論云識所依著名識住文婆沙三十七四丁云何因緣故說名識住識於己說自性住近住故名識住如馬等住有說此中喜所潤識增長廣大故名識住有說北中愛所潤識摂受不离故名識住有說此中諸有漏識隨順取識生起執著安住增上故名識住文有漏四蘊等者第三出体唯有情類者婆沙百卅七三丁第一說也第二說者亦通非有情類也七十等者第四經法分別四靜慮等者第六四靜慮釈此中三初列名二釈名三經法分別論廿六初丁婆沙八十初丁品類足論七三丁十三九丁正理七十七初丁顕卅八初丁由定等者釈名瑜伽論記四上二丁梵云駄衍那此云靜慮通有心無心有漏无漏染依色四地非余地文論廿八二丁云依何義故立靜慮名由寂靜能審慮故審慮即是實了知義如說心在定能如実了知文婆沙八十初丁云問何故名靜慮為能断結故名靜慮為能正觀故名靜慮若能断諸故名靜慮則无辺色定亦能断結應名靜慮若能觀心故名靜慮則欲界三摩亦能視正應名靜慮有作是說以能断結故名靜慮云云復有說者以能正觀故名靜慮云云如是說者要具二義方名靜慮云云又出体婆沙論廿初丁四靜慮各有二謂定及生靜慮論第八及婆沙百五十四十五丁九十八十五丁云云四无色等者第七四无色釈此中三初列名二釈名三經法分別論廿八二丁婆沙八十三十六丁集異門足論六十四丁品類足七三丁十四初丁正理七十七三丁顕三十八三丁四无色亦有二生及定生㚣八十四初丁及世間品說定婆沙八十四初丁及定品說也四中前三加行等者論廿八五丁云已釈總名空无色近等緣空等得別名耶不尓云何下三无色如其次第修加行時思无辺空及无辺識无所有故建立三名立第四名由想昧劣謂无明勝想得非想名有昧劣想故名非非想𧈧加行時亦作是論諸想如病如箭如癰若想全无便同痴闇唯有非想非非想中与上相寂靜羙妙而不就此加行立名以若結言何緣加行作如是念心應言以於彼処想昧劣故由此昧劣故是立名正囙文婆沙八十四二丁釈名又四无色教興因緣婆沙八十三十六丁四无色乃至問何故作此論為止他宗顕正義故或有說无色界有色如分別論者或復有說无色界无色如応理論者云云四緣等者第八四緣釈此中二初釈名出体二經㳒分別論七初丁品類足七五丁正理十八十七丁顕十十丁婆沙十十五丁十一初丁十六八丁廾一十五丁百九十六十四丁百六十六十七丁百九十七初丁五因性者性言緣種類論七初丁云云等而百卅二十丁百七十二丁無間等者釈名論云此緣生法等而無間依此義立等无間名文謂除无等者出体余文可知四生者第九四生釈此中三初列名二出体三經㳒分別論八十一丁正理廿二廿丁顕二十七丁婆沙百二十十七丁論八十一丁頌曰於中有四生有情謂等人謗生具四地獄及諸大十有唯化生鬼通胎化二文四業等者第十四業釈此中二初列名弁相二經法分別論十五十四丁正理四十五丁顯宗廿一八丁発智十一二丁品類足七初丁婆沙百十四九丁雜心論三卅丁婆沙百十四九丁已下一說三業復有余四業復有余師五業復有余師八業云云四念等者第十一四念住釈此中三初列名二經法分別三釈名論廿三初丁集異門釈論六十丁品類足論七二丁十一十六丁十貳初丁正理六十十丁顕卅初丁法薀足四八丁雜心𭇥廿四初丁雜心五三丁八下三丁婆沙百四十一初丁百八十五五丁百八十七初丁此四念住体名有三自性相雜所緣別緣別故自性念住以惠為体通聞思冬相雜念住以惠余俱有為体所緣念記以惠所緣諸法為体也四善根等者第十二四善根釈此中四初列名二釈名此惠下三出体四經法分別論廿三三丁正理六十一二丁𩔰卅六丁婆沙二至八終諸聖道等者第二釈名論二釈中依第二釈婆沙六八丁五說依第五復次也論云此法如煖立煖法名是能惑薪聖道火前相如火前相故名為煖文進退等者論二釈中依第二釈婆沙六初丁五說論云動善根中北法最勝如人頂故名為頂法或由此是進退両際如山頂故說名為頂文於四諦等者論二釈中依第一釈論云於四諦理能思可中此故勝故此位忍无退隨故名為忍法文有漏故等者依論論云此有漏故名為世第一法文婆沙三四丁多說皆惠乃至五薀為性者第三出体論廿二四丁云如是煖等四種善根念住性故皆惠為体若併助伴皆五薀性然除彼得勿諸聖者煖等善根重現前故文婆沙二八丁世第二法体說六十四丁問如是四種自性云何荅皆以五薀為自性尊者妙音說順决択分有欲界繫色界繫欲界𫡏中下者名煖上者名頂此二自性惟有四種欲界中无隨轉色故色界𫡏中下者名忍上者名為世第一法此二自性皆具五薀色界中有隨轉色故如是說者此四善根皆是色界㝎地修地行聖行法故四自性皆具五薀文得四相皆通四種者得字恐衍字也得非四善根体故論婆娑並得云非四善根体故四向等者第十三四向釈於中四初列名二出体三釈尚名四經法分別論二十三十四丁正理六十四初丁顯宗卅一初丁婆沙五十三七丁五十四七丁四果等者第十四四果釈於中四初列名二釈名三出体四經法分別論廿三十四丁廿四十六丁集異門足六十五丁品類足十一二丁七四丁法薀足土十七丁集異門五五丁正理六十四初丁顕卅一初丁婆沙四十六十二丁六十六十四丁六十五七丁百四十一十二丁預流果者謂无漏等者第二釈名論廿三十七丁云諸无口道總名為流由此為囙趣𣵀槃故預言為顕最初至得彼預流故說名預流云云婆沙四十六十四丁問以何義故名預流耶流謂聖道預謂入佊入聖道故名預流云云一者佊住等者論廿四初丁云佊徃天上一来人間而般𣵀拌名一果遇此以後更无生故或名曰薄貪瞋痴唯余下品貪瞋痴故文下還等者論云必不還生欲界故此或名曰五下結断𧈧必先断或二或三然於此時總集断故文阿罗漢等者論廿四十三石云諸有染者所応供故依此義立阿罗漢名婆沙九十四十二丁間何故名阿羅漢應受世間勝供養故名阿罗漢謂世无有情淨命緣非阿羅漢所應受者復次阿罗者謂一切阿罗漢名能害用利惠刀害賊令无余故名阿罗漢復次罗漢无生阿是无義以无生故名阿罗漢彼於諸界諸趣諸生生死法中不復生故復次漢名一切𢙣不善法言阿罗者是遠離義遠離諸𢙣不善法故名阿罗漢此中愚者謂不善業不善者謂一切障善法故說為不善是遠𮥷義如有頌言遠離𢙣不善安住勝義中應受世上供故名阿罗漢文隨其所等者第二出体論廿四十六丁頌曰淨道沙門性有為无為果此有八十九解脫道及滅文婆沙六十五八丁百四十一十二丁七十五法等者无表中道俱无表通四果体非余无表心王中无口意識通四果体非余大地法大善法尋伺得四相无口一分通四果体非余択滅中三界見処断択滅通四果体欲界修所断前六品択滅除預流果後通三果体欲界修所断三品択滅及欲界修道緣縛断択滅除前二果通後二果修所断択滅除前三果為阿罗漢果也四无畏等者第十五无畏釈扵中二初釈名出体二經法分別論廿七三丁婆沙世一初丁正理七十五十丁顕卅六十六丁无畏釈名㕝論云如何於智立无畏名此无畏名目无法懼由有智故不怯懼他故无畏名目諸智体理実无畏是智所成不応說言体即是智文婆沙卅一二丁問何故名无畏无畏是何義不法弱義是无畏義不傾動義勇猛義安隱義清淨義鮮白義不驚怖義是无畏義文出体㕝論婆沙云云四无碍解等者第十六四无解釈於中五初列名二畧釈名三明建立四出体五經法分別論廿七八丁婆沙百八十九丁品類足七五丁正理七十六二丁顯卅七六丁无碍解釈名婆沙百八十九丁問何故名无碍於所智境通達无滯名无碍觧云云有說云云有說云云有說云云四无量等者第十七四无量釈扵中三初列名二釈名三經法分別論廿九初丁婆沙八十一十四丁集異門足六十三丁品類足七三丁十三九丁正理七十九十一丁顕四十初丁緣无量等者論云言无量者无量有情為所緣故引无量福故感无量果故文婆沙八十一十五丁多說有說悲以不害為性者依論廿九初丁婆沙八十一十四丁百四十一十石有說以欣等者㚣八十一十五丁說有說亦以无嗔為性者論廿九初丁云云此章中四无量自性体出若約相應隨標欲界四薀色界五薀也廿九初丁云云婆沙八十一十四丁云云四正断等者第十八正断釈於中三初列名二經法分別三釈名論廿五十二丁正理七十一五丁𩔰廿四五丁集異門足六十一丁品類足七二丁婆沙百四十一初丁言正断等者以下釈名於正修以下文論廿五十三丁全文也又婆沙四十一三丁問此四何緣說為正断由此四種能正断故云云四神足等者第十九四神足釈於中三初列名二經法三釈名論廿五十一丁七理七十一五丁顕卅四五丁集異門足六十一丁品類足七三丁婆沙百四十一五丁言神足者定果等者釈名論廿五十三丁云問何緣扵定立神足名諸量妙德所依止故有余師說神即是定足謂欲等彼応覚分㕝有十三增欲心故又違經說如契經言吾今為汝說神足等神謂受用種種神境分一為多乃至廣說足謂欲等四三摩地此中佛說定果名神欲等所生等持名定文従因為果當体為名也者謂欲𭄿心觀四字従因立名神足二字従果立名也四通行等者第廿四通行釈於中四初列名二釈名三出体四經法分別論廿五十一丁従九十三十三丁至九十四八丁品類足十七七丁法薀足二十九丁正理七十一初丁顕卅三十八丁道依根等者第二釈名依論廿五十一丁也又婆沙何故名通行是何義通謂達行謂行迹能正通達趣向𣵀拌是通行義苦遲通行義者問聖道非苦受自性亦非苦受相応何故名苦近分无色成弁故所起聖道說名為苦根本靜慮易成弁故所起聖道說名為此廣分別如前結薀四靜慮中問何故聖道說名為遲由鈍根者所起聖道不能速趣究竟𣵀拌故說名遲諸利根者所起聖道疾趣𣵀拌故說名遲文此四通等者第三出体婆沙九十三十三丁七十五法等者第四經法分別无表中唯道俱无表非余心三大地法大善地法尋伺得四相无漏一分非余也四道等者第廿一四道釈於中四初列名弁相二釈道義三出体四經法分別論廿五十一丁正理七十一初丁顕卅三十八丁所言道者等者第二釈道義論二釈中第一釈也論云道義云何謂𣵀拌路乘此能徃涅槃城故或復道者謂求所依依此尋求涅槃故解脫勝進如何名道与道類同轉上品故或前前力至後後故或能趣入无余依故文又婆沙百四十一十丁所履通達故名為道文此四皆等者第三出体七十等者第四經法分別无表中是俱及道俱非余心王大地法大善地法尋伺得四相中加行善学无学非余四証等者第廿二四証淨釈此中四初列名二釈名三經法分別四別釈信戒名淨論廿五十六丁婆沙百三九丁集異門足論六十七丁品類足十十四丁㳒蘊足二初丁正理七十二初丁顕卅四十二丁由証等者第二釈名論云為依何義立証淨名如実覚知四聖諦理故名為証正信三宝及妙部罗皆名淨离不信垢破戒垢由証得淨立證淨名文婆沙百三十三丁多說証淨相論釈云且見近見三諦一一唯得法戒証淨見道諦位兼得佛僧謂扵尓時兼於成仏諸无学法成罗法僧学无学法亦得証淨兼言為顯見道諦時亦得於法及戒証淨然所位法畧有二種一別總總通四弁別唯三諦全𦬇独学道故見四諦時皆得法証淨聖所受戒与現觀俱故一切時无不亦得由所信別故名有四應知実㕝唯有二種謂扵仏果等三種証淨以信為体聖戒証淨以戒為体故唯有二如是四種唯是无漏以有口法非証淨故云云前三以心等者第三經法分別前三以无漏信為証後一以通俱无表為証也信戒二種等者第四別釈信戒名淨人愚按云信戒二種等十六字文恐錯乱上由証得淨等上置若依此義分別四種淨釈三初列名二釈名信戒二種已下文三經法分別別三已下学者可考五門分別畧有等者第四五門分別釈扵中二初票列二釈此中十五𫨻五取蘊等者第一𫨻論一五丁集異門足十一十三丁正理一十四丁顯一十四丁従取生故者煩𢙉名取蘊取生故名取薀依主釈能生取故者薀生取故名取薀依主釈北二釈共論依也此𫨻只釈名私經法分別七十五法中色中无表一分定俱及欲无表余十色取薀心王中除无漏有漏心王識取薀心所中受一分有漏受取蘊想一分有漏想取蘊余四十四心所隨應除无口一分有漏分行取薀不相応中得四相一分有漏余九全行取薀三无為非取薀根也五濁等者第二𫨻此中二初釈名出体二經法分別論十二八丁正理卅二十丁顕十七十一丁雜𭇥卅二三丁刧即是時乃至為体者論十二五丁刧惟是何謂五薀文五趣等者第三叚此中初列名二釈名三出体四至法分別論八五丁集異門足十一十六丁品類足七二丁正理二十一十三丁顯宗十二七丁聖百七十二二丁光明名天者梵云提婆此云天翻訳名義集章釈婆沙百七十二十二丁天釈名六說中當第四說欤百七十二十二丁二初丁有說光明增故名天以彼自然光恒照昼夜等故文因示天住処百七十二十四丁問諸天住在何処四大眾天位七金山及妙高山層級上并日月星中三十三天住妙高山頂夜摩乃至色究竟天皆在空中密雲如地各有宮殿扵中居止差別広說如大地種薀无色界天无形色故无別住処文論十一九丁云云思慮名人者梵云摩冤舎喃此云人翻名集義二十九丁人釈名有五說中當第一說欤百七十二十二丁云問何故此趣名未奴山沙昔有轉輪王名蔓駄多告諸人曰汝等欲有所作応先思惟量觀察尓時諸人即如王教欲有所作皆先思惟量觀察便於種種工巧業処而得善巧以四能用意思惟視察所作㕝故名未奴沙是已傳立斯先未流此未奴沙時人或相呼以為雲或名多罗脛或名底落迦或名阿沙茶文因示人住処百七十二十二丁問人住何処住四大洲謂膽部洲毘提河洲瞿陀尼洲拘盧洲亦住八中洲何等為八謂抅盧洲有二眷属一矩拉婆洲二憍拉婆洲毘提河洲有二眷属一提河洲二蘓提河洲瞿陀𡰱洲有二眷属一舎𢮎洲二嗢恒罗漫恒里拏洲膽部洲有二眷属一未罗洲二笩罗末暹洲此八洲中人形短小如此方侏儒有說云云有說云云如是說者応如初說此八中洲一一復有五百十洲以眷属於中或有人住或非人住或有空者文論十一四丁由飢餓故名為餓鬼者名義集二廿四丁云薜荔多広法師云正言閉麗多此云𥘵人鬼或云餓鬼劣者孔雀至作𤰞𥧌礼多云云章釈婆沙百七十二十丁餓鬼釈名六說中當第四說欤婆沙云有說飢渴增故名鬼云云因示鬼住処婆娑百七十三十丁問鬼住何処膽部洲下五百踰繕那有琰魔王界是一切鬼本所住所彼流轉亦在余処於此門中有二種鬼一有威德二无威德有威德者或住華林果住余清淨受諸福樂无威德者或住厠溷糞壤水竇坑塹之中乃至或住種種雜穢諸不淨所薄福貧窮飢渴所苦東毘或住提河西瞿陀𡰱亦在此二北拘盧洲惟有大威往云云論十一八丁身多橫住名曰傍生者名義集二卅九丁云帝剎耶瞿偷𭰖伽此云傍行云云章釈婆娑百七十二九丁傍生釈名五說中當初說欤婆沙初說云其形旁故行亦旁以行旁形亦旁是故名傍生文因示傍生住処婆沙百七十二十丁云問傍生本住何処本処住処在大海中後眨流轉徧在諸趣文論十一八丁地下有獄名為地獄者頌流云梵云那落迦此云若具義翻為地獄以地下有獄故非正引云云又唯𧥾述記五未八十八丁云捺落迦者此云苦器受罪処也那落迦者受彼苦者故二別也玄應音義云捺落迦奴葛切受苦也或言那落迦受罪人也云云光記八十二丁地下有獄名為地獄此乃義翻梵云那落迦云云婆沙百七十二四丁捺落迦釈多說且初說云是那落迦所趣処故是中有那落迦故名捺落迦彼諸有无悅无愛无味无利无喜樂故名那落迦文因示地獄住所婆沙百七十二六丁問地獄在何所多分在此膽部洲下云何安立有說此洲下四方踰踰繕那至无間地獄底无間地獄縦橫広高下各二踰繕那次上一万九千踰繕那中安立余七地獄謂次上有極𤍠地獄次上有𤍠地獄有大嘷呌地獄次上有嘷叫地獄次上有眾合地獄次上有黑繩地獄次上有等活地獄此七地獄一一縦廣踰繕那次上余有一千踰繕那五百踰繕那是白墡五百踰繕那是𭰖有說云云有說云云有說云云又一一大地獄有十六增乃至如是八大地獄并部眷属便有一百三十六所云云又云膽部洲下有大地獄膽部洲上亦有辺地獄及独地獄或有谷中或有山上或在曠野或在空中扵余三洲惟有辺地獄独地獄无大地獄所以者何惟膽部洲人造善猛利彼作𢙣業又復猛利非余洲故有說北抅盧洲亦无辺地獄等是受淳淨業果処故問𠰥余洲无大地獄者彼諸有情造无間業断善根等當於何所受異熟耶即於此瞻洲部下大地獄受文論十一五丁又因示獄卒說論十一七丁地獄卒非実有情有說有情云云婆娑百七十二七丁二說二十唯識述記上四丁二十八八師等說獄卒等非実有情業生大種相異是𢙣業所感增上大種轉及所生經部師等說𧈧非有情然心外造業熏內識其受果乃在心外大種轉及形顯等大眾部正量等說是実有情今大乘意亦非有情云云趣是所住者婆沙百七十二四丁問何故名趣趣何義所住義是趣義是諸有情所應住所応生結生処故名趣文異熟无記五薀為体者第三出体婆沙評家義也婆沙百七十二二丁問趣体情是何乃至応作是說趣体性是无覆无記乃至有說通三性乃至評曰応說趣体惟是无覆无記云云又大眾部通染善云云光記八十五丁問何素洛何趣所摂依正義是鬼趣摂婆沙百七十二十五丁問阿素洛何趣所摂有說是天趣摂云云如是說者鬼趣摂云云七十等者第四經法分別私圖云五无間等者第四叚扵中三初列名二釈名三弁相經法分別論十七十五丁正理四十三八丁顯宗廿三十丁婆沙百十五十五丁百十六初丁百十九四丁出仏身血者読習㕝出仏身血訓故音可読出佛身血依習音讀讀出仏身血訓出音讀出常例今依習也言无間等者第二釈名婆沙百十五十八丁百十九四丁論十七十六丁釈名前三等者第三弁相經法分別五无間体相広釈論婆沙開見且就破和合僧破法輪僧破羯磨僧差別弁破羯磨者謂一界內有二部僧各各別住作布灑陀羯磨說戒破法論者謂立異師異道如提婆達多言我是大師非沙門喬磨五法是道非喬磨所說八支聖道所以者何若能修習是五法者速證𣵀拌非八支道云何五法一者尽壽著糞掃衣二者尽壽常乞食三者尽壽惟一坐食四者尽壽常居逈露五者尽壽不食一切𩵋肉血鹽酥乳等是破羯磨僧破法輪僧差別婆沙百十六四十丁說又畧弁破法輪僧相能破僧者要大苾芻非在家苾芻𡰱等唯見行者非愛行者住淨行人非犯戒者要異処破非対大師唯破異生非破聖者要所破僧忍師異佛忍異仏說有余聖道応說僧破在如是時此夜必和不經宿住唯瞻部人亦至九或復過此能法輪非扵余例以无仏故有仏処方有異師要八苾芻分為二眾以為所破能破第九故眾極少扵須九人此過无限如是名曰破法轉僧能障聖道壞僧和合故委如論也五根等者第五叚此二初列名二釈名論廿五十二丁正理七十一五丁顯宗卅四初丁集異門足論十四七丁婆沙百四十一九丁勝用等者釈名依婆沙百四十一九丁論三初丁也不可屈等者第六𫨻五力釈扵中二初釈名二出体論二十五十二丁正七十一五丁顯卅四初丁集異門足十四七丁婆沙百四十一九丁不可屈伏名力者釈名依㚣釈也出体如等者第二出体也五因等者第七𫨻於中三初列名二釈名三經法分別論一八丁正理廿十丁顯宗十一七丁彼等者第二釈名色十一等者第三經法分別也五類等者第八𫨻此中四初列名二釈名三癈立四經法分別論二八丁正理五十四丁顯宗三十四丁応知等者第二釈名於中異熟生釈名初釈依主釈次釈持業釈若拠但等者第三癈立色十一等者第四經法分別也五果等者第九𫨻扵中三初列名二釈名三經法分別論六十九丁正理十八初丁顯宗九十六丁入阿等者第二釈名色十一等者第三經法分別五葢等者第十𫨻扵中四初列名二弁相三經法四分界繫論廿一八丁宗異門足十二初丁発智論三初丁婆沙四十八九丁正理五十五五丁顯宗廿八二丁蓋義障義覆義破義壞義隨義卧義是蓋義広如婆沙唯此等者第二弁相初二後等者第三經法分別皆唯等者第四分界繫也五順下等者第十一𫨻於中四初列名二釈名三經法分別四判界繫論廿一二丁発智論三初丁集異門足十二十三丁婆沙四十九二丁正理三十四五丁顯宗廿七九丁此五順等者第二釈名章近依論欤婆沙四十九二丁順下分釈名十說且引初說云問何故名順下分結順下分結是何義耶如是五結下界現行下界所断結下界生取下界等流異熟異故名順下分結下界者謂欲界文婆沙第七說論举論廿一二丁何緣此五名順下分此五順葢下分界故謂唯欲界得下分名此五於佊能為順葢由後二種不能超欲界沒有能超由前三還下如守獄卒防罗人故文前二以等者第三經法分別前三通等者第四判界繫也五順上分等者第十二𫨻扵中四初列名二釈名三經法分別四諸門分別論廿一三丁集異門足十二十四丁発智論三初丁婆沙四十九六丁正理五十四七丁顯宗廿七十一丁順葢上界等者第二釈名依論也㚣四十九六丁說以心所等者第三經法分別唯修所断等者第四諸門分別五分法身等者第十三𫨻扵中三初列名出体二釈身名三經法分別婆沙卅三九丁謂无漏戒者謂无学相中身語業道俱无表依地末至中間四靜慮地也謂无漏定者謂无学空无相无願三摩地依地至中間四靜慮下三无色地也謂无漏正見者恐脫智字欤謂无学正見智依地末至中間四靜慮下三无色地也謂无漏勝解者謂无学作意応応心已勝解今勝解當勝解謂尽无生无学正見相応勝解此薀所根故謂尽智无生智者依地未至中間四靜慮下三无色地也解脫身中等者婆沙卅三十三丁問何故此二智名解脫智見蘊解脫身中独有此故㝡能審决解脫㕝故文以此五等者二釈身名此五分法身上中下上仏中独覚下聞也或上利根中中根下鈍根戒身以色等者三經法分別五戒等者第十四𫨻扵中三初列名二出体三經法分別論十四卅八丁正理三十六十四丁显宗十九六丁婆沙百廿三十三丁四分行㕝鈔資持記中一四初下至中一五終十三三廿九丁僧祗律一廿二丁四分律一至二十八丁又十六五丁又五分二十四丁九初丁十誦律二六廿乂乂三三丁廿八夕論一十二丁三七丁九四丁如制四波罗夷時分依僧祗律說戒仏成道後五年冬分制余三戒並六年冬分制也不殺生者先制戒因緣者仏在毘舎离諸比丘修不淨觀厭身歎死外道比丘提受雇行殺居士驚怖因制也次明犯緣者具五一是人二人想三起殺心四与方便五命断也犯境唯人也如断畜命九十草提中第六十一奪畜生命戒犯摂𠂇𠂊二不偷盜者先制因緣者仏在罗閱城檀𡰱迦比丘在靜慮作瓦屋仏令打破遂取王材王臣訶責囙制次名釈畏主覚知為喻非理損者為盜不作偷盜云不偷盜也次明犯緣者具五種一要発欲盜放思二於他物中三起他物想四或力或𥨱起盜加行五不誤而取令属己身必具成犯初緣中有三五丁一盜三宝物二盜人物三盜非畜物四重物中二謂五錢若直五錢即余雜物五錢㕝廿八論二十四丁三釈資持記中一五十四丁引徃見不欲耶行者今約進士五戒故云不欲耶見名約出家戒不欲也先制戒因緣者仏在毘舎离国須提那子出家已𨗴本村与故二共行不淨因制也次明犯境有人非人无子鬼神等畜生三起拠報則男女二形拠処則女人王道謂大小便道及口男子二通次明犯緣者二緣一自有心向前境縦有裏隔互障但人如毛頭結成大重具四緣成一是正境男二通女三処二与染心三起方便四与境合便犯二者若為偏或博至前境或就其身仏開身會制令不染亦具四緣一是正境二為𭜨福三与境合四受樂便犯也又欲邪行有四種断不応行一於非境謂扵他妻妾或母或父或父母親乃至或王於所守護境二於非道謂扵自妻口及余道三扵非処謂扵寺中制多逈処四於非時謂懷胎時飲児乳時受齋戒時設自妻亦犯邪行也不虛誑者先制戒因緣者仏在毘舎离時世穀貴婆求河辺有安居者共相美得上人法遂獲利養仏呵而制也次明犯緣者具九緣一対境是人二人想三境虛四自知境虛五有誑他心六說過人法七自言已証八言章了九前人解十誦多論云得不淨觀已上至四果若云我得皆犯重云次明遠近根本罪文若依明了論四波罗具部有十六罪一一各有四部或十六罪一遠方便如行時先起心未動身口貴心滅二次方便謂動身就彼或口說欲作此対人懺滅通名吉罗三近方便至佊人辺或欲以摩触身未交前是偷蘭期行㕝故摩触非為戲樂故成偷蘭不成僧殘此罪対人懺第四身交是根本也不飲酒等者若約比丘大戒中單提中第五十一飲酒戒也先制戒因緣者仏在支陀国婆伽陀比丘際毫示俱睒王得酒飲酔卧路因制也次明犯緣者三緣一是酒二无重病緣三飲咽犯次明制意者多論十二丁云此戒極重能作四逆除破僧又能破一切戒及余眾𢙣故若依五分九丁初丁以䧏龍故得酒酔衣鉢縦橫佛与阿舁至井辺仏自汲水阿洗之著衣卧於上令頭向仏頃更轉側伸脚蹋佛仏集僧言昔日敬仏今不能敬昔伏毒龍今不能降蝦嗼因說漸断酒制乃至嗔酒器也初三後一等者第三經法分別也身語无表以无表為性者謂身語无表以別解脫无表為性也世五眼等者第十五𫨻扵中四初列名二出体三經法分別四釈眼名有部論藏中无五眼列並說大乘觀照等者眼根唯有觀照推度如光二四十八丁云云前引也
