body:
  text: 智山沙門釋龍謙撰第二諸門等者第二諸門釋於中二初牃摽二釋此中二初分科二解釋第二等者牃摽就中等者分科薀等以下解釋此釋中二初蘊處界攝釋二諸門分別釋初中二初釋科目二正釋蘊處界攝此中三初五薀二十二處三十八界初中三初釋蘊義二明蘊攝法三辨五法攝不薀等者初薀義釋論一五丁云云婆沙七十六八丁云云正理一十七丁顯二初丁云云蘊與取蘊別論一五十右婆沙七十五四丁正理一十六丁顯一十五丁諸有為和合等者婆沙七十四十丁云問何故名薀何義何義聚是蘊合義是薀義積義是薀義略義是薀義若世施設即蘊施設若多增語即薀增語聚義是薀義者謂法所有色若過去若未若現在廣說乃至若遠若近如是一切總為一聚立為色薀乃至識薀義亦木合是薀義者謂謂所有色若過去若未若現在廣說乃至若遠若近如是一切總為一合立為色薀乃至識薀合義亦尓積義是薀義者如積積物總為一積名雜物薀如是諸色總為一積立為色薀乃至識薀積義亦爾略義是薀義者謂諸所有色若過去若未來若現在廣說乃至若遠若近如一切總略一處立為色薀乃至識薀亦尓問過去未乃至諸色可略聚耶𧈧不略聚其體而可得略聚其名乃至識薀應亦知爾云云論一十四丁云諸有為法和合聚是薀義云云正理三六丁顯宗二十三丁光一余三十六丁色薀攝十一種色等者第二明蘊攝法文相易可知于五法中等者第三明五法攝不無為非聚等者論一十七丁石頌曰蘊不攝無為不義相應故云云婆沙七十四十六丁左九釋又七十四十丁云云正理三十一丁顯宗二十五丁十二處等者第二十二處釋此中二初總標二別釋生長門等者第二別釋此中二初釋名二明處攝法十二所建立論一十二丁十九丁婆沙七十三十二丁十二所別相婆沙七十三十四丁生長門等者論一十五丁云心心所法生長門義是處義訓釋詞者謂能生心心所法故名為處是能生長破作用義文七十三十二丁云問何故名處處是何義生門義生處義生略義藏義倉義經義殺處義田義他義流義海義白義淨義是處義應知云云正理三六丁顯宗二十四丁眼耳等者眼耳等者第二明處攝法如文可知十八界等者第三十八略釋此中二初總票二別釋界建立論一十二丁婆沙七十一五丁種等者第二別釋此中二初釋明二明界攝法種等者論一十五丁云法種𫞀義是界義如一山中有多銅鐵金銀等說多多界如是一身或一相有十八類諸法種名十八界此中種𫞀是生本義云云婆沙七十一七丁云問何故名界界是何義種𫞀義是界義股義分義片義異相義不相似義分齊義是界義種種因義是界義云云正理三七丁顯宗二十三丁眼耳等者第二明界攝法文相易知第二諸門等者第二諸門分別釋此二初總標二別釋百門者分別有十七種三門分別有二十種四門分別有草二種五門分別有十五種六門分別有五種七門分別有五種八門分別有五種九門分別有五種十門分別有六種都合為百門也二門分別等者第二別釋此中九設初二別釋二三門釋三四門釋四五門釋五六門釋六七門釋七八門釋八九門釋九十門釋初中二初標列二解釋初中二初標二列二門等者標色非色等者列也色非色者可及等者第二解釋此中十七𫨻釋十七種故可知色非色等者初釋名次七十五等者經法分別以下准之可知七十五十二丁有二法謂有色無色法門何故作此論為欲遣補特伽羅及為顯示智殊勝故為欲遣補特伽羅者謂顯惟有色無色法畢竟無實補特伽羅故反為顯示智殊勝者謂有聰慧殊勝智者由此二法通達一切此二偏攝一切法故由此二緣故作此論云云色反礙義無表反礙生故論一十丁有見無見等者第二段論二初丁云云云七十五十三丁云復有二法諸有見無見法問何故作此論為欲遣補特伽羅及為顯示智殊勝故為欲遣特伽羅者顯惟有見無見法畢竟無實補特伽羅故及為顯示智殊勝者謂有聰慧殊勝智者由此二法通達一切此二偏攝一切法故復次為止他宗顯正理故或謂有執一切法皆是有見如尊者妙音佊作是說一切法皆是有見惠眼境故為止佊意顯一切法或是有見或是無見由此三緣故作斯論云云正理四初丁顯宗三六丁有對等者第三佊此中有𭔹三種有𭔹中障礙有𭔹論二初丁云對是礙義也此復三種障礙境界處緣異故障礙有𭔹僧十色界自於他處彼礙不生如手礙手或石礙石或二相礙云云正理論四初丁顯宗三六丁婆沙百二十八二丁百七十六三丁七十六初丁云復有二法謂有對無𭔹法問何故作此論為欲遣補特伽羅及為顯示智殊勝故為欲遣補特伽羅者謂顯惟有有對無對法畢竟無更補特伽羅及為顯示智殊勝者謂有聰惠殊勝智者曰此二法通達一切此二遍攝一切法故復次為止他宗顯正理故謂或有執若與對俱說名有對不與對俱說名無𭔹若作是說五識身等者為有對所依所緣俱對礙故或復有執若與瞋俱說名有𭔹不與瞋俱說名無對若作是說瞋相應品心心所法說名有對為止彼意顯有礙色說名有對此所余法說名無對由此三緣故作斯論又云問有對無對是何何義耶諸法極微積集是有對義非極微積集是無對義乃至復次諸有障礙是有對義若無障礙是無對義復次等云云心心所境界有對所緣有𭔹別和漢兩朝多解義燈二本草九丁終南家業中卷廣義沙三十五下草九丁飾宗記二末四十一丁光記寶第二卷𬇦㐬指要二三丁有漏等者第四段婆沙七十六四丁復有二法謂有漏無漏法問何故作此論為欲遣補特伽羅及顯示智殊勝故為欲遣補特伽羅者謂顯惟有有漏無漏法畢竟無實補特伽羅及為顯示智殊勝者謂有聰惠殊勝者由此二法通達一切此二偏攝一切法故復次為止他宗顯正理故謂或有衆執佛此無漏如大衆部乃至為止彼悲顯佛生身唯是有漏若佛生身是無漏者便契經乃至故知佛此定非無漏云云又云問有漏無漏其義云何答云若法能長養諸有攝益諸者任持有是有漏義與此相是無漏義乃至復次若法能令諸漏增長是有漏義若法能令諸漏减是無漏義復次等云云有諍等者有諍有漏異名是故論一五丁石云頌云有漏名取蘊亦免為有諍及苦集世間見處三有等者乃至此有漏法亦名有諍煩惱名諍觸動善品故𡧱自他故諍隨增故名為有諍猶如有漏云云正理一體顯宗一十五丁無諍無漏異名也等言等余異名也有為等者第五段婆沙七十六六丁云復有二法謂有為無為法問何故作此論為欲補特伽羅及為顯示智殊勝故為欲遣補特伽羅者謂惟有有為無為法畢竟無實補特伽羅故反為顯示智殊勝者謂有聰慧智殊勝者由此二法通達一切此二遍攝一切法復次為止他宗顯正理故謂或有執有對法是有為無對是無為或復有執有漏法是有為無漏法是無為為止彼意顯無對法及無漏法俱通有為無為由此三緣故作斯論乃至問有為無為是何等若法有生有滅有因有果得有為相是有為義若法無生無滅無因無果得無為相是無為義復次若法依屬因緣和合作用是有為義若法不依屬因緣和合作用是無為義乃至尊者覺天作如是說若法由因緣作是有為相若法不由因緣作是無為相尊者妙音乃至云云相應等者第六𫨻論四十三丁云或名相應等和合故依何義故名等和合有五義故謂心心所五義平等故說相應所依所緣行相時㕝皆平等故㕝平等者一相應中如心體一諸心所法各各亦爾亦寶四草七丁云論言同一所依者非謂所依唯一根故名同一所依是心心所法𧈧多不同共一所依名同一所依若二皆名同一乃至同一所緣者謂心心所𧈧復不同若想緣青受等亦緣青等由此故說同一所緣即心心所法共緣無量百千多法𧈧復不同所緣共故皆名同一所緣乃至同一行相者如心王起一青行相時諸心所等亦同起此相如心王緣多境時起多行相心所亦爾名同一行相文正理十一十九丁顯宗六十一丁婆娑十六十三丁有上等者第七𫨻如文可知四大種等者第八𫨻體寬等者論一九丁云如是四界亦名大種一切余色所依性故體寬廣故或於地等增盛聚中形相大故或起種種大㕝用云云正理二三丁顯宗二四丁又論二二丁云云正理四十七丁顯宗三十二丁婆沙百草七初丁云大種所造乃至問何故作此論為欲分別契經義故乃至今應說之故作此論有說為止余師所說謂此部內有二論師一覺天二者法救覺天說色惟大種心所即心彼作是說造色即是天種差別心處即心之差別云云尊者法救說𮥷大種別有造色說心所法非即是心然說中二非實有謂所造觸及法處色立蘊處界如對法宗彼亦不然諸所造觸如余造色應別有故若無法處所攝色者無表戒等不應有故欲止如是二師所說故作此論云云婆沙百三十七五丁云問何故大種惟四𦚰尊者言此不應責云云有余師言若减四者而用便缺若過四者則亦無用云云問何故名大種大而是種故名大種如言大地如言大王義別體同應持業釋問云何大義云何種義答能滅能增能損䏻益體有起尽是為種義體相形量遍諸方滅成大㕝業是為大義問此四云何成大㕝業與大積聚造色為依令懷令成是大㕝業由此惟四不减不增謂减不能成大㕝業增於㕝業復為無用云云問造是何義為是因義是緣義耶云云應作是說造是因義云云婆沙百二十七八丁問一四大種為但造一造色極微為觸造多云云應作是說一天大種但能造一所色極微云云有說造多云云評日如前說者好問大種造色云何而住為大種在下造色在上為大種在上造色在下為大種造色相𮥷而住大種在外造色處中耶云云有說在下為因所依法應尓云云有作是說相雜而住大種在下造處中云云諦非諦等者第九𫨻論一三丁草二一丁婆沙七十七五丁正理一七丁五十七二丁顯宗一十一丁草九一丁增𭇥十七初丁十九七丁中含七十一丁長𭇥七十一丁三十一丁十五草五丁集異門足論六十二丁品類足論七三丁十二十六丁十八八丁法蘊足論五五丁以上四諦說婆沙七十七五丁云問如是四諦自性云何阿毗達摩諸論師言五取薀是苦諦有漏因集諦彼擇滅是滅諦學無學法是道諦譬喻者說云云分別論者云云尊者妙音云云如斯說者若隨自相續五薀若隨他相續五薀若有情數及無情情數諸蘊如是皆是苦是苦諦乃至若隨自相續因五薀若隨他相續五蘊因若有情數及無情數諸蘊因如是一切皆是集是集諦乃至若隨自相續五蘊尽若隨他相續五蘊尽若有情數及無情數諸蘊尽如是一切皆滅是滅諦乃至若隨自相續五蘊對治若隨他相續五蘊對治若有情數及無情數諸蘊對治如是一切皆是道是道諦乃至已說諦自性所以今当說問何故名諦諦是何義實義是諦義真義如義不顛倒義無虛誑義是諦義云云諦謂諦實者婆沙諦說六義中當第一義也七十三諦者此章未初丁七十五法中無表心王大善地十大地法十尋伺得四相此二十九通苦諦集道三諦擇滅一種唯滅諦余四十五中除虛空非擇滅余四十三通苦集二諦云云虛空等者婆沙七十七八丁十七釋且第九釋云復次虛空非擇滅無漏故非苦集諦無記故非滅諦無為故非道諦第十釋云復次虛空非擇滅不隨世故非三諦無記故非滅諦文有執受等者第十𫨻有執受無執受釋名㕝論二六丁云有犱受者此言何執受無執受釋名所共所執持攝為依處名有執受益展轉更相隨故即諸世間說有覺觸衆緣所觸覺示等故與此相名無執受文婆沙百卅八七丁云云正理四十七丁顯宗三十二丁眼五根等者論二六丁云眼等五根住現在世名有執受過去未名無執受色香味觸住現在不𮥷五根名有執受若住現在非不𮥷根過去未名執受如在此內除與根合髮毛齒爪大小便利洟唾血等及在身外地水等中色香味觸𧈧在現世無執受文光二十七丁云云有所緣等者第十一𫨻論二六丁正理四十丁顯宗三十一丁異熟等者第十二𫨻論二九丁云異熟因所生名異熟生如牛所駕車名曰牛車略云中言故作是說或所造業至淂果時變而能熟故名異熟果從彼生名異熟生彼所淂果與因別類而所熟故名異熟或于因上假立果名如於果上假立因名如契經說今六觸處應知即是者所造業文婆沙十九十七丁云熟有二種一者同類二者異類同類熟者即等流果謂善生善不善生不善無記生無記異熟者異熟果謂善不善生無記果此無記果從善不善異類因生故名異熟云云二十十七丁云問何故名異熟因異熟是何義答異類而熟是異熟義謂善不因以無記為果果是熟義云云五十一六丁異熟熟釋名同十九十七丁說正理五十四丁顯宗三十四丁光二草四丁云云見非見者第十三段論二十四丁云審慮為先度名見乃至眼根以能明利觀照色故亦名見文婆沙九十五初丁云云何為見乃至廣說問何故作此為止他宗顯正理故謂或有說諸有為法皆是見性乃至為彼意是惟眼根及決度惠是見非余或復有說現觀邊忍亦是智性如譬喻者乃至為彼意顯無漏忍是見非智有余師復說尽無生智亦是見性為彼意顯彼息未不復推度是智非見云云光二四十八丁云見有二種一者觀名見所謂眼根𧈧惠亦名觀此中且以眼名觀此中且以眼名視照乃至二者推度名見於其惠中唯此八種云云正理六十三丁顯宗四二丁世俗正見者論二十丁已左云世間正見謂意識相應善有漏惠文婆沙九十七八丁云何世俗正見乃至廣說問何故作此論為欲分別諸契經中深隱故乃至後次為止他宗顯正理故謂或有說意識相應善有漏惠非皆是見如譬喻者乃至為遮彼執顯意戈一切善惠皆見性攝如是等種種因緣故作此論云何世俗正見意識相應有漏善惠此有三種一加行得二𮥷染淂三生得云云尽無生智等者非見者婆沙九十五初丁五丁云云眼根唯是見者婆沙九十五初丁云云積集等者第十四假論二八丁云十八界中五根五境十有說色界是可積集極微聚故義唯余八非可積集非極微故文正理五十三丁顯宗三十三丁能十五丁斫等者第十五𫨻於中二初釋能所等二類釋能等論二八丁云色香味觸成斧薪等此即名為能斫所斫何法名斫薪等色聚相逼續生斧等分隔令各續起此法名斫身等色根不名所斫非可全斷令成二故非身根等成成二分支分離則無根故又身根等亦非能斫以淨妙故如珠寶光如能斫所斫體唯外四界所燒能其體亦尓謂唯外四界名所燒能身等色根亦非二㕝以淨妙故如珠寶光界總非不相續故能燒所有異諍論謂或有說能燒所體亦如前唯外四界或𣸪有說唯有大界可名能燒所唯重文正理五十三丁顯宗婆沙百此三六丁問義處和合說為能義處說和合為所有說四處能四處所有余師說四處能種重是所問義和合說為䏻義處和合說為所說有說四處能燒四處所燒有余師說暖是能燒四是所燒問義處和合說為能斷義處和合說為所斷有說四處能斷有余師說堅性是能斷四處是所斷文根非根等者第十六𫨻論二草二丁列草二根名三初丁已下解釋發智十四丁四十二丁婆沙百四十二卷至百五十六卷正理八草一丁顯宗十六丁增上名根者如前引論三初丁婆沙百四十二八丁今章列草二根次第者依經說阿毗達摩諸大論師皆越經中六處次第於命根後方說意根有所緣故也婆沙百四十二六丁云問二十二根名有二十二實體有義答對法者言名二十二實體十七于中男女三無漏根無別體故男女即是身根少分故三無漏根即是九根攝故九謂意根條喜捨根眼等五根此九根有位為未知当知根有位名已知根有位名具知根即見道位修道位無學道位如次應知云云尊者法救見名二十二實體十四謂即前五及命根捨定無無別實體故不相應行薀無實體故離苦條受無別不苦不樂受故離心無實體故云云尊者覺天說名草二實體唯一所謂意根彼說諸有為法有二自性一大種二心離大種無所造色離心無心所諸色皆是大種差別無色皆是心心差別由此義故實根唯一處實義者應知初說名二十二實體十七云云三無漏根釋名論三六丁如斯三名因所而立謂在見道有未曾知当知行轉故說彼名未知当知若在修道無未曾知但為斷除余隨眠故即於彼境復數了知是故說彼名為已知在無學道知已已知故名為知有此知者名為具知或習習此知已成性者名為具知謂得尽智無生智故如實自知我遍知若不復遍知乃至廣說彼所有根名未知為当知根等文有異熟等者第十七𫨻有異熟無異熟㕝婆沙五十一四丁云三說乃至九十八隨眠義有異熟無異熟問何故作此論為止他宗顯己義故謂或有執離思無異熟因離受無異熟果如譬喻者為止彼意顯異熟因及異熟果俱通五薀或復有執諸異熟因果若熟其體便無如飲先部彼說諸異熟因果未熟位其體猶有果若熟已其體便無乃至為彼意顯真熟因果已熟位其體猶有或復有執善不善業無異熟果如諸外道為破彼義顯善𢙣業有異熟果為止此等種種異熟顯己所宗故作此論復次勿為止他顯示己義但為開發諸法實性令生正解故作此論者不善有異熟諸無記無異熟此廣分別應唯前門問有異熟者義何謂耶為與自異熟法供名有異熟為與他異熟法俱名有異熟亦尓何失乃至自異熟俱名有異熟云云又云問何故名異熟異類而熟故名異熟云云論三十一丁正理九十五丁顯宗五九丁不善善有漏異熟者恐漏字下脫有字歟應言不言有漏有為熟余文可知三等者第二三門釋於中二初標列二解釋初中二初標二列解釋中草𫨻三性者等者第一此中二初標二釋此中二初三性開門二經法分別三性名義㕝婆沙百四十五十一丁問曰何名善不善無記耶若法巧便所攝能招愛果自性安隱說名為善巧便所攝者顯道諦能招愛果者顯若集諦少分自性安隱者顯滅諦若法不巧便次攝招不愛果性不安隱說名不善此則顯示苦集諦少分與二相說名無記有說云云有說云云有說云云有說云云氣尊者曰由四緣說名為善一自性故二相應故三等起故四勝義故自性善者有說是慚愧有說是三善根相應善者是彼相應心心所法等起善者是彼所起身語業心不相應行勝義善者𣵀槃安隱故名善分別論者說言自性者善者謂智相應善者彼相應識等起善者謂彼所起身語業勝義善者謂𣵀拌由四緣故說名不善一自性故二相應故三等起故四勝義故自性不善者有說是無慚無愧以一向不善偏不善心故有說是三不善根以具五義故相應不善者謂彼相應心心所法等起不善者謂佊所起身語業心等不相應行勝義不善者謂生死不安隱故名不善分別論者說言自性不善者謂癡相應不善者謂彼相應識等起不善者謂彼所起身語業勝義不善者謂生起脅尊者云云復次云云五十一初丁四種善不善論十三十四丁光二七丁十四以此十五者第二經法分別此中二初標二分別此中五初色十一分別二心王分別三心所分別四不相應分別五無為分別善中通生淂聞思以皆能發身語業故者光記一草四丁云問如何淂知聞思二惠觸發業解云正理四十二十一丁曰諸律儀果有從加行善所生有生得善心所生若加行善心生文者律義先捨𣸪斷善根又百七十七初丁婆沙云問相異應熟業以何為自性為身業為語業為意業三業為自性又婆沙曰問相應異熟業為聞所成思所成修所成耶唯思所成非聞非修所以何此業勝故非聞所成欲界繫故非修所成有說此業通聞思所成但非修所成以此文證故知聞思能發身語問若言聞思能發身語既能發語即能受持三藏教法何故但言生得惠耶解云聞思能發勝身語業佊業非勝故但生得然古德說加行善心不能發身語業引婆沙十七云云云乃至古往說非理文心於十五中等者別分別者生得者謂七心界聞思修學無學者謂意界戈界不善者謂七心界有覆者眼耳身戈意界意識異熟工巧者謂七心界威儀者除耳識余六識界若約似威儀路心通耳𧥾也通果者謂眼耳識及意界意識界由異熟等攝心尽故所以不遇自性也威儀工巧有起加行緣別婆沙百二十六十八丁云眼耳鼻舌此四識是威儀路加行非起威儀路意戈是威儀加行亦是起威儀路又眼等四識能緣威儀路不能起威儀路意識能緣威儀路亦能緣起威儀路云云又云眼等五戈是工巧處加行非起工巧處意戈是工巧處加行亦起工巧處又眼等五根識能緣工巧處不能緣起工巧處意識能緣工巧處亦能緣起工巧處云云若睡眠善中等婆沙三十七五丁問此睡眠夢中所起善法為加行善為生得耶惟生得善以惛微故有余師說亦加行善以於文義亦標擇故文無記中等者婆沙卅七九丁云問睡眠夢中所起無記為是有覆為無覆耶二標俱有有覆無記者謂欲界身邊二見相應睡眠無覆無記者謂威儀路工巧處異熟生非果威儀路者如睡眠夢中自謂行等工巧處者睡眠中自謂畫等異熟生者如睡眠中除前所說余無記轉有余師師說惟異熟生是睡眠中無覆無記以心惛昧不發身語故無威儀及工巧文𢙣作等者有若外方師亦通無記論四九丁云云三界等者第二段此中二初標二釋此中二初釋三界名二經法分別此中五初色二心三心所四不相應法五無為法繫者論二三石云繫謂繫屬即被縛義文婆沙百四十五十四丁繫七釋香味唯欲界唯𫨻食性故者論二三丁云云以大梵處自梵衆等者論四九石經說誑𫽄至梵天衆相依故上地無有以大梵王處自梵衆忽被馬勝苾芻問言此四大種当於何法尽減無余梵王不知無余滅位便矯亂我于此梵衆是大梵自在作者化者生者養者是一切人作是語已引出衆外言愧謝令還問佛文婆沙百草九伽廣云云光記云云要解云云未隱名句文若說等者婆沙十五初丁云問名為道語地繫為隨補特伽羅地繫耶有說名隨語地繫彼作是說生欲界者若作欲界語彼欲界身欲界語欲界名所說義或三界或不繫若作初靜慮語彼欲界身初靜慮語初靜慮名處說義如前說生初靜慮者若作初靜慮語彼初靜慮此初靜慮語初靜慮名所說義如前說若作欲界語彼初靜慮此欲界語欲界名所說義如前說生第二第三第四靜慮者若作欲界語彼第二第三第四靜慮身欲界語欲界名所說義如前說若作初靜慮語彼第二第三第四靜慮此初靜慮語初靜慮名所說義如前說問若尓者上三靜慮為有名不有說無有說有而不可說評曰佊不應作是說寧說無不應說有而不可說以無用故有說名隨補特伽羅地繫佊作此說生欲界者若作欲界語彼欲界身欲界語欲界名所說義如前說若作初靜慮語佊欲界此初靜慮語欲界名所說義如前說生初靜慮者若作初靜慮語佊初靜慮此初靜慮語初靜慮名所說義如前說若作欲界語佊初靜慮身欲界語初靜慮名所說如前說生第二第三第四靜慮文若作欲界語彼第二第三第四靜慮此欲界語第二第三第四靜慮名所說義如前說若作初靜慮語彼第二第三第四靜慮身初靜慮語第二第三第四靜慮名所說義如前說問若尓者無色界為有名不有說無有說有而不可說評曰彼不應是說寧說無不應說有而不可說以無用故如說名文句亦爾文今評婆沙評者隨語繫二說中局欲界初定地初說為正第二說破隨身繫二說中局欲四靜慮地初說為正第二說佊也然章主者取隨語繫名為正也無想異熟及無定唯在色界第四定故者婆沙百五十二初丁云云外道乃至為真𣵀槃者婆沙百五十二初丁此滅盡定極微細心心所法故唯法有頂不通下地者恐定字下脫滅字歟光五十五丁婆沙文有滅字滅尽定滅極微細心心所法入此定故唯有頂不通下地非謂此滅定道極微細心心所法也或恐定字下脫滅字歟三斷者等者第三𫨻此中二初摽二釋此中二初解三斷名二經法分別見修斷名義㕝婆沙五十一十五丁云問何故名見修斷何故名修所斷耶是見不𮥷修修不𮥷見如何建立二所斷名𧈧見道中亦有如實修可淂修道中亦有如實見可淂而見者是惠修者是不放逸如實者是增廣義或猛利義見道中惠多不放逸少修道中不放逸多惠少故彼所斷斷名有差別云云八十八隨眠相應俱有及淂等者八十八者謂欲界見惑卅二苦諦十隨眠集諦名七隨眠問除身邊或余七道諦八隨眠謂除身邊余八色界見惑草八苦諦九隨眠謂除嗔余九集滅諦名六隨眠謂除身邊或嗔余六道諦七隨眠謂除戒邊瞋余七無色界見惑草八苦諦九隨眠謂除嗔余九集諦六隨眠謂除身邊戒嗔余六道諦七隨眠謂除身邊嗔余七相應者謂第六意識十大地法六大煩𢙉二大不善尋伺隨眠也別分別者欲界見惑中貪瞋癡慢疑見戒禁取邪見八相應法謂意戈十大地法六大煩𢙉二大不善尋伺眠睡有身邊執見二相應法者謂意戈十大地法六大煩𢙉尋伺睡眠上二界見惑中初定見惑相應法者意識十大地法六大尋伺二定已上見惑相應法者意戈十大地法六大煩𢙉俱有者大小四相也得者通法前得法後淂法俱淂也余有漏修所斷者色十一中五根五境全除道俱余散無表心王中前五戈全第六識少分心所中大地大善地法煩𢙉地法大不善地法貪瞋慢尋伺睡眠各少分小惑𢙣作各全不相應法中得四相各少分余九全修所斷也體是無漏等者道俱無表意戈少分大地法大善地法尋伺各少分得四相各少分三無為全是非所斷也論二十三丁正理六八丁顯四初丁約十八界三斷分別婆沙五十一六丁九十八隨眠等見修斷分別七十七四丁三斷分別三學等者第四𫨻於中二初標二釋此中二初釋名出體二經法分別三學義㕝婆沙七十七四丁問學等三法其義云何以無貪瞋癡道學斷貪瞋癡是學義以無貪瞋癡道不學斷貪瞋癡已學斷故是無學義與二相是非學非無學義復次乃至𣸪次為八學聖者此中諸無漏道是學義九無聖者身中諸無漏道是無學義與二相違是非學非無學義云云有漏道𧈧亦學者亦字下古本有修字正本有漏道六行觀世間道世間道𧈧佛第子亦修學非是究竟故不名學也六行觀㕝婆沙六十四三丁論二十四十五丁道俱及散唯非學非無學者道字古本作定正本也謂定俱及唯非學非無學意識通三學也有尋伺等者第五𫨻於中二初摽名出體二經法分別有尋者論二四丁正理四八丁顯宗三九丁四十二十二丁五十二六丁百四十五六丁若說隨語繫等者婆沙十五初丁對照可解婆沙文前具引也三業等者第六𫨻此中二初標二釋此中二初釋名出體二經法分別一身業者論十三初丁云世別由業生思及思所作思即是意業所作謂身語乃至此所由業其體是何謂心所思及思所作故契經說有二種業一者思業二思已業思已業者謂思所作如是二業分別為三謂即有情識語意業如何建立此三業耶為約所依為據自性為就等起縱爾何若約所作應唯一業以一切業並依身故若據自性應唯語是業以三種中唯語即業故就等起亦應唯一業以一切業皆意等起故毗婆沙說立三業如其次第由上三因然心所思即是意業思所作業分為身語二業是思所等起故此語二業自性云何頌曰此此語二業俱表無表性論曰應知如是所無諸業中身語二業俱表無表性文婆沙百十三十三丁云或有外道說十二處皆是業性云云又譬喻者說身語意業皆是一思為彼意顯除思體別者此語二業自性又分別說部建立貪欲瞋恚邪見是業自性云云問此釋三業云何建立云云具由三緣建立三業一自性故建語業二所依故建立身業三等起故建立意業復有說由三緣故建立三業一依自處故依他處故三依相應所故依自性故建立語業依他處建立身業依相應處故建立意業如是名為三業自性已說自性所以今当說問何故名業業有何義由三義故說說名為業一作用故二持法式故三分別果故作用故者謂即作用說名為業持法式者謂任持七衆法式分別果者謂能分別愛果乃至復有說者由三義說名為業一有作用二有行動故三有造作有作用者即是語業如是注論我当如是如是所依有行動者即身業𧈧寅無動如往余方有造作者即是意業造作前二由此義故說名為業文身表以色十為性等二經法分別十字恐衍字歟或等起者論十三十六丁云等起有二謂因等起剎那等起在先為因故佊剎那有故如次初名轉第二名隨轉謂因等起將造業時能引發故說名為轉剎那等起正作業時不相𮥷故名為隨轉云云又表無表詮要二二丁云云應作八字歟有部者此色別有實形色即長等形色為體也正量部者行動為體經部者此表色非實有論十三二丁已下身語無表以無表為性者謂身語無表以律儀不律儀非律儀非不律儀無表為性也大地法中思者謂意識相應思是為意業體也三空等者第七𫨻此中二初摽二釋北中二初釋名出體二經法分別三寶者論十四十六丁云云正理三十八初丁顯二十三丁婆沙卅四八丁或有謂皈依佛者皈依如頭頂項背及手足等所合成此合顯此身父母生長是有漏法非所皈依所依者謂佛無學成菩薩法即是法身或復有謂皈依法者皈依三漏或善不善無記等法或為苾芻所制處謂此應作不應作等今顯此法有為有為有漏非所皈依所皈依者謂滅諦愛尽𣵀槃或復有謂皈依僧者依四性出家之僧今顯此僧威儀形相皆是有漏非所皈依所皈者謂成僧伽學無學法由此因緣故作此論云云又云所皈依者謂滅諦全道諦少分除菩薩二無漏道除獨學漏道余道諦是處依云云又云皈依佛者皈依一切過伽師數量諸佛乃至皈依自他相續及無情數一切薀滅乃至皈依一切佛第子云云無漏五蘊者婆沙卅三九十廣云云法謂䡄持者唯識論述記一本五十丁云法謂䡄持䡄謂䡄可生物解持謂任持不捨自相文瑜伽論記十三下三右云梵語陀羅唐名持義梵語達摩亦是持義能持故名法文𣵀槃者婆沙卅二初丁右云問何故擇滅亦名𣵀拌槃名為趣𣵀名為出永出諸趣故名𣵀槃復次槃名為臭涅名為無永無臭穢諸煩𢙉業故名𣵀拌復次槃名稠林𣵀名永離永𮥷一切三災三相諸蘊稠林故名𣵀拌復次槃名為識𣵀名為不此中永𮥷煩𢙉業縷不織生死異熟果絹故名𣵀拌余如前說文和合名僧者如如百十六四丁四人已上方名僧三人不尓文雜心三四十三丁以四人為僧云云光記十四十七丁四人已上名曰僧伽文光記草五卅二丁云今解云僧有二種一㕝和合二理和合云云俱舍指要抄十四五丁云梵言僧伽此羽衆戒翻為著如阿伽翻為無著梵音長短之別玄應音義草四草一一云阿伽阿伽阿此云無僧伽此云著短呼之若聲呼之即云衆舊云僧法謬也舊翻和合謬也懷桑開記一未七右云梵云僧伽此譯為衆舊以和合翻僧失於正義然正義衆正翻僧和合乃是僧家義用謂四人等衆法成和是以文言僧者四人若遇和合者一羯摩一說戒通名已上說文然慈恩意三人已上為衆南山及光師等四人已上為衆各有意致義林三寶章云𣵀槃經說法名不覺僧伽為衆於理於義無無諦故此有三種一理和僧三已上𧈧方名僧麟覺獨覺及余聖者設獨一出佊種類故亦得名僧二㕝和合僧三人已上皆是僧體多論義故彼國之法一名為一二名為身自三已上皆名為多如辨法㕝四人方成一人白言大德僧𦗟所和三人得名僧故若四是僧常能白者而自白耶欲顯和合多人故自三已上皆得名僧三辨㕝僧謂四人五人十人二十能所白中異足和合辨法㕝故非所和體今謂慈恩西域方俗三為多又四人辨㕝一人能三人所白此三呼僧故知三人以為僧體又梵云僧伽唐翻為衆然叒是衆之古字此以王人又國語云人云為衆女三為霖是故依順二土方俗三人以上以為衆體又南山不然四人已上為衆何者雜心論第三四十二丁云以四人名僧非三故已上論文又四分律說別衆食云四人若過等此食時別衆豈有能所白而辨法㕝者乎准上律論梵土方俗以四人已上為衆著矣此是平常現㕝西三藏親所聞也有何希緣可誤錯耶又法㐬二本九丁云若依四方四人已上是大衆如不曰大衆者四人若過以此證明知三人名小衆又二未二左云依十誦大衆八人小衆四人此律四人為大衆二三人為小衆異如報思辨文四向乃至聲聞身等者謂四果聞身中無漏五薀為僧寶體非獨覺菩薩無漏蘊彼非僧寶故七十等者第二經法分別無表中道俱無表通佛寶僧寶余無表非心王中無漏第六意識通佛寶僧寶余非也大地法大善地法尋伺四相無漏方佛寶僧寶通擇滅唯法者自他相續及非情數一切薀滅為法寶體也三藏等者第八𫨻於中二二初釋名并體二經法分別婆沙評家者婆沙百草六十二丁如是說者語業為體佛意所說他所聞故文又婆沙百草六十二丁云佛教當言善耶無記耶或善或無記云何善謂佛善心所發語言乃至語表云何無記謂佛無記心所發語言乃至語表問於佛教中何者善何者無記阿毗達摩素怛藏多分是善是毗奈那藏多分無記如世尊說門應開閉若鉢置竹架龍牙如是等皆無無記放有說佛教若為爾化說應知是善若為余㕝說是則無記如世尊告阿難陀言沙住觀天為兩不兩國中何故高大如是等言皆無說故有說云云有說云云又云聲聞獨覺善心發語善無記心俱淂究竟無記心發語無記善心俱淂究竟佛善心發語善心究竟無記心發語無記善心俱得究竟定無善心發語無記心究竟諸佛說法有增有减故佛處作業定無萎退故佛教名何法乃至廣說問何故復作此論前𧈧顯示佛教自體而未顯示佛教作用今為顯示故作此論佛教名何法謂名身句此文此次第行列次第安布次第連合此則總顯佛教作用文即是七十等者第二經法分別謂佛教體者七十五法中無記聲也若約佛教依用者七十五法中名句文也則如上所引婆沙說戒等三學者第九𫨻於中二初釋名出體二經法分別無漏戒者在未至中間四根本無漏定者在未至中間四根本下三無色地三種戒等者第十𫨻此中二初釋名出體二法分別別解脫等者論十四四丁謂受戒時初表無表別別棄捨種種𢙣故依初別捨義立別解脫名云云全文知有尋有尋等者第十一𫨻此中二初列名出體二經法分別論草八十七丁云云正理七十九初丁顯宗卅九十丁云云淨等者第十二𫨻此二初列名出體二經法分別論草八五丁云云十三丁婆沙百六十二九丁發智論十七十二丁正理七十七十丁顯宗卅八五丁三定者上八地前七地中各有三有頂地唯在二謂味淨淨定者此有四種一順退分攝三順勝進分攝四順分攝上八地中前七地各有四有頂唯三除順勝進分攝三𡰱牟等者第十三𫨻此中二初列名出體二經法分別論十六三丁云云中含五四丁婆沙百十七十五丁正理四十一五丁顯廾二初丁發智論十一六丁無學身業者道俱戒無學語業者道俱戒無學意者非業也三清淨等者第十四段此中二初釋名二體等釋下讓中𭇥三廾九丁論十六三丁云云集異門足論六五丁婆沙百十七十四丁正理四十一五丁顯宗草二初丁暫永等者有漏暫遠𮥷一切𢙣業煩𢙉故無漏永遠𮥷一切𢙣行煩𢙉故名為清淨也三𢙣行等者第十五𫨻此中二初出體釋名二經法分別論十六三丁頌曰𢙣身業說三𢙣行及貪瞋邪見三妙行翻此云云雜𭇥十四四丁長𭇥八十一丁正理四十一六丁顯草二二丁集異門足論三十四丁發智論十一初丁婆沙百十二初丁又百十二五丁問何故名𢙣行行有何義可猒毀故名𢙣遊履依所故名行云云復有說者减苦受果故名𢙣動轉揵剩故名行云云復有說曾近𢙣人能招𢙣趣故名𢙣行云云復有說有三因緣故名𢙣行謂𢙣思所思故𢙣說所說故𢙣作所作故云云復有說有三因緣故名𢙣行謂𢙣作義故可猒毀便土能感非愛果故云云次色十一中無表者中字脫色及二字歟三妙行等者第十六𫨻此中二初出體釋名二經法分別論十六三丁三妙門者翻此應知謂此語意一切善業非業無貪無瞋正見文集異門足論三十三丁發智論十一初丁正理四十二初丁顯宗草二初丁婆沙百十二十四丁云問何故名妙行妙行有何義答可欣讚故名妙遊覆所依處故名行云云復有說者感樂㕝果故名為妙動轉揵剩故名為行云云復有說云云有說云云復有說有三因緣云云復有說者有三因緣云云三明者第十七𫨻此中二初列名出體二經法分別論草七十五丁集異門足論六八丁正理七十六十五丁顯卅七十二丁婆沙百二十四丁三明依地前二明四靜慮後一明通一切地依身無學依身也明義婆沙云云三示導等者第十八假北中三初出體釋名二經法分別論草七十三丁正理七十六十四丁顯宗草七十五丁集異門足論六二丁婆沙百三四丁云云三示導依地前二四靜慮后一通一切地依身無學依身也能示能道得示導名者論草七十三丁云唯此三種引所化生令初發心最為勝故或此能引增背正法及處中者令發心故能示能導得示導名云云婆沙百二四丁問何故名示導示謂示現導謂導引現希有㕝引入正法故名示導云云三種三摩地等者第十九假此中二初出體釋名二經法分別論草八十七丁正理七十九初丁顯宗三十九十一丁增𭇥四十一十六丁十五丁中𭇥五十八十五丁婆沙百四六丁云云又婆沙百四九丁云問何故名三摩地是何義耶由三緣故名三摩地一平等故二攝持故三相似相續故平等故者謂無始煩𢙉𢙣行邪見顛倒令心心所倫曲而轉由此定力令心心所於境正直平等而轉故名三摩地攝持故者謂故無始心所法於境馳由此定力方便攝持一境故名三摩地相似相續故者謂無始心心所法善染無記異類相續由此定力前后一類惟善相續故名三摩地次云云復次云云尊者世友云云復次是說云云大德說云云空非我等十六行相論草六十丁是釋此三皆通有漏無漏者有漏謂依十一地謂未至中間四根本下三無色又婆沙百四十二丁三摩地與解脫門別說三解脫門等者第草𫨻此中三初列釋二釋解脫門義三出體論草八十七丁云云正理七十九初丁顯卅九十一丁云云婆沙百四十二丁能與𣵀槃等者論草十八丁於中無漏者名三解脫門能與𣵀槃為入門故文婆沙百四十三丁何故名解脫門𣵀槃名解脫依此三摩地能趣證解脫故名解脫門復次如排揗故云云
