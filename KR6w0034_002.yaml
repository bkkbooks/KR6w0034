body:
  text: 智山沙門釋龍謙撰將釋此章六門分別一講前行法二造章因緣三章傳未四章所依經論五釋章題目無撰號六入文解釋初講前行法者豫如講釋作法記往見旲二造章因緣者如四阿𭇥經文廣義深發智六足者文略義幽逐大毗婆娑論者文廣義旨深俱舍論正理論顯宗論等者文廣堅義幽微而初學者直難入依之釋七十五法名體諸門為入有部大論甘露門故下文曰且為初學略示方隅委細分別廣如別録文三傳者初有部渡漢地㕝二正此章傳此土㕝初有部渡漢地㕝者釋迦如降誕南洲天笁淨飯王家有傳第九減劫出奬三下傳第一減劫出性現佛三昧經説四月八日夜半生長阿𭇥四十四一二月八日生摽指抄四四十一佛所行三昧經三月八日生因易經四月八日佛生月日諸説不同如破邪論上十三四下九西域二三又六之八及十二法𫟍十四終苑集佛道論衡二三𧁨悉地㐬第四自四僧史略上自甫注十三四十五六止真記五未正九名義集三自二十二統記二八九釋迦譜日經反花戒譯人斟酌出經之人名有所受故往往不同夫以史漢延出猶分猱相反况万里之外千歲之悲哉明昔者固冝擇普而從一之二十四行㕝抄資持記下三之二十五一日僧祗佛生日乃至涅槃日為大衆説法秝揚佛德薩婆多二五一三月八日或佛亦以此日生乃至若依瑞應上四四本經多云四月八日生乃至此並由衆生見聞不同故時篇不等智論云九十七一王舍城十二億家舍婆提城九億家尚三億見或聞由慢業故佛猶尓何况末法轉輕心業最重文寶疏一為紙出家成道出家或道年記不同一曰十九歲出家三十成道一云廾九歲出家三十五成道一云十九出家廾四成道一云二十五歲出家三十成道一云七出家廾成道摽指抄上四十七具引諸文往見長含四草四丁二月八日歲出家成道現佛經四月八日夜成道寶一初丁行㕝抄下三之二十五紙於鹿野説四阿𭇥經玄𮚌一廾丁曰舊同阿𭇥及僧律大衆部義云云轉法輪諸説不同菩薩所胎經二月八日婆沙百八十二十三丁迦栗迦月日半八日寶一初丁如滅后迦葉阿難等結集此經弘傳結集義林章二本初已下廣釋三論玄並幽抄五草六丁滅后至百十六日大衆部上座部分破乃至至三百年初從上座部中有部分破至二百年末迦多衍尼子等造發智六足論等釋此經令法久住至四百年中五百阿羅漢等造大毗婆沙論釋顯發智論至九百年中親大士造俱舍論等而先覺鎧三藏譯婆沙號舊婆沙等真諦三藏俱舍論譯具如傳通記上五丁釋後獎三藏渡天唐第二主大宋貞觀三年渡天在笁十七年同十九年皈唐至北渡境迦濕羅國法救論師寺逢大論師僧伽那舍此云衆特善薩婆多及因明明論創從考決便曉玄猷大巟上意恩傳二十七丁至迦濕羅國乃至彼師法師者高行之人乃至彼公是時年向七十氣力已衰慶逢神器乃力教揚自午已前講俱舍論午已後講順正理論初夜後講因明聲論由是境內學人無不悉集法師隨其所説領語無遺擊篇盡其神祕云云又從戒賢論師𥊸順正理論恩傳三十九丁在天十七年中傳受大小乘已皈朝發智論集異門足論法薀足論識身足論品類足界身足論俱舍論順正理論顯宗論等瑜伽論等大小乘論及譯弘宗也二正此傳此土事者推法相宗傳第一傳道拓第二傳智通南第三傳新羅智鳳等智鸞知雄三師第四傳玄昉時東傳此章歟護命僧正傳新羅智法師義立有為因生滅義體不生滅南寺傳余先者立有為體生滅義體用共生滅寺傳具如傳通記等四章所依經論者通者四阿𭇥發智六足大毗婆沙師論等別者俱舍論為所依也五釋章題目并撰號此中二初釋題目二撰號釋初題目者若西土者經論等梵本題目置文終無文首漢土格式者置文首經論譯時皆首置也今章文首題置漢土格式也十住心論冠玄傳十五丁日凡西笁經論文後置題東土方圓卷首安名故金剛頂義譯卅一丁云題云此是金剛金剛薩埵三摩地一切如菩提智第一釋曰此題目也梵本皆列于後又引菩提流支薩𡰱乾子經注以成此義然考現本無有此注意後人刪削若又留支別有彼經注不可知焉又所以又初安題者凖地藏經鼓吹引顯要記云晉朝道安法師有四義故初安經首一者人見經題目知部法故二者為智者略知能廣解故三者為簡異餘部易見故四者為忩迫㐬生假見經題獲益故云云又法華遊意曰依梵本皆無題但云悉曇此云吉法亦名成就立名皆在經未而廽後置初蓋譯經人隨震旦國欲令因名字不同識部類差別故也上廾一丁右又維摩遊意二十右亦云法宗原者法名義何謂光第一廾六第一曰釋法名有二一能持自性一切法各守自性如色等性常不改易䡄生勝解如無常等生人無常等解以上唯識逑記一本五十云法謂軋持䡄謂䡄可生物解持謂任持不捨自相文瑜伽倫記十三下三右云梵語陀羅唐名持戒梵語逹摩亦是持義然㨬故名法文法自性者即有為無為七十五法也宗者宗輪述記曰宗者生也乃至又宗者所崇之理已上原者本也法之宗法宗之原二重依主釋或法宗法宗即原二重持業釋也次釋撰者此中二初安置所由二正釋初謂凡安撰㕝有三因行㕝抄題于注云作者非無票名顯別中盡題下云著作者多立名票異大覺抄比云今抄始不安撰號祖師南山適至相部見礪師礪師問云從何自北京問云風聞首師門人有道宣𫽄理聰明汝知否云知之弟子是也即大驚歎又問近見首師抄三卷大要道云師不作此抄但有疏九也卷礪自出抄呈之宜云是弟子撰耳礪大如敬色於此安撰號次人法相依者報恩經六十一丁云顯法是佛師而非佛不弘止觀四一之丁法自不弘弘在人能行法門光顯也宗輪論疏四十丁華嚴玄談三十三紙付法𫇥二上十四丁後依人信法者論注上初云因人重法故云某造益為生信宗疏四一如上三因初一作者自置後二因后人代置今此章撰恐后人所立歟贊大乘不呼金名欠上一字似二名不遍諱意大乘先者大者具七義形小教為名乘運載義濟行者為目若乘若大問依一體名同依釋具體大法能有運功故名持業對法抄一十六紙同梁論一六丁言大乘欲簡小乘玄贊四五右云乘者運載義廣雅云乘駕也周禮云乘載也運載行者至彼岸故問因行能運至杲可名乘佛杲自運息應非是乘體五義云云攝釋一十四丁右云按大集經云其乘廣大故於諸衆生無礙障故是一切智善根本故無有煩惱諸浩黑暗故所有光明無處不遍故周遍其有眼目故本性常淨故初無治污故諸斷煩惱一切間亇故名大乘準此經文通根有為無為二種功法廣如彼説又十二門論首云問云何故名摩訶衍摩訶衍於二乘為止故名大乘諸佛最大是乘能至故名為大謂佛大人乘此乘故名為大又能滅除衆生大苦與大利益事故名為大又觀音得大㔟文殊等諸大士所乘故名為大又以此乘能盡一切諸法邊底故名大等云云光者異云普光大乘光者宋高僧傳四六丁日釋普光未知何許人也明敏為性爰擇其本請㕝三藏弉師勤恪之心同列靡及至于智解可召循環聞少證多弉師點許末參傳譯頭角特高左右三藏之卷有功焉初獎嫌古翻俱舍義多鈌尓躬得梵本再譯真文乃密授光多是記憶西薩婆多師口義光因著㐬解判一具㐬至圓暉略之為十卷如漢之有絶絶言釋云達阿功江之別流也歟又隨獎往玉花宮譯大般若經厥㓛出于禆湛也取大乘光觀夫弉自貞觀十九年創譯記麟往元年終于玉花宮凡二十載總出大小乘經論七十五部一千三百卅五卷十分七八是光筆受或謂嘉光普光也若驗從棧同參譯務即普光是也矣法師者文句法䡄則師者訓進𧈧可記不自弘通此弘在人十住毗婆沙師論云應行四法名為法師一廣多學能持一切言辭章句二決定善知出間諸法生滅三得禪定智於諸經法隨順無諍四不增不減如所説行云云中邊論下六丁説十種法師法花五説五種五師大乘義章十六八丁説二十二種㓛𭛟云云撰者資持記上一之一九右日撰逑者通而為詮撰亦是述今既兩摽故順別釋撰謂橾觚染翰詮次成章述謂謙己推他相循轍文依説一切等者北下第六入文解釋於中大二初正宗分二流通分初中二初摽二釋摽列中三初惣摽列二別列三結釋初中二初摽二列別列中五初色法列二心法列三心所法列四心不相應法列五者無為法列依説一切等者宗輪述記下七丁曰説一切有者有二一法色心一切謂五法即心心所色不相忍行每為二一切謂去今文余者可知就中木者以下第一釋此中二初分科二述釋略釋以下於中二初標二釋釋中五初色二心三心所四不相應五無為初中二初摽色十一釋色義二十一色別釋此中七初五根釋二色三聲四香五味六觸七無表初中二初眼根二余如根類釋可反礙故名色如無表者所依四大反礙生故名色俱舍論一十丁曰何故此薀色無表為後説為色耶由反壞者故如尊苾芻當知由反礙故名色取薀誰能反壞謂午觸故即便反壞乃至廣説反壞乃是可惱壞義品中作如是説趣求謂欲人常起於希望諸欲若不遂惱壞如箭中色復云何欲所惱壞欲所擾惱反壞且故有説反礙故名為色若爾極微應不名色無反礙故此難不然無一極微各據而住衆微聚集反礙義成過去未應不名色此亦曾當有反礙故故及彼類故如所燒薪諸無表色應不名色有釋表色有反礙故無表隨彼亦受色名譬如樹動影亦隨動此此釋不然無反礙故又表滅時無表應滅如樹滅時影必隨滅有釋所依大種反礙故無表業亦得色名若尓所依有反礙故眼識等五應名亦色此難不竒無表依止大種博時如影依樹光依珠寶眼等五識依眼木時則不如是唯能為作助正緣故此影依樹光依寶言旦非符順毗婆沙師義彼宗影等顯色極微各自依止四大種故故設許影光依止樹寶而表無色不同彼依彼許所依大種𧈧滅而無表色不隨滅故是故所言未為釋復有別釋佊所言眼識等五所依不定或有及礙謂眼等根或無反礙謂無間意無表所依則不如是故前所定為不有反礙名色得成就文婆沙七十五法十二丁已下色義釋正理二九丁眼謂內處等者初五根釋中二初眼根二余四根類釋內處簡外非情顯內有情處能見色境文見者觀義也眼根能觀色境光記二四十丁見二種一觀名見二推度名見云云婆沙十三初丁云有執眼識見色如尊者法救有執眼色相應惠見色如尊者妙音有執和合見色如譬喻者有執一眼見色如犢子部為止如是異執顯示己宗二眼見色故作此論云云四大所造淨色為體者簡大衆部大㐬部五根肉團為體宗輪論疏五十四丁品類足一二丁婆娑十三九丁論一四丁二七丁光二八丁有色者有反礙相名有色廣如婆沙七十五十三丁十二丁有見者無能現所現及可示現在此在彼義名無見如論二初丁婆娑七十五十六丁下釋十二右非有眼見名為無見文有𭔹者下十二右曰有障礙故為有對文論二初丁婆娑七十六初丁乃至者二余四根類釋乃至言觸耳鼻舌身色諸外處等者第二色處釋此二初惣釋二別二十色明論二十一丁曰六根六識十二名內外謂余色木六境云云二七右曰五色根色木四境法界一分無表業色亦唯所造文婆娑七十四初丁內外建立廣釋色有二十木者論一六丁曰言色二者一顯二形顯色有四青黃赤白余顯是此四色差別形色有八謂長為初不正為后或二十者顯色處復説二十謂青黃赤白長短方圓高下正不正雲𤇆塵霧影光明暗有餘師説空一顯色第二十一此中正者謂形平等形不平等名為不正地水氣騰説之為霧日焰名光月星火𦰔寶珠電等諸焰名明障光明生於中余色可見名影羽此為暗余色易了故今不釋云云正理一十九丁顯架二二丁光記一六十丁曰言長短者長短極微名有差別相雜而住形長見短形短見長問若長短等別有極微何故婆娑一百三十六四丁云應加極微是最細色非長短方圓解云婆娑據別一徵是最細分更不可折非眼見言非長等此論據見已去有實體類成故長等故名長等若泛明長短亦通假實𠰥二十種色中長短相𭔹以實對實𠰥通約諸假聚相對亦長短品以對假故婆沙第九解諸有中第三師云五相對有謂此彼岸事又解木又解寶六右有破可量已去名長不可量者名短間形長短為短者於彼長中假説為短如於重中假説為輕聞此短極微既有衆多如何説佊而不可量解云𧈧有多體而不可量如輕極微𧈧有多體而不可稱短極微𧈧多而不可量若言眼見非不可量顯亦眼見應當可量若言同聚應可量者香等同聚亦應可量光既雜住而不可量短與長雜亦不可量方謂果方圓謂周圓中凸名高中凹名下問長與高何別短與下何殊解云長短據四邊高下據處中然人言物高下於長短中説高下故又解寶七破長短據橫高下約竪間立竪名長短者於高下中説長短故龍氣名雲火氣名𤇆風吹細土名塵余色如文自釋云云婆娑十三九丁色處者二十乃至有説色處有二十一謂前二十及空一顯色云云謂木者第三釋此中二初惣釋二別明有種五事論下十三丁有一種乃至廣説云云婆沙十三十丁八種二説顯宗論二二丁正理一廾丁舊俱舍一十丁新俱舍一七丁入論一二丁光記一余六丁云云又俱舍論舉破有説雜心論一十二曰有説有種通有執受及無受執大種為因如牛鼓木合所生如不許一顯色極微二四大造亦應禾文化語業非業等分別光一余七丁二解一義云化語業有實名定成就云云一義云化語非業非實名示非成就云云今謂第一解正義也第二解未熟寶一余云云未穗一有執受等者差別相隱知約因用杲杲有執受大種無執受大種者因如有情執受大種因聲無執受大種因約因釋有情名者上名句文以詮表備聲名有情色異此名非有情有情名非情名者用由顯故如有情名非有情名為用釋可意不可意為杲因生故生悅意名戀生不悅意名不可意也光一余十五丁云云香等者第四香釋此中二初惣釋二別列四香三香論一七丁四香三香云云品類足一二丁香有二種云云婆娑十三十一丁四香云云正理一草二丁日香謂所嗅此有四種好香𢙣香等香不等香有別故等不等者增益減依身別故有説微弱增盛異故本論中説香有三種好香𢙣香及平等香若能長養諸根大種名為好香與此相名為𢙣香無前二用名平等香或謂諸福業增上所生名為好香若諸罪業增上所生名為𢙣香唯四大種㔟力所生名平等香此𧈧增上杲而亦有差別故唯大種㔟力所生亦是有情增上果攝文顯宗三三丁五㕝論下十三丁曰諸悅意者既名好香不悅意者説名𢙣香順捨受處名平等香云云光一余十一丁曰正理解等不等香有兩釋第一解云增益損減依身別故解云等謂平等香力均平增益依身不等者謂大強成大弱無益損減依身於好𢙣香中有增者名等不等余即是無益無損第二解云有説微弱增盛異故解云微劣是等增盛名不等正理解本論三香亦有兩解第一解云若能長養諸根大種名好香與此相名𢙣香無前二用名平等香入論上二右亦同此解解云縱是𢙣香但能長養諸根大種亦名好香縱是好香若能損減諸根大種亦名𢙣香此師意説但能長養名好香但能損減名𢙣香無長養減者名平等香第解云或諸福業增上所生名為好香若諸罪業增上所生名為𢙣香唯四大種㔟力所生名平等香次師約勝劣處中以解又五㕝論云諸悅意者悅為好香不悅意者為𢙣香順捨受處者名平等香解云約情説故名好𢙣等香論體光記為與正理第二解義亦無違云云又云香相知約情亦云云味等者第五味釋於中二初惣釋二別列六味論一七丁五事論下十三丁日諸悅意者名可意味不悅意者名不可意味與二相違名順捨處味文婆沙十三十二丁味有六種云云顯宗二三丁正理一草一丁論正理顯宗各味次香説顯宗正理云越次説者顯佊境識生無定故文光一四十九丁曰度造頌皆依明若先香後味即犯若先味後香即不犯今依本翻故味先香後云云寶一余三丁光不可觸木者第六觸釋二初惣釋二別列十一觸論一七丁觸有十一乃至柔軟名滑粗強為澀可秝名重翻此為輕暖欲名冷食欲名飢飲欲名濁此皆于因五果名故作如是説云云又曰地水火風能持自相乃所造色故名為果如是四果亦名大種一切余色所依性故體寬廣故或於地等增聚中形相大故或起種種大事用故此四大種能成何業如其次第能成持攝熟長四業地果能持水果能攝大果能熟風果能長長謂增盛或復流引業用既尓自性云何如其次第即堅濕暖動習性地界堅性水界濕性火界暖性風果動性由此能引大種造色令其相續生至余𭤧如吹燈光故名為動品類足及契經云何名風界謂輕等動性復説輕性為所造色故應風果動為自性舉業顯體故亦言輕文婆娑十三十二丁五事論下十二丁顯宗一三紙正記一二十一丁婆娑有草七十三丁曰不由大種遍增故滑乃至渴但由大種性類差別有生滑果乃至有生渴界有余師言水火增故滑地風故澀火風增故輕地水增故重水風增故冷風增故飢謂增故擊動含渻引飢觸生便發食欲火增故渴謂火增故𤋎迫飲渻引渴觸生便發飲欲然無評家正理一廾三丁云問不𮥷滑力則澀重劣在輕軟輕性中攝如是其余所觸種類隨其所應十一中攝云云入論曰由此所逼𤌢欲因名冷食欲因名飢欲因名渴此皆於因立杲名云云覺天計大種外無所造色論二七紙婆娑百草七初丁言無表者此下第七無表色釋於中二初牒票二解釋此句初也無表者親家譯若北涼曇無懺譯涅槃經善生經秦羅什譯智度及成實宋僧伽跋摩譯雜心論等並名無作符秦僧伽提婆譯八揵度論宋僧伽跋摩譯薩婆多論梁真諦譯舊俱舍等名為無無表色等者第二釋於中二初釋名二差別釋無表釋名論一九丁云云入論云無表者謂能自表諸心心所轉及差別故名表與彼同類而不能表故名無表此於相似言止言如於剎帝利等説非婆羅門等文正理二二丁從生者依身語表業生故云也陽心轉者隨定心轉故處中者處律儀不律儀中焉故云處中邊論十四初丁論云非律儀非不律儀也亦入論云云如下引非律等者身語業𧈧義非是律儀以不要期𣵀槃起故𧈧起衆𢙣而不要期一期活命故非𢙣律儀攝也如倫記十四上飾宗記二義林章云不可儀䡄同於律儀名非律儀非不可則如不律儀名非不律儀既有雙非亦非六釋三未七丁別解脫者釋名論十四四右曰謂受戒初表無表別別棄捨種種𢙣故依初別捨義立別解脫名云云別解脫釋名無表疏上卅三丁淨影章十廾丁行事抄中一廾丁義林章三未五丁梵約疏一廾丁清涼玄談三四十丁對法論八十丁雜心十六丁光十四八右釋云謂初念表無表不殺戒等別別棄捨殺生業等種種𢙣故依初別捨義立別解脫名云云別解脫律儀異名論十四三右曰頌曰俱得名尸羅妙行業律儀唯初表無表名別解業道文論云別解脫律儀相差別有八一苾芻律儀二苾芻尼律儀三正學律儀四勤䇿律儀五勒䇿尼律儀六近事律儀七近㕝女律儀八近住律儀如是八種律儀相差別總名第一別解脫律儀𧈧有八種實體唯四一苾芻律儀二勤䇿律儀三近㕝律儀四近住律儀唯第四種別解脫律儀皆有體實相各別故所以者何𮥷苾芻律儀無別苾芻尼律儀𮥷勤䇿律儀無別近㕝女律儀云云入論云如是八種惟欲界繫文隨心等者定俱入論云靜慮律儀謂色界三摩地隨轉色此惟色界繫文道俱者入論云無口律儀謂無口三摩地隨轉色此惟不繫文此無漏戒依地者唯在無口未至中間四根本六地非余成尤通三果身除無口無處天梵三𢙣趣處中戒者入論云非律儀非不律儀者謂造毗阿羅窣堵波僧伽羅摩等及禮制多燒香散花讚誦願等并捶打等所起種種善不善無表色相疑轉文𢙣戒者論十四八丁右曰𢙣行業不律儀云云論十五四丁不律儀者明婆沙百十七初丁云云入論云不律儀者謂諸屠兒及諸獵獸捕鳥捕魚劫盜典獄縛龍煮犳置弶膾此等心中不善無表色相續縛文論中十五四丁雜心三十丁婆沙百十七初丁正理三十六十一丁二十九二丁顯宗草十丁大乘瑜伽九六丁對法八三丁義林章三未卅四丁對法八卅三丁倫記上九丁大乘義章七八丁北涅拌廾九十五丁説十六不律儀也第二心法者第二心法釋此中二初牒摽二解釋俱舍論一十二右頌曰識謂各了別此即名意處及七界應知六識轉為意論曰各各了別彼彼境果惣取境相故名識薀云云四十三丁曰集起故名心思量故名意了別故名識復有釋言淨不淨界種種差別故名為心即此為他作所依止故名為意作能作止故名為識故心識三名所詮義𧈧有異而體是一云云婆沙七十二初丁正理十一十九丁顯宗六十一丁入論云云光記四四十二右日梵名質多此云心是集起義謂理由心力集起心所及業等故經云心能導間心能遍攝受故能集記説名為心梵云末那此云意是思量義梵云毗者南此云識是了別義也文六識體一體別之異義一義云六識體一非體別一云云一義云六識體別非體一云云具如別記第三心所法四十六者者此下第三心所法釋於中三初牒標二解釋此中三初心所釋名二辨心所相三七右廢立心所有等者婆沙十六十二右曰問何故名心所是心所有故文光記四十一右曰心之所有故名心所應言心所有略故但言心所猶如我所文就中等者第二并心所相此中二初正辨相二結釋初中六初大地法釋二大善地法釋三大煩惱地法釋四大不善地釋五小善地法釋六丁六不定地法釋大地法釋中二初牒票二解釋此中三初釋名二廢立三并相大有地法一者音牒摽地者至應知釋名謂此木句立論四三丁右曰地謂行處若此是彼所行處即説此為彼法地大法地故名為大地此中若法大地所有名大地法釋名謂法恆於一切心有文廢立正理十一三丁顯宗五十八丁婆沙四十二十七丁十六十二丁云云又秦疏四八丁日猶論師五義建立通大地二通三界二通六識三通三性四通漏無漏五通並顯起余此六不旲五義故不言也長耳三下具八通無八居五通大地體法師旲九義言通大地今依俱舍但一義立謂遍於一切心余此六不通一切心故不定也文受者正理第十一三丁云云顯宗五十八丁俞四三丁一十一丁受薀謂三領納隨觸即樂及苦不苦不樂文正理二十三丁隨觸而生領納可愛及不可愛但相違觸名為受薀領納即是云能受用義云云又云諸受略有二緣境自性受者謂能領納自處隨觸故乃至𧈧受亦能領納境界而此領納自性知故領納觸為自性受此不共余易了差別如是諸受與心等法同所緣受故此異領納故所緣㕝別處緣㕝別由此觸於受若時為處領是時非所緣若時為處緣是時非所領故緣領㕝別云云入論云領納三隨觸云云五㕝論下草一丁曰是能領納自性隨觸及所緣義彼領於境必有觸故云云憂喜條捨五受發智十四婆沙百四十六俱舍論第三正理第九也想等者光四十四丁日想謂于境執取男女木種種差別相能于境中封疆盡果此是男女亦非男等故名男等正理云安立執立男女等等境差別相解云謂能為可安立草等相念心心所執取女等境差別相是差別相因文思等者思有㔟力能令心王于境運動有造作用理實令余心所法有所造作從強説心故正理云由有思故令心於境有動作用猶如磁石㔟力能令鐵有動用文觸等者光云根境識三和合而生舉可以并以并能有作用觸對前境𧈧心心所對境義邊並應名觸觸對強故偏得觸名故入阿毗達摩云觸謂根境識和合生令心觸境以能養活心心所為順條受等差別有三解云從強令心理實亦令心所觸境若依正理云觸能為受因解云舉果文顯因也欲等者光云欲謂于境能有希求所作㕝業由有此欲心等趣境又入論云欲謂希求所作㕝業隨順精進謂我當作如是㕝業文惠等者元云推求名見決斷名智簡擇名惠謂於諸法能有簡擇約用并也云云念等者光云念之作用于所緣境分明記持能為後時不忘失因非謂但念過去境也正理云於境明記不忘失因説名為念又入論云念謂令心於境明記是即不忘已正當作諸事業義云云作意等者光云作動於意故名作意謂能令心驚覺前境心如睡眠况沒不行由作意力驚覺取境理實亦能驚覺心所從強説心故正理云諸心所法依心轉故但動於意余動亦成又正理云引心心所令於所緣有所驚覺説名作意此即間説為留意雜心名憶又入阿毗達磨云作意謂能令心驚覺即是引心趣境為義亦是境特曾受境等文勝解等者光云殊勝之解故名解勝謂于境可審定是㕝必尓非不如是云云三摩地等者光云持力能令心王於一境轉若無等持心性掉動不能住境從強説心理實亦令諸心所法於一境轉故正理云令心無亂取所緣境不流散因名三摩地三摩地者此云等持即平等心心所法令專一境有所成并故婆沙百四十一十二丁云問何故名等持平等持心令專一境有所成并故名等持文入論云定謂令心專住一境即是制如猿猴心惟於境而轉義毗婆沙者作如是説如蛇在筒行便不由心若專定正直而轉文定七名如光記六卅九丁瑜伽抄五二丁同記四上二丁述六本上草五丁中邊疏下十八丁第五本卅三丁瑜伽釋十六丁大善地法十者此下第二大善地法釋於中二初牒標二解釋此中四初釋名二廢立三并相四示諸論不同大善地等者牃票地如等者釋名謂此十法唯遍善心者廢立邊論一四右曰大善地法名大善地此中表法大善地所有名大善法謂法恆於諸善心一有云云正理十一六丁顯宗五十九丁婆沙四十二十八丁曰若法唯在一切光云今依此論一義廢立大善地法十謂唯遍善心大地十𧈧善心而非唯善心余心所法非唯善心亦非遍善心故皆不名大善地法文泰疏四九丁云猶命師具五義建立大善地一通三果二通六識三通口無口四并顯五唯是善今頌但一義釋謂唯通三性故遍善心簡余草六數不遍善心文寶疏四十三丁云諸心所中有唯是善不遍善心欣厭也有遍善心非唯是善謂大地法有唯是善亦遍善心謂信等下有不遍善心及非唯是善謂尋伺二睡眠𢙣作唯染心所非善性加善言已蕳文善心中可得名大善地法云云信等者此下并相信者光云信謂令心澄淨理亦能令余心所澄淨從強説心由此信殊在心皆得法淨故入論解信云是能除遣心濁穢法如水精珠置於池內令濁穢水皆即澄淨如是信珠在心心池內心諸濁穢皆應除遺云云或於等者論有説云云諦者四諦等者等三寶善𢙣業異熟果等也不故逸等者光云謂能冬諸善法名不放逸即放逸文相違輕安者論廣云云光云謂心堤任性者輕安謂能令心於善有所湛任故正理十一六丁云正作意轉身心輕利安適之因心堪任性説名輕安又入論云心堪任性説名輕安害惛沈隨順善法文有部意心輕安第六識相應通口無口通定散身輕安五識相應唯有口唯散意聖部意心輕安是心所而無別體即思差別唯定心有於散無五識相應理即非有輕安是輕觸捨等者光云令心平等性從強説心亦令心所或心之平等性無驚覺性如持稱縷掉舉相違説名為捨故入論云心平等性悅名為捨捨背非理及向理故由此㔟力令心於現及於非現無向無背字等而彼如持稱縷又正理云心平等性説名為捨掉舉相違如理所引令心不越是為捨義文慙等者愧等者論四十一丁云云入論云云正理顯宗婆沙云云無貪等者光云於諸境界無愛染性説名無貪貪相違也無瞋等者光云於情非情無恚害性説若無瞋性相也不害者光云心賢善性無惱他名為不害能違害也勤等者光云勤謂令心勇悍為性即勤斷二𢙣勤修一善無退也懈怠相故入論云精進謂於善不善法滅生㕝中勇悍為性即是沈溺生死泥者能業䇿勵心令速出義云云若依正理等者第四示諸論不同正理十一七丁婆沙二十八十五丁云有説猒以惠為自性云云有余師云猒以無貪為自性云云評曰有別法名猒非𢙣非無貪是心所法與心相應云云百九十六十二丁三説廾八同又婆沙一百四十三十二丁亦別言欣猒又婆沙七十五二丁云問若尓猒欣怖有何莂即名差別謂佊名猒此名怖尊者友作如是説怖惟欲界猒通三果復作是説怖在煩惱品猒在善根品復作此説怖通染無覆無記猒唯是善大住説曰於衰㕝深心於慮欲得遠𮥷説名為怖已淂遠𮥷深心增𢙣説名為猒如是為怖猒差別云云欣猒非並記𧈧唯善非通善通口無口唯意識相應非五識相應也又入論云欣謂欣向於還滅品見㓛往已令心欣慕隨順修善心有此故欣樂涅槃與此相名欣作意猒謂猒患於流轉不見過失已令心猒𮥷隨順𮥷染心有此故猒𢙣生死與以相應名猒作意文大煩惱等者第三大煩惱地法釋於中二初牃票二解釋此中三初釋名二廢立三辨相大煩惱等者牒摽地如等者釋名謂此六法等者廢立論四五右大煩惱法地名大煩惱地此中若法大煩惱地所有名大煩惱地法謂法恆於染污心有法佊是何頌曰癡逸怠不信惛掉恆唯染文正理十一七丁顯宗六初丁婆沙四十二十八丁云若法一切染污心中可得名大煩惱地法云云𬇦疏四十一丁云自古師諸師亦五義建立一通三果二通六識三通二輪四並顯起五唯不善友無記今依俱舍但一義釋謂恆唯染恆簡可教唯染簡遍十也文寶疏四十六丁此有四句有唯染非遍謂忿覆等及貪瞋等并無慙等有遍染非唯謂通中十有遍亦唯謂大煩惱地非唯非遍謂即尋伺睡眠𢙣作唯善心所非染性故染言已簡文無明等者此下第三并相無明者論四二丁云此中癡者謂所愚癡即無明無智無顯文婆沙四十三三右云云何無明三果無智此説應理謂三果繫無智共攝諸無明故若作此説不知三果名無明者則應不攝緣滅道諦二種無明佊不緣三界故文又婆沙卅八八丁云評日應作是説如是無明于四聖諦一向暗昧一向不明了一向不譯以為自性無明不共云云無明相婆沙卅八八丁一解云不共無明見斷有説五部皆有云云光云癡謂愚癡於所知境障如理無辨了相説名愚癡眼名明審名智彰了名顯此三皆是惠之別名也無明故名為無明無知無顯即是無癡所對除法云云放逸等者光云逸謂放逸不修諸善恐濫無記故言是修諸善即不放逸所對法治文又正理云於專己利棄捨縱情名放逸怠木者論同可知又正理十一八丁云怠謂懈怠於善㕝業欠減勝能於𢙣㕝業順成勇悍無明等流名為懈怠由此説為鄙劣勤性勤習鄙穢故名懈怠文不信者論可知又正理云不信者謂心不澄淨邪見等流於諸諦實靜慮等至現前輕毀於施等因及於佊果心不現許名為不信文惛沈等者論四三丁右云惛謂惛沈對法中説云何惛沈謂身重性心重性身無堪任性心無堪任性身惛沈性心惛沈性是名惛沈對法此是心所如何名身如自受言故亦無失文正理云怪安處治文掉舉等者論同光云即實亦能令心所不靜從強説心正理論説捨所對治文又論中并本論十大煩惱地法與大煩惱地法相對四句分別大不善地等者第四大不善地法釋於中二初牒標二解釋此中三初釋名二廢立三并相大不善等者牒標地等者釋名謂此二法者廢立論四六丁右云大不善法地名大不善地此中若法大不善地所有名大不善心謂恆於不善心有佊法是何頌曰遍不善心無慙及無愧文婆沙四十二十八丁云若法一切不善心中可得名大不善地法云云𬇦疏四十二丁云古師亦以五義建立一道六識二通二相三並頭起四唯不善五唯欲界今依俱舍但一義釋謂唯遍不善心唯簡通十遍不善心簡此四欲此解不爾如大煩惱地法六尋伺此八既遍不善心云何轉遍不善心簡應以唯不善心簡司大地十以上可又善地已下未寶可等云云寶疏四十九丁云此有四句有不善非遍不善謂忿等七及不定中嗔有遍不善非唯不善謂大地十大煩惱六不定中尋伺有遍不善亦唯不善謂不善地二法有非唯不善非遍不善謂小惑三不定之中睡眠𢙣作貪慢疑等唯善心所不善已簡不勞唯遍文正理十一八丁顯宗六二丁無慙等者并相論四十丁云有余師説於處造罪自觀無恥名曰無慙觀他無耻説名無愧若爾者此二所觀不同云何俱起不説此二一時俱起別觀自他爾有無耻視自眨勝説名無慙復有無耻觀他時增説為無愧文婆沙説五種大不善地法婆沙四十二十七丁云大不善地法有五種一無明二惛此三掉舉四無慙五無愧文小煩惱等者第五小煩惱地法釋於中二初牒票二解釋此中四初釋名二廢立三并相四示諸論説不同小煩惱等者牒票也地等者釋名謂此等者廢立論四七右云小煩惱法地名小煩惱地此中若法小煩惱地所有名小煩惱地法謂法少分染污心俱乃至如是類法唯盡所斷意識地起無心相應各別現行故名為小煩惱地法文婆沙四十二十八丁云若法少分染污心中可淂名小煩惱地法乃至又此十種唯修所斷唯在意地若一起必無第二五相迸故名小煩惱地法文正理十一九丁顯宗六二丁泰疏曰十三丁故名小煩惱地法文正理十一九丁顯宗六二丁泰疏曰十三丁古師亦以五義建立一不通三果二不通六識三不通三性四不通三輪五別頭起今依俱舍以三義建立一如是類法唯修所斷二意識地起三無明相應各別現行具此三義名為小煩惱地法寶疏云一唯修所斷二唯意識地起三唯無明相應四各別現行大善地法不與一切染心相應煩惱之名以簡此法尋伺𧈧通染心欠四義故不名為小煩惱地法大煩惱地大不善地𧈧復唯與無明相應欠三義故不淂名小慢疑二種𧈧唯意地起唯無明相應各別頭起非唯冬斷欠一義故不淂名小𢙣作一種𧈧唯斷唯意地起以非唯與無明相應𧈧別頭起不名為小睡眠一種𧈧唯意地欠三義故不名為小貪瞋二種復唯與無明相應各別頭起欠三義故不名為小前之四地皆名為大此一地不淂大名者通大地法以遍一切心故名大大善地法以遍一切善心名大大煩惱地以遍一切善心名大大不善地以遍一切不善心故名為大又上四地法皆並頭起故名為大文忿木者此下辨相忿等者論同如文可知論草一五丁無慙慳掉舉貪等流無愧眠惛沈無明等流癡忿是瞋木流悔是疑等流有説覆是貪等流有説是無明等流有説是俱等流有知無知如其次第乃至誑憍是貪等流害恨是瞋等流惱是見取等流諂是諸見等流文如言何由謂諸𢙣見故定是諸見等流光四四十二丁云憍謂染著種姓色等自法為先令心傲逸於諸善法無所顧性故婆沙四十三八丁云此中憍者謂不方他但自染著種姓色力戝位智等心傲逸相文若依正記等對示諸論説不同可知不定八等者第六不定地法釋於中二初牒票二解釋此中三初釋名二相辨三示婆沙説不定八者牒票不定八等者釋名尋等者辨相論四十一丁廣云云正理十一十六丁顯宗六九丁婆沙四十二十二丁云或有執尋伺即心如譬喻者為彼執顯尋與伺是心所法或復有執尋伺是假為佊執顯此二種是實有法故作斯論何尋答諸心尋求辨了顯示推度搆盡分別類是謂尋諸心尋求等名𧈧有異而體無差別皆為顯了自性故云何伺答諸心伺察隨行隨轉隨流隨屬是謂伺諸心察等名𧈧有異而體天差別皆為顯了伺自性故尋伺何差別答心性名尋心細性名伺是謂差別乃至有説云云有余師云云評日應作異説此中顯示即一心中性名尋細性名伺若作是説顯一心中有尋有伺尋令心伺令心細云云睡眠等者婆沙卅七八丁廣云云宗輪述記上四十七丁云云𢙣作等者論四八丁云𢙣作者何𢙣所作體名為𢙣作應知此中緣𢙣作法説名𢙣作謂緣𢙣作心追悔性如緣空解脫門説名為空緣不淨天貪説為不淨又見世間約所説依能依事如言一切村邑國土皆集會𢙣作即是追悔所依故約所依説先𢙣作又於杲體假立因名如説此六觸處應知名宿作業若緣未作㕝云何名𢙣作於未作事亦立作名如追悔言我先不作如是㕝業是我𢙣作何木𢙣作説名為善謂於善𢙣不作中心追悔性與此相違名為不善此二各依二處而起文婆沙卅七六丁云此中𢙣作惣有四句一有𢙣作是善於不善處起二有𢙣作是不善於善處起三有𢙣作是善於善處起四有𢙣作是不善於不善處起文貪等瞋等可知論十九初丁貪分二欲貪有貪云云慢等者慢或七或九發智論草九丁品類足一三丁論十九十丁婆沙四十三十七丁百九十九八丁婆沙四十三八丁云憍慢何差別乃至此中慢者謂𭤧於他種姓色力財位智等自舉特相文又云評日應作是説非一切慢要方他起無始時數習力故依自相續慢亦現行云云疑等者如文性若依等者三示婆沙説婆沙四十五十五丁云睡眠𢙣作怖尋伺及心又婆沙七十五初紙云怖以何煩惱為自性有説以有身見為自性云云有余師説以愛為自性云云復有説以無知為自性云云評日應知作是説此所起中應別説怖所以者何別心所與心相應是怖自性云云問此怖自性於何處有答在欲界有非上二界云云問異生聖者誰有怖耶有説異生有怖聖者無怖云云評曰異生聖者二皆怖云云問何等聖者有余小怖為有學位無學位耶有説惟何等聖者余小怖云云評曰學無學位皆容有怖學謂預流一不還者不學謂阿羅漢獨學除佛尊佛無恐怖毛竪㕝於一切法如實通達得無畏故云云上等者第二結釋也婆沙更説欣猒怖心所法薀足論第八四丁雜㕝品中更説有衆多小煩惱名云云正理十一九丁云云光四草七丁諸論説不同了簡云云問心所等者第三廢立此中二初問二答此中二初惣二別此中二初約正翻釋二約傍翻釋諸經論等者婆沙説四十九心所法薀足論説種種小惑名也如大地等者大地尋伺眠通三性𢙣作通善𢙣二性也西方師義𢙣作通三性也余等者大煩惱地大不善地貪瞋通五斷遍六識也小惑唯修斷不通五斷唯意識相應不遍六識慢通五斷唯意我相應不遍六識疑見四斷不通五斷唯意識相應不遍六識也五斷者一見苦斷二見集斷三見滅斷四見道斷五修道斷也惱亂菩提者婆沙四十四四丁多説云云且大説曰菩薩昔居某樹下初夜魔女相媚亂爾時菩薩暫起欲尋中夜魔軍總逼惱菩薩於彼暫起恚尋漸後歇薄復起害尋須覺察即入慈定令魔兵衆推敗隨落文余小惑等文第二約傍翻於中二初總二別此中二初分科二辨相此中二初約并流門二約行相相似門文相易知身正道者五識相應行捨正直者意識相應行捨也第四心不者第四不相意釋於中二初牒摽二解釋此中二初釋名二辨相不與心等者釋名光記四四十六丁二解一義云心不相應簡異心所行謂行薀簡色及無為非行薀故又解心不相應簡薀中諸心所法行謂行薀簡色受想成及與無為非行薀故文寶疏四卅五丁云心不相應者簡心心所非色等性行薀所攝者簡色及無為法是故名心不相應行略結名也廣應言非色非心不相應行今但言不相應行亦淂簡諸法盡言不相應簡一切心心所言行行是行薀簡色無為由此諸論多存略名文論四十三丁不相應但有十四正理十二初丁更加和合性記四四十六丁了簡俱舍論正理論不同云云顯宗六十三丁大乘不相應行説瑜伽五十二十一丁六十五二丁五十六初丁唯識論一草三丁二初丁顯揚論一十四丁雜集論二初丁樞要上未八丁倫記十五下初丁淂等者第二并相此中九𫨻初淂二非淂三同分四無想異熟五無想定六滅盡定七命根八四相九名句文釋淂者均獲或就三名一體通門婆沙三十二十八丁百五十七四丁説淂或就差別百六十二十五丁七説成就實有九十三初丁百五十七初丁光二卅二丁未穩四四十九丁善説也光云得獲成就義𧈧是一而依異門説差別名改於此釋總言一得於中義別立獲成就謂若有法從未此及已夫俱今初淂此法上淂創至生相將成就將名獲若流至現淂已不失名成就獲時不名成就成就時不名獲設有文言淂至生相名成就者於佊獲中説成就故設有文言淂至現在名為獲者於成就中説佊獲故如是名為獲成就別應知若於佊法有獲定有成就淂至相定流入現在世故白有於法有成就無獲如非想見惑無始或無初淂故文寶四卅六丁云云得大淂小淂大淂云淂小淂云淂淂也婆沙百五十八四丁然淂惣有四種在彼法前二在彼法后三每彼法俱四非佊法前后及俱若所得法則有六種一有所淂法唯有俱淂如異熟生等二有所得法唯有前後如三類智邊俗智等有説此等無有俱三有所約法唯有俱后如別解脫戒等四有所淂法唯有俱淂如道類智忍等五有所淂法旲有前后俱約如所余善染污等六有所得法不可説有前后俱淂而有諸得謂擇滅非擇滅必無有法唯有法后淂者現在前時必有淂故文光寶云云所淂法唯有情數法擇滅非擇滅也非情法虛空得無也非得等者第二非得釋論四十八丁正理十二十丁顯宗七初丁無記四四十九紙云謂若有法先未曾失及重得已但今初失此法非得創至生相將不成時説名不獲若緣至現在名不成就不獲𣆅未名不成就不成就時不名不獲設有文言非得至生相名不成就者於不獲中説不成就故設有文言非淂至現在名不獲者於不成就中説不獲故應知若於彼法説有不獲定有不成就非得至生相定流入現在故自有於彼法有不成就無不獲如無生智以於佊智無初非得故文寶疏云云婆沙百五十八九丁云一切非得惣有三種一在佊法前二在彼法后三非彼法前后及俱所不得法亦有三種一有所不得法唯有彼法非淂謂未情數畢竟不生法及入無余涅槃最后剎那心等二有所不淂法通有彼前復后非淂謂余隨應有情數法三有所不得法無彼前后及俱非佊而有非淂謂擇滅非擇滅必無非淂可與法俱以法現在前時是所得必有得故非所得者無淂無非淂故亦無唯有彼后非淂非無始恆或尤彼未捨必起彼類盡故然諸非得性劣故唯成就現在一一剎那約已即捨於未淂彼法及已捨位恆有此非得應知文光寶云云所不淂法唯有情數擇滅非擇滅也非情法虛空非得無也同分水者第三同分者論五初丁有別實物名同分謂諸有情展轉類等本論説此名衆同分此有二種一無差別二有差別無差別者謂諸有情同分一切有情各等有故差別者謂諸有情界地生種性男女近㕝苾芻學無學等各別同分一類有情各等有故復有法同分謂隨蘊處界云云光記五卷初紙寶疏五初丁正理十三十三丁顯宗七三丁婆沙草七四丁同分體一物不相應行蘊攝惟無覆無記性惟有漏通三界異熟及等流云云有餘師説有情同分通善不善無記性攝云云評日乃至前説為善文無想異熟者第四無想異熟釋論五二丁若生無想有情天中有法能令心心所滅名為無想是實有物能未心心所如堰江河此法一向是異熟杲正理十二十丁顯宗七五丁婆沙百五十四八丁云無想天身量五百踰善那壽五百劫有説結伽趺坐云云有説却踞而座如是説者如先入北定所定威儀即以此威儀於復五百劫住文又云出無者説通五斷云云有余師修行云云評日説好云云又云聖者有情前心多那后心多那有説前心多云云有説后心多云云如是説者此㕝不定云云又云佊想或善哉無記云云婆沙百五十四六丁從無想天沒定生欲界問定生何處有説生地獄有説生𢙣趣如是説者定生欲界處處不定云云無想定者第五無想定釋論五三丁如所處説有法能令心心所滅名為無想如是復有別法能令心心所滅名無想定無想者定名相無定或定無想名無想定云云光記五十三丁如前處説有無想異熟法能令心心所滅名為無想如是復復別心不相應行法能令心心所滅名無想定體身中無想名無想者無想者之定名無想定依主釋也或即定無想名無想定持業釋文婆沙百五十一卷至百五十四卷正理十二十六丁顯宗七六丁定感異熟婆沙十九十一丁五説百十八九十丁八説入北定次第婆沙百五十二初丁起北定處處婆沙百五十二初丁有説唯欲界人云云有説亦色界下三定起有説亦第四定起無想天除云云婆沙百五十二三丁云退如譬喻者不退有部也婆沙百五十一十四丁云𮥷第三遍淨天染此定現云云二無心定大乘唯七卷述記七本六十二丁六十八丁燈五未演祕六本對法論對法抄五六丁瑜伽十二廾丁五十六初丁六十二七丁卅二十四丁唯識論一廾七丁智論卅九初丁瑜伽抄十五四十一丁十五下初丁十七下十丁八上十七丁十四上草丁瑜伽抄十五初丁十六七丁十三六十八丁九十丁樞要上未草一丁對法抄五三十六丁燈二未四十五丁演祕二本五十丁隨滅尓所心心法等者滅第六意識大地法大善地法欣猒草三心心所示所物現前為此定體也光五十六丁滅盡定等者第六滅盡定釋論五四丁復有別法能令心心所滅名滅盡定云云婆沙百五十二十四丁云問此滅盡定多物為體有説此定一物為體若滅現前即名無心問曰何一滅剎那現前即名無心如一受剎那現前即名有受一想剎那現前即名有想一識剎那現前即名有識如是一滅剎那現前即名無心斯有何過有説此定十一物為體以十大地法及心滅故有説定二十一物為體以十大地法十大善地法及心滅盡故如是説者隨滅示所心心所法即有示所物現前為定體云云又百五十三三丁云問入滅盡定時滅何等心心所法為過去為未來為現在若過去者已過去滅復所滅若未未未至云何可滅若現在者現前不住何滅設非定力亦自滅故答應作是説滅於未問未未至云何可滅住現在於未心心所法令不相故説為滅如斷城路閉門竪幢不令人入出説名除冠此亦如是有説通滅未現在云云光五十五丁婆沙百五十至百五十四正理十二十八丁顯宗七八丁滅定入心有漏出心有漏無漏婆沙百五十三二丁三説隨滅尓所心心所等者滅意戈大地法大善地法欣猒草三心心所有尓所物現前為北定體光五十六丁命等者第七命根釋論五八丁云命體即壽故對法言云何命根謂三界壽北復未了何法名壽謂有別法能持暖識名為壽云云正理十二六丁顯宗七十三丁婆沙草七三丁云有説命根體是多物云云評日應説命根體是一切有一命故名有命根云云唯異熟增上名根者論三初右云根是何義最勝自在光顯名根由此總成根增義文光三初右云云婆沙百四十二八丁云問何故名根根是何義增上是根義明義是根義現義是根義喜觀義是根義端主義是根嚴義是根義最義是根義勝義是根義主義是根義云云生住異滅等者第八四相釋論五十二丁云頌曰相謂諸有為生住異滅性論曰由此四種是有名相法若有此應是有為與此相違是無為法此於諸法能起名生能安名住能衰名異能壞名滅性是體義文正理十三十丁顯宗七十四丁婆沙從卅八十三丁至卅九十三丁大小四相各有三名大相三名者一名本相二名大相名生住異滅小相三名者一名本相二名小相三名生生等光五卅八丁具釋論五卷十三丁云四本四隨於八于一切能別故何謂卭能謂法作用或謂士用四種本相一一皆于八法有用四種隨相一一皆于一法有用其義云何謂法生轉並其自體九法俱起自體為一相隨相八本相才生除其自性生余八法隨相生生於九法唯生本生謂如雌雞有生多子有唯生一生與生生生八生一其力亦然本相中住亦除自性住余八法隨相住住於九法中唯住本住異及滅相隨應亦尓是故生等相復有相隨相唯四無無窮失文又北體滅用滅爭南寺傳用滅云云北寺傳體滅云云具如三聖佛法傳通記及豫別記也名等者第九名句文釋此中三初名二句三文釋也論五十九丁云名謂作意如説色香味等想句寺謂章詮義究竟如説諸行無常等章或能并了業用往時相應差別此章句文者謂字如説哀阿一伊等字云云正理十四十二丁顯宗八五丁發者一十丁婆沙從十四十一丁至十五卷名者梵云那去摩唐言名是隨義皈義赴義名義謂隨音皈赴於境呼召色等名能詮義能非義合非能詮義亦非義合故入論云非即語音親能詮義勿説火𣆅便燒於口要依語故火等名由火等名詮火等義詮者謂能於所詮義生地學惠與義合句梵云鉢陀唐言迹如一衆身有四足迹如一頌總四句成故就義之為句句能詮義究竟梵云傳迦吉阿文唐言章還是詮義究竟如説諸行無常等章章即句句是因又者梵云便那唐云文是能彰顯義近顯名句遠顯於義梵云𢙣剎那唐言字是等流轉義謂不隨方流轉改易亦是能彰顯義能近彰名句遠顯義也字即文具也即哀阿等字是不相應行攝非同此方墨書字也字又無詮表有詮表者即是名句字但是名句所依能顯佊二體無詮表云云光五三十三丁大乘義林一本卅丁對法抄一十一丁第五無為等者第五無為釋於中二初牃標二解釋此中二初總釋無為義二別釋三無為也無因多者婆沙七十六七丁有為無義釋几説章釋依第八覺天説歟虛空多者第二別釋此中三初虛空二擇滅三非擇滅也虛虛空但以無礙為性由無障故色於中行文正理一十三丁十九卅三丁顯宗一十一丁光記一草六丁云虛空空界別也依之婆沙虛空空界五種別婆沙七十五九丁云虛空非色空界是色也虛空無見空有見虛空無𭔹空界有𭔹虛空無漏空界有漏虛空無為空界有為文又婆沙七十五十丁問以何義故知有虛空尊者友云云乃至評云應作是説實有虛空非佊不知即謂非有由前教理有虛空文擇滅等者第二擇滅釋於中二初牃票二解釋此中二初釋名二明擇滅體量論一三右云擇滅即以𮥷繫為性諸有漏法遠𮥷證得解脫名為擇滅擇謂揀擇則惠差別也各別揀擇四聖諦故擇力所得滅名為擇滅如牛所駕車名曰牛車略去中言故作是説云云正理一十三丁顯宗一十三丁光記一卅七丁擇滅十三略名婆沙卅一初丁云如是擇滅亦名𣵀拌亦名不同類亦名非聚亦名非顯亦名通達亦名阿羅漢亦名不親近亦名不修習亦名可愛樂亦名近亦名妙亦名出𮥷問何故擇滅亦名𣵀拌槃名為趣涅名為出永出諸趣故名𣵀槃復次等云云擇滅釋名婆沙卅一十三丁光記一四十丁或無染異染名惠名別此差別惠各別簡擇四聖諦故滅體先有但不成就由擇力所得名為擇滅略力所得但言擇滅擇之滅故名為擇滅依主釋云云隨有漏等者第二擇滅體量也擇滅體七説婆沙卅一十四丁云擇滅自在有説一物云云有説二物一見所斷法擇滅二修所斷法擇滅有一云云有説五物謂見所斷法擇滅有四修所斷擇滅有一云云有説有十一物謂見所斷法擇滅有八修所斷法擇滅有三云云有説有三十五謂見所斷法擇滅有八修所斷法擇滅三界各九為二十七足八為三十五云云有説有八十九謂見所斷法擇滅有八修所斷法擇滅九地各九為八十一足前八為八十九云云評日應作是説隨有漏法有欠佊體擇滅亦尓隨處繫㕝體有尓所𮥷繫亦尓有欠所體故云云非擇滅等者第三非擇滅釋也於中二初牒揀二解釋此中二初明釋名得緣或科應云初釋名二明非擇滅體量非由等者釋名解曰非擇力所得滅故名非擇滅但由等者約緣謂但由緣欠約非擇滅故論云約不由擇由欠緣婆沙三十三五丁答由欠緣故云云又解云非由等但由等共釋名一假也謂非擇滅力所得滅故但由欠緣故名非擇滅為言二由初解為勝論一四丁云永礙當生得非擇滅謂能永礙未法生得滅異前名非擇滅得不因擇但由欠緣故云云婆沙卅二五丁問已知非擇滅體非𮥷繫應説何説名非擇滅耶不由擇惠得此滅故名非擇滅非擇杲故復次此滅不由一向加行一向㓛用揀擇諸法得故名非擇滅復次此滅不要由數數決擇苦等得故名非擇滅問尓此滅何而得由緣故云云光一四紙正理一十四丁顯宗一十三丁隨有為等者第二明非擇滅體量婆沙廾二六丁評家日非擇如有為法數量文雖在等者論一四丁婆沙三十二五丁云問於何諸法得非擇滅耶有説是説於三諸法皆得非擇滅是有為故云云有余師説但於過去未諸法淂非擇滅非於現在以現在法在身行故云云或有説者唯於未法淂非擇滅非過去現在所以者何過去諸法已在身行現在諸法在身行故云云評日此非擇滅唯於未不生法淂所以者何此滅本欲者為法令緣不生若法不生北淂便起如此欲法繫故屬有情現在正行過去已行未當行皆有生義故於彼法不淂此滅文論體等者有云此解當婆沙不正義云云今謂此解不可也婆沙評家云云非擇滅休如有為法數量故云論體實通三也光一四十一丁擇滅與非擇滅體多少㕝婆沙卅二六丁有説擇滅多非擇滅少云云有余師説非擇滅多擇滅少云云評日非擇滅多擇滅少所以者何非擇滅如有為法數量擇滅但如有漏法數量故云云擇滅與非擇滅得四句分別論一四丁婆沙三十三六丁
