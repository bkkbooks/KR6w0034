body:
  text: 智山沙門釈龍謙撰六門分別者第五六門分別釈於中二初票列二釈此中五𫨻六界等者第一𫨻於中二初列名二釈界名三經法分別論一廿二丁婆沙七十五四丁正理三廿丁顕宗三五丁心王即是有漏者由許六界是諸有情生所依故如是諸界続生心至命終心恒持生故諸无漏法別不別如是故局有漏不通无漏也六通等者第二𫨻扵中三初列名釈名二出体三經法分別論廿七十丁婆沙九十九八丁百四十一十三丁集異門足十五十四丁正理七十六八丁顕宗卅七九丁智証境无倒了名通者婆沙百四十一十三丁云問何故名通荅於自所緣无倒了達妙用无碍故名為通文定及境能証為名者謂定云神境云境能証云智証通也根及等者天眼二字根智証通三字能証也天耳釈凖可知他心等者他心二字加行加行観他心故智証通三字能証也漏尽等者漏尽二字所証或所依智通三字能証智也於此六通中四唯有漏謂神境通天眼天耳宿住通二通漏无漏謂他心通漏尽通也三性中天眼天耳唯无記余四通唯善性依地前五通唯依四靜慮漏尽通依一切地六垢等者第二𫨻於中三初列名二經法分別三釈名論廿一五丁婆沙四十七十六丁正理五十四十六丁顯宗廿七十五丁穢污等者依論也論云如是六種垢文扵六垢中誑憍是貪等流害恨是瞋等流𢙉是見取等流諸見等流也六囙等者第四𫨻於中二初列名釈二解釈此中六𫨻初能作囙二俱有囙三同類囙四相應囙五行囙六異熟囙六𫨻中隨応釈名出体經法釈或釈名經法釈論六初丁婆沙十六七丁十七十一丁十八二丁十九卷廿卷廿一卷発智論一十一丁正理十五初丁顯宗八十四丁能作囙等者釈名能作者不障碍義或有所弁義婆沙廾一十一丁謂法生此因不障碍故不障碍義此因能作果故能作有所弁義因能作果是所作能作即因名能作囙持業釈或謂能行是親因余不相障者踈囙此踈因是能作之囙名能作囙依主傳傳為因能生果故故正理十九廿六丁云或是佊能作之因名能作因是此故与彼傳為因義文以一切等者出体遍通等者經法分別俱有因等者釈名俱有石相応同一果義相隨順義婆沙十七十一丁或俱有有力用故名俱有俱有即因名俱有因持業釈或囙与果俱故名俱有俱有之因名俱有囙依主釈或得作俱有即因持業釈以三等者經法分別同類因等者釈名同類者種類義界地等義部類等義婆沙十八九丁因果相似名為同類若同類即因名同類囙持業釈者同類之囙名同類因依主釈以通等者經法分別過去等者唯過去現在七十二法為体未七十二法非此因体未无同類因故相応因等者釈名心心所法三義平等故曰相応即因名相応囙持業釈也若不相應因名相応囙依主釈以三世四十六心心所法為依者經法分別六字恐誤応作七遍行囙等者釈名徧行者徧為因義能徧緣義徧增隨增義婆沙十九九丁遍与自地五部染法為因故名遍行遍行即囙名遍行囙持業釈以過去等者出体若諦下遍行七謂五見疑无明也集下遍行四謂邪見見取疑无明也相応法第六識大地法大地法大不善地法尋伺睡眠廿二心心所也俱有者四相也未苦集下十一遍行隨眠相応俱有法非遍行囙未无遍行囙故遍行隨眠義者是三㕝故名為遍行一於五部法徧隨增故二於五部法徧能緣故三扵五部法徧為囙故是以遍說彼相応法俱有二㕝除徧随增彼俱有法俱有一㕝謂遍為囙故婆沙十八十五丁徧行随眠等得非徧行囙婆沙十八十五丁評家義以七十等者經法分別心王取第六識前五識与徧行随眠不相應故異熟囙等者釈名異類而熟是異熟義謂善不善因以无記為果果是異熟義婆沙廿丿十七丁若異之熟名異熟依主釈異熟之因名異熟因第二依主釈即両重依主釈或異熟名能熟善不善異即熟名異熟持業釈異熟即囙名異熟囙第二持業釈即両重持業釈此六因並不得作有財釈若言用能作等為囙名能作囙等即顯此六体非是囙用他為囙然此六種体是因故三世等者出体以七十等者經法分別六波罗等者第五叚於中二初列二名解釈此中初釈波罗密義二別釈此中六𫨻論十八九丁婆沙百七十八初丁正理四十四四丁顯宗廿四三丁婆沙百七十八二丁外国師說有六波罗密多謂於前四加忍靜慮迦濕罗国諸論師言二波罗密即前四所摂謂忍摂在戒中靜慮根在般若戒惠滿時即名彼滿故云云布施財法等者財法等者所施施有三種謂財施法施无畏施等者等无畏施以能等者弁能施体能施体无貪同時心心所心王大地法大善地法尋伺所発身色无表語无表二業也七門分別等者第六七門分別釈於中二初票列二釈此中五𫨻七慢等者第一𫨻於中三初列名二弁相三經法分別論十九十丁品類足一三丁発智論二十十丁正理四十七十五丁顯宗廿五十丁婆沙四十三十七丁此七慢通見修二断通三界繫唯有意戈地也七識住等者第二𫨻於中四初列名弁相二癈立三出体四經法分別論八七丁集異門足十七四丁品類足七九丁発智論十三卅三丁正理廿二初丁顯宗十二九丁婆沙百卅九六丁分天天者分天二字字誤応作一分謂欲界天及初靜慮等者今依論婆沙不言初天婆沙意初靜慮天一分第一識住摂一分第二識住摂以不定故是故不言具如光記八十七丁了簡也除刧初起者初定刧初起非第一𧥾住故第二識住摂也想異謂彼若等者謂約相応受分成三種若在欲界具有三想若在初定除若有二也二身異想一如梵眾天等者梵眾天言舉初顯後總摂初定三天唯取初定三天刧初起不取後恃初定三天也余𢙣起第四等者論二釈中依第一釈釈也起字誤応作趣三𢙣趣有重苦受能扵識第四靜慮有无想定及无想㕝有頂天中有滅尽定能壞於識令相續断故非識住余六十九法随応等者第一識住以六十九法為性於中人通六十九法初天以五根色触无表心王大地法大善地大善地誑憍尋伺貪慢疑除无表異熟二定余不相応法五十五法為性第二第三第四識住以五根色觸无表心王大地法大善地大地憍貪慢疑得非得同分四相命根四十八法為性若約随身繫更加名句文後三識住以心王大地法大善地法大地法憍貪慢疑得非得同分命根四相三十九法為性也七種聖人等者第三𫨻扵中五初列名二釈名三明位四出体五經法分別論二十五九丁廿三十四丁廿四九丁集異門足十六十一丁婆沙五十四初九丁隨信行者等者論云依加異立初二種謂依先隨他及法於所求義修加行故立随信行随法行名依根不同立次二種謂依鈍利信惠根增如次名為信解見至依得滅定立身証名由身証得滅尽定故依解脫異立後二種謂依唯惠离障者立惠解脫依兼得定离解脫者立俱解脫此名𧈧七㕝別唯六謂見道中有二聖者一隨信行二隨法行此至修道別立二名一信解二見至此无学復立二名謂時解脫不時解脫応知此中一随信行根故成三謂下中上性故成五時法等者道故成十五謂八忍七智离染故成七十三謂具縛离八地染依身故成九謂三洲欲天善根性道离染依身相秉合成一億四七千八百二十五種随法行等者如理応思文婆沙五十四五丁已下七聖人釈名并由五象故建立七種及約根性道离染依身広釈徃見此七等者若約无為為体可云択滅也以无表等者无表唯取道俱无表心王唯无漏心王余心所得四相无漏為体七若約无為為体亦更応云択滅為体也七支等者第四𫨻於中三初列名二出体三經法分別論十四十八丁十六十七丁行㕝鈔資持記中三一八丁十三丁廿七丁四分律十一八丁十二四丁十誦律九十丁廿八夕論六九丁五分律六三丁法苑珠林九十三至九十四卷婆沙百十三三丁百廿三十六丁此七支戒通定俱戒道俱戒別解脫戒也具釈別解脫七支者前四支者如前五戒𫨻釈五不𢙣語者以染心発非愛語毀訾於他名𢙣語离此名不𢙣語此戒制戒因緣者仏在舎衛六鄭毀罵断㕝人因制四分律十一五丁云信仏言凢有所說当說善語不応𢙣語便自熟𢙉乃至畜生聞毀慙愧况於人也次犯緣明者具四種一染污心二発非愛語三解義四不誤也六不离間語者染污心發壞他語名离間語离此名不离間語先明制戒囙緣者仏在舎衛六郡傳他佊此語令眾闘淨不能除滅故制次云犯緣者具四種一染污心二発壞他語三解義四不誤也或具六緣一比丘二說鄙𢙣㕝三傳於彼此四分离意五言了六時知也七不离穢語者离字誤応作種也一切染心所発諸語名雜穢語离此名不雜語先明制戒因緣者仏在抅睒闡陀犯罪余比丘問以余㕝作自制已遂𢙉僧喚不等又作白制自而作故制次明犯緣者具四緣一作自口業倚二数𢙉不正三為僧單白止四更作便犯也无表以无等者通別解定俱道俱无表非余无表也七覚支等者第五𫨻於中三初列名二經法分別三釈名論二十五十二丁集異門足十六九丁品類足七十丁十初丁十五初丁正理七十一五丁顯宗卅四初丁婆沙九十六三丁百四十一九丁七覚支唯无漏於修道中建立故依地者喜覚支者初定第二定余六通未至中間四根本下三无色地前四等者念覚支念定覚支定択法覚支惠喜覚支喜受輕安覚支輕安捨覚支行捨精進覚支勤覚謂覚等者婆沙九十六八丁有說此能覚語故名覚支云云百四十一九丁問何故此七名覚支耶覚謂究竟即尽无生智或如実覚即无漏惠七為彼分故名為支択法亦覚等支余是支非覚此七広弁如余処說文八門分別等者第七八門分別釈於中二初票別二釈八戒等者第二釈此中五𫨻先第𫨻此中二初正八戒釈二囙未十戒初中三初列名二出体三經法分別論十四三丁婆沙百廾四六丁廾八夕論一廿丁業㐬二下十五丁法苑珠林百六行㕝資持記下三四廿二丁一不殺等者婆沙百廿四六丁云如契經說近住律義具足八支何為八謂离害生命离不与取离非梵行离虛誑語离飲酒諸放逸処离歌舞倡妓离𡍼飾香鬘离広离非時食問此有九支何以言八二合為一故說八支謂离𡍼飾鬘与离歌舞倡妓同於莊広処博故合立一支問云何名近住云何近住支离非時食名為近住离害生等名近支問此近住支応惟有七离非時食名為近住亦近住支故不惟七如王見名道亦道支余名道支非道云云又云問近住律儀云何而得他教得謂為師教自発誠言恭敬受得問受律儀者或先自発言或与師俱說得律儀不不得要随師語如師語而說方受得故問近住律儀従誰応受七眾受得皆非餘所以者何若无尽壽戒者則不堪任為戒師故問著何服飾受此律儀常所受用衣服嚴具著之皆得受此律儀若為暫時莊嚴身者必頃棄捨方受此戒牀座等具准此應知問齊何時受齊一昼夜不增不減謂清旦師受得至明清且律儀便捨問若有頓受半月一月或復多時得律儀不応言不得所以何一昼夜時分限定故云云不𡍼飾等者不著香華瓔珞不香以𡍼身不著香薰衣不自歌舞作条亦不往觀聽也高広等者業㐬二下十五丁云何舎中八種牀金銀牙角等者嚴飾故勝仏及師僧父母人故勝俱不合昇也有余文中高広牀者約相弁离高即八指以上広謂𭤧三時者不可俱有單高亦制文列高者即蕳釈六已下開用又言勝者即列八種不必高大如用師父所褥即是長慢故特制也文又法珠林百六三丁云又阿𭇥經云高広大牀者梐下足長釈六非高闊四釈非高長八釈非大越北量者方名高広大牀復有八種牀初四約物弁貴体不合㘴下約人弁大令地鋪擬於尊人亦不合㘴一金牀二銀牀三牙牀四角牀五仏牀六辟支仏牀七罗漢牀八師僧牀父母牀座不在禁限非時食者多論七廿四丁四一且至中其明轉盛名之為時中後明沒名為非时二且至中作食時節乞不生惱中後已去及上可知三中前俗人㕝務淫惱未発中後閑預入村乞食多被譏謗四中前乞食濟身過中靜因修道非是食時名為非時毘罗三昧經云早起諸天食日中三世諸仏食日西畜生食日暮鬼神食云云又婆沙百八十二十二丁世尊唯离非時食五人不尓云云五分律八七丁迦留陀夷夜乞食緣制非時食云云此八戒制戒㕝流記三廿丁仏成道九年說八𨵿戒經云云第六開二等者不𡍼飾香鬘為第六不舞歌觀𦗟為第七也八正道等者第二𫨻扵中二初列名二經法分別論廿五十二丁集異門足十初丁正理七十一五丁顯宗卅四初丁婆沙百四十一十丁九十六八丁此八名為道支其釈名婆沙云有說此能非趣故名道支問若尓則応一是七非七是道分能随順道勝而說亦名道支復有說者是道之支故名道支問若尓則応七是一非正見是道亦是道支余七是道支而非道云云八正道依地正見正精進正念正定四通未至中間四根本下三无色地正思惟唯在未至初定正語正業正命通未至中間四根本地也正思惟以不定中尋伺為性者伺字恐衍字正思惟遍尋不通伺故是故論云正思惟以尋為体文婆沙云正思惟即尋又九十六十五丁問何故尋伺俱通无漏唯立尋為菩提分法伺无彼相是故不立復次菩薩分法行相猛利伺用微劣是故不立復次伺用為尋所復故䇿於正見尋用偏增故伺不立等分法文語業命三等者正語正業正命以道俱无表為性也八解脫等者第三𫨻於中六初列名二弁相三釈名四出体五經法分別六明依地論廿九四丁婆沙八十四八丁集異門足十八九丁品類足七十二丁正理八十四丁顯宗四十八丁初二解脫一一通依初二靜慮治欲界初靜慮中顯色貪第三解脫依後靜慮离八災患心證淨故四无色定善各能解脫次下地心故為次四解脫滅受想定棄皆一切有所緣心名第八解脫也棄皆受等者婆沙八十四九丁問何故名解脫解脫是何義棄背義是解脫義問若棄背故名解脫者何等解脫棄背何心初二解脫棄背色貪心第三解脫棄背不淨觀心四无色処解脫名自棄皆次下地心想受滅觧脫棄背一切有処緣心故棄背義是解脫義尊者世反云云大德云云𦚰尊者云云若並助伴者皆五薀者此依論說論与婆沙不同光記廿九十丁問何故婆沙云欲界者以四薀為自性色界者以三薀為自性解脫云此論拠勝婆沙兼拠似說問婆一明依論故言四薀界地唯約勝悅不言欲界文四无色觧脫以心王大地法十為体者恐大地法十字下悅大善地法十得四相八字欤无色觧脫以心王大地法大善地法得四相為体故也八勝処等者第四𫨻於中五初列名二弁相三出体四弁觧脫勝処差別五釈名論廿九五丁婆沙八十五四丁集異門足十九初丁品類足七十三丁正理八十九丁顯宗四十十一丁前修觧脫乃至或終不起者或字恐誤応作惑故北下弁觧脫勝処差別論云若等八勝処何殊三觧脫前修觧脫唯能棄背後修勝処能制所緣随所樂觀惑終不起文心脫境処故名勝処者釈名心字恐衍字欤或心勝境処四字応作勝処緣境然光記廿九十五右同今恐字誤婆沙二釈中今章依初釈欤婆沙八十五四丁問何故名勝処勝処是何義勝所緣境故名勝処復次勝諸故名勝処𧈧視行者非一切能勝処緣復於所緣不起亦名為勝如契經說於此処勝故名勝処文八難等者第五𫨻扵中四初列名二釈名三出体四經法分別三藏法数卅三九丁梵網古迹下六丁標指抄中二七丁三藏法数云八難出維摩詰所說經八者所障難也此之八所𧈧感報苦条有異而皆不得見佛不聞正法故總為也一住地獄難謂南瞻部洲之下過五百由旬有八寒八𤍠等獄皆名地獄眾生因𢙣業所感隨於彼処長夜受苦无間障於見仏聞法故名地獄二在畜生難謂畜生種類不一亦各隨受報或為人畜養或居山海等処常受鞭打殺害又或互相吞噉受苦无窮障於見仏聞法故名畜生三住餓鬼餓鬼有三種一其業嚴重者長刧不聞漿水之名二其業次重者唯有人間伺求䔽滌膿血糞穢三其業輕者時或一飽加以刀杖驅逼填河塞海受苦无量障於見仏聞法故名餓鬼四在長壽天謂此天以五百刧為壽即色界第四禪中无想天也言天想者以其心想不行如氷𩵋蟄蟲外道修行多生其処障於見仏聞法故名長壽天五在北𬅕單越難梵語𬅕單越華言勝処謂此天処感報勝東西南三洲也其人壽一千嵗命无中夭為著樂故不受教化是以聖人不出其中不得見仏聞法故名北𬅕單越六盲聾瘖瘂謂此等人𧈧生中国而業障深重盲聾瘖瘂諸根不俱值隨仏出世而不能見仏𧈧說法亦不能聞故名盲聾瘖瘂𮥷七世智弁聰謂世間之人邪智聰利者唯務躭習外道經書不信出世正法故名世智弁聰八生在仏前仏後謂仏出現於世為大導師令諸眾生𮥷生死苦得𣵀拌条人有緣者乃得值遇其生在仏前仏後者由業重緣薄不見仏亦不聞仏故名生在仏前仏後文長壽天多說華厶大㐬卅四中四十四丁摽指抄中二七丁第八異義標指抄中二七丁仏前仏后者何云勒出世已前釈尊入滅已後謂之仏前仏后然有仏法人能傳說猶名仏世是故增刧人壽七歲時罗漢入滅已后勒出世已前是仏前仏后分有云刧初唯条謂之仏前刧尽唯若謂之仏后以唯苦故不修勝業以唯条故无厭离心是故為化時文私云此八難中七難不能入聖𮥷染仏前仏后𧈧有𮥷染不能入聖也又仏前仏後除如在世及滅后千年余仏前仏后謂如出世以前仏前也釈迦如滅后千年后无入見道者八廿意是則仏后也九門分別等者第八九門分別釈於中二初票列二釈此中五𫨻九結等者第一𫨻於中四初列名二出体三經法分別四釈名論廿一初丁集異門足十九三丁品類足一三丁六初丁発智論三初丁正理五十四初丁顯宗廿七七丁婆沙五十四丁四十六五丁結何義繫轉義是結義合若義是結義雜毒義是結義乃至応說九有情等者第二𫨻於中三初列名二配立三出体論八九丁集異門足十九四丁品類足六初丁八二丁発智論十三廿三丁正理廿二十一丁顯宗十十二丁婆沙百卅七十丁余処皆非者余処謂諸𢙣処非有情類自条居中𢙣業罗剎逼之令住故彼如𥤱獄不立有情居第四靜慮除无想天余非有情居也論八十丁婆沙百卅七十一丁問何緣𢙣趣及无想所不摂広果等非有情居有作是說彼亦応立為有情居而不立者是有余說尊者世友作如是說此是世尊要畧而說然𢙣趣等者摂在此中謂𢙣趣當知摂在初刧有情居无想所不摂広果天等当知摂在第五有情居所以者何以地同故有說云云九地等者第三𫨻扵中四初列名二釈名三出体四經法分別四是三无色通百漏无漏者初定近分根本俱通有漏无漏上三靜慮及下三无色近分唯有漏根本通有口无口也无表通欲界四定者散无表唯欲界繫定俱无表通四定根本近分地道俱无表唯在未至中間四根本地也九地第定者第四𫨻於中四初列名二釈名三出体四經法分別論五七丁云入九次第定次第婆沙百五十二五丁諸欲入佊定者先起欲界善心次入初靜慮次入第二靜慮如是乃至入无所有処次入非想非非想処於非想非非想処二中下心上入中中入下下品心断入滅尽定云云九遍知等者第五𫨻扵中三初列名二經法分別三釈名論二十一十四丁発智論四十八丁婆沙六十二八丁正理五十六九丁顯宗廿八十三丁云遍智建立前六偏知由三緣謂得无漏𮥷繫得故缺有頂滅双因故諸断要具如是三緣立偏知名闕則不尓後三偏知具由四緣謂於前三加越界故言趣界者謂此界中煩惱等法皆全𮥷故論意若依婆沙等前六由四緣後三由五緣更如𮥷俱繫故也論意𮥷俱繫与滅双因及越界緣用无別𧈧義有異而不別說也此九等者欲見苦集断偏知欲界見苦集所断択滅為性欲界見滅断偏知欲界見滅所断択滅為性欲見道断偏知欲界見取道所断択滅為性色无色見苦集断偏知上二界見苦所断択滅為性色无色見滅断偏知上二界見滅所断択滅為性色无色見道断偏知上二界見道所断択滅為性五順下分結尽偏知三界見所断択滅及欲界修所断択滅為性色愛尽偏知色界修所断択滅為性一切結永尽偏知三界見修所断択滅為性也言徧知等者依論釈也云論即諸𮥷繫彼彼位中得徧知名徧知名徧知有二一智徧知二所徧知智徧知者謂无漏智断徧智者謂即諸断此於果上立因名故文又婆沙六十六八丁問断是无為不能緣慮无决了用何名徧知此𧈧不能緣慮决了而是智果故名徧知云云十門分別等者第九十門分別釈於中二初票列二釈此六𫨻十纏者等者第一𫨻此中三初列名二釈名三經法分別論廿一四丁正理五十四十四丁顯宗廿七十三丁婆沙四十七十六丁纏縛有情故為纏者入論云此十纏縛身心相續故名為纏文十随眠等者第二𫨻於中四初列名二釈名三約部界弁体四經法分別論十九三丁正理四十六初丁顯宗廿五二丁隨謂等者論廿十五丁論云根本煩𢙉現在前時行相難知故名微細二隨增者能於所緣及所想応憎惛滯故言隨逐者謂能起得恒随有情常為過患不作加行為令彼生或設劬労為彼起而数現起故名随縛由如是義故名随眠文又婆沙五十初丁問何故名随眠随眠是何義微細義随增義随縛義乃至広說十善業等者第三𫨻於中三初列名二出体三經法分別論十六四丁発智論十一初丁四十一七丁顯宗廿二二丁婆沙百十三九丁十善業道者業道義婆沙百十三十六丁問何故名業道業道有何義名思為業思処遊履究竟而轉名為業道問若思名業思所遊履究竟而縛名業道者余善不善一切无記无不皆為思所遊履究竟而轉一切皆応說名業道有何殊勝不共因緣惟說此十以為業道此是世尊有余師之說大師觀彼所化有情心行願条蕳畧而說乃至広說十業道中前七業及業道後三惟業道非業論十七初丁十業道中後三唯道業之道故立業道名佊想応思說名為業彼轉故轉彼行故行加佊㔟力耶造作故前七是業身語業故亦業之道思所遊故由能等起身語業思記身語業為境轉故業業之道立業道名故扵中言業道者具顯業道業業道義𧈧不同類而一為余於世典中俱極成故离殺等七无貪等三立業道名顯此応釈文十遍処等者第四𫨻於中四初列名二釈名三明休境四經法分別論廿九六丁婆沙八十五十丁集異門足十九七丁品類足六初丁八四丁正理八十十二丁顯宗四十十三丁周遍等者依論論云周遍觀地水火風青黃赤白及空与識二无辺処於一切処周遍觀察无有間隙故名徧処文又婆沙八十五十丁問何名徧処是何義由二緣故名為徧処一由无間二由広大由无間者謂純青等勝解作意不相間雜故名无間者謂純青等勝解作意境相无辺故名広大大德說曰所緣寛廣无有間隙故名徧処文此十徧処界者前八徧処是色界後二遍処是无色界地者前八徧処在第四靜慮第九遍処在空无辺処第十徧処在識无辺処也若弁似勝也婆沙八十五十一丁前八偏所以无貪善根為自性対治貪故兼取相応轉即欲界者以四薀為自性色界者以五薀為自性後二徧処俱以四薀為自性如是名為徧処云云前八以无表乃至大善地法十為性者恐十字下脫得四相三字欤八皆唯有漏者八字恐誤応作十字十皆唯有漏故也此十徧処諸門分別広如婆沙八十五十一丁十智等者第五𫨻於中三初列名二釈名三約法分別論廿六初丁品類足一六丁正理七十三二丁顯宗三十五二丁婆沙百五十七丁百六初丁十智者智義者婆沙七十五十八丁智是决断義百六三丁定義是智義云云多取瓶等者俗智釈名依論釈論云前有漏智總名世俗智多取瓶等世俗境故文望百六六丁七說中第一說也緣欲界等者法智類智釈名婆沙百六四丁問何故名法智智体是法故名法智云云乃至復次初覚知法故名法智復覚知法故名類智乃至広說論云法類二種如其次第以欲上界四諦為境文即前法類由等者苦集滅道四智釈名婆沙百六六丁問何故名苦智乃至道智耶緣苦聖諦四行相轉故名苦智乃至緣道聖諦四行相轉故名道智云云知他心等者他心智釈名婆沙百六五丁何故名他心智知他心故名他心智問此亦知他諸心所法何故但名他心智耶以期心故謂修觀者先起意条欲知他心由此意樂復知心時亦知心所如人意条本欲見王後見王時亦見臣等乃至広說法智類智等者尽智无生智釈名婆娑百二十丁応作是說惟煩惱尽身中起故名為尽智云云有作是說此緣尽故名為尽智云云此十智中性世俗智通三性余九唯善依地俗智在一切地他心智唯依四根本靜慮法智依此四及未至中間余七智依此六地及下三无色依身別者謂他心智依欲色界俱可現前法智但依欲界現起余八智現起通依三界身也十力等者第六𫨻扵中二初列名弁相二經法分別論廿七初丁㚣卅十四丁正理七十五初丁顯宗論卅六十六丁十力者力義婆沙卅十四丁問何故名力力是何義不可屈義是力義不可伏義不可摧義不可害義不可轉義不可覆義能徧覚義能荷擔義堅固義㝡勝義能制他義是是義文論云何故名力以於一切所知境中智无碍轉故名為力文此十力依地別者第八第九依四靜慮余八通依十一地起欲四靜慮未至中間并四无色名十一地依身別者皆依瞻部男佛身也謂但緣漏尽為境等者漏尽滅也余文可知且為初学等者第二流通分也廣如別錄者指俱舎記也明治六癸酉初秋於西亰錄
