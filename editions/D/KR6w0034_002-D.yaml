body:
  text: 智山沙門釋龍謙撰將釈此章六門分別一講前行法二造章囙緣三章傳未四章所依經論五釈章題目无撰号六入文解釈初講前行法者予如講釈作法記徃見旲二造章囙緣者如四阿𭇥經文廣義深発智六足者文畧義幽逐大毘婆娑論者文廣義㫖深俱舎論正理論顕宗論等者文廣堅義幽㣲而初学者直難入依之釈七十五法名体諸門為入有部大論甘露門故下文曰且為初学畧示方隅委細分別廣如別錄文三傳者初有部渡漢地㕝二正此章傳此土㕝初有部渡漢地㕝者釈迦如降誕南洲天笁淨飯王家有傳第九减劫出奬三下傳第一减劫出性現佛三昧經說四月八日夜半生長阿𭇥四十四一二月八日生摽指抄四四十一佛所行三昧經三月八日生囙易經四月八日佛生月日諸說不同如破邪論上十三四下九西域二三又六之八及十二法𫟍十四𣧩苑集佛道論衡二三𧁨悉地㐬第四自四僧史畧上自甫注十三四十五六止真記五未正九名義集三自二十二統記二八九釈迦譜日經反花戒訳人斟酌出經之人名有所受故徃徃不同夫以史漢延出猶分猱相反况万里之外千歲之悲哉明昔者固冝択普而従一之二十四行㕝抄資持記下三之二十五一日僧祗佛生日乃至涅槃日為大眾說法秝揚佛德薩婆多二五一三月八日或佛亦以此日生乃至若依瑞應上四四本經多云四月八日生乃至此並由眾生見聞不同故時篇不等智論云九十七一王舎城十二億家舎婆提城九億家尚三億見或聞由慢業故佛猶尓何况末法轉輕心業最重文寳疏一為帋出家成道出家或道年記不同一曰十九岁出家三十成道一云廾九岁出家三十五成道一云十九出家廾四成道一云二十五岁出家三十成道一云七出家廾成道摽指抄上四十七具引諸文徃見長含四廿四丁二月八日岁出家成道現佛經四月八日夜成道宝一初丁行㕝抄下三之二十五帋於鹿野說四阿𭇥經玄𮚌一廾丁曰旧同阿𭇥及僧律大眾部義云云轉法輪諸說不同菩薩所胎經二月八日婆沙百八十二十三丁迦栗迦月日半八日宝一初丁如滅后迦葉阿難等結集此經弘傳結集義林章二本初已下廣釈三論玄並幽抄五廿六丁滅后至百十六日大眾部上座部分破乃至至三百年初從上座部中有部分破至二百年末迦多衍尼子等造發智六足論等釈此經令法久住至四百年中五百阿罗漢等造大毘婆沙論釈顕發智論至九百年中親大士造俱舎論等而先覚鎧三藏訳婆沙号旧婆沙等真諦三藏俱舎論訳具如傳通記上五丁釈後㢡三藏渡天唐第二主大宋貞覌三年渡天在笁十七年同十九年皈唐至北渡境迦濕罗国法救論師寺逢大論師僧伽那舎此云眾特善薩婆多及囙明明論創従考决便曉玄猷大巟上意㤙傳二十七丁至迦濕罗国乃至彼師法師者高行之人乃至彼公是時年向七十氣力已衰慶逢神器乃力教揚自午已前講俱舎論午已後講順正理論初夜後講因明聲論由是境內学人无不悉集法師隨其所說領語无遺擊篇尽其神秘云云又従戒賢論師𦗟順正理論㤙傳三十九丁在天十七年中傳受大小乘已皈朝發智論集異門足論法薀足論識身足論品類足界身足論俱舎論順正理論顯宗論等瑜伽論等大小乘論及訳弘宗也二正此傳此土事者推法相宗傳第一傳道拓第二傳智通南第三傳新罗智鳳等智鸞知雄三師第四傳玄昉時東傳此章欤護命僧正傳新罗智法師義立有為因生滅義体不生滅南寺傳余先者立有為体生滅義体用共生滅寺傳具如傳通記等四章所依經論者通者四阿𭇥發智六足大毘婆沙師論等別者俱舎論為所依也五釈章題目并撰号此中二初釈題目二撰号釈初題目者若西土者經論等梵本題目置文終无文首漢土格式者置文首經論訳時皆首置也今章文首題置漢土格式也十住心論冠玄傳十五丁日凢西笁經論文後置題東土方円卷首安名故金剛頂義訳卅一丁云題云此是金剛金剛薩埵三摩地一切如菩提智第一釈曰此題目也梵本皆列扵後又引菩提流支薩𡰱乾子經註以成此義然考現本無有此註意後人刪削若又留支別有彼經註不可知焉又所以又初安題者凖地藏經鼓吹引顕要記云晋朝道安法師有四義故初安經首一者人見經題目知部法故二者為智者畧知䏻廣解故三者為簡異餘部易見故四者為忩迫㐬生假見經題獲益故云云又法華遊意曰依梵本皆无題但云悉曇此云𠮷法亦名成就立名皆在經未而廽後置初葢訳經人隨震旦国欲令因名字不同識部類差別故也上廾一丁右又維摩遊意二十右亦云法宗原者法名義何謂光第一廾六第一曰釈法名有二一能持自性一切法各守自性如色等性常不改易䡄生勝解如無常等生人无常等解以上唯識逑記一本五十云法謂軋持䡄謂䡄可生物解持謂任持不捨自相文瑜伽倫記十三下三右云梵語陀罗唐名持戒梵語逹摩亦是持義然㨬故名法文法自性者即有為無為七十五法也宗者宗輪述記曰宗者生也乃至又宗者所崇之理已上原者本也法之宗法宗之原二重依主釈或法宗法宗即原二重持業釈也次釈撰者此中二初安置所由二正釈初謂凢安撰㕝有三囙行㕝抄題于註云作者非无票名顕別中尽題下云著作者多立名票異大覚抄比云今抄始不安撰号祖師南山適至相部見礪師礪師問云従何自北京問云風聞首師門人有道宣𫽄理聰明汝知否云知之弟子是也即大驚歎又問近見首師抄三卷大要道云師不作此抄但有疏𢌬也卷礪自出抄呈之宜云是弟子撰耳礪大如敬色於此安撰号次人法相依者報㤙經六十一丁云顕法是佛師而非佛不弘止観四一之丁法自不弘弘在人䏻行法門光顕也宗輪論疏四十丁華嚴玄談三十三帋付法𫇥二上十四丁後依人信法者論註上初云因人重法故云某造益為生信宗疏四一如上三囙初一作者自置後二囙后人代置今此章撰恐后人所立欤贊大乗不呼金名欠上一字似二名不徧諱意大乗先者大者具七義形小教為名乗運載義濟行者為目若乗若大問依一体名同依釈具体大法能有運功故名持業對法抄一十六帋同梁論一六丁言大乗欲簡小乗玄贊四五右云乗者運載義廣雅云乗駕也周礼云乗載也運載行者至彼岸故問因行能運至杲可名乗佛杲自運息応非是乗体五義云云摂釈一十四丁右云按大集經云其乗廣大故於諸眾生无碍障故是一切智善根本故无有煩𢙉諸浩黑闇故所有光明无処不遍故周遍其有眼目故本性常淨故初无治污故諸断煩𢙉一切間亇故名大乗准此經文通根有為无為二種功法廣如彼說又十二門論首云問云何故名摩訶衍摩訶衍於二乗為止故名大乗諸佛㝡大是乗能至故名為大謂佛大人乗此乗故名為大又能滅除眾生大苦与大利益事故名為大又覌音得大㔟文殊等諸大士所乗故名為大又以此乗能尽一切諸法辺底故名大等云云光者異云普光大乗光者宋高僧傳四六丁日釈普光未知何許人也明敏為性爰択其本請㕝三藏弉師勤恪之心同列靡及至扵智解可召循環聞少證多弉師點許末参傳訳頭角特高左右三藏之卷有功焉初㢡嫌古翻俱舎義多鈌尓躬得梵本再訳真文乃密授光多是記憶西薩婆多師口義光因著㐬解判一具㐬至圓暉畧之為十卷如漢之有絕絕言釈云達阿功江之別流也欤又隨㢡徃玉花宮訳大般若經厥㓛出于禆湛也取大乗光覌夫弉自貞観十九年創訳記麟往元年終于玉花宮凢二十載總出大小乗經論七十五部一千三百卅五卷十分七八是光筆受或謂嘉光普光也若驗従棧同参訳務即普光是也矣法師者文句法䡄則師者訓進𧈧可記不自弘通此弘在人十住毘婆沙師論云応行四法名為法師一廣多学能持一切言辞章句二决定善知出間諸法生滅三得禪定智於諸經法隨順無諍四不增不减如所說行云云中邊論下六丁說十種法師法花五說五種五師大乗義章十六八丁說二十二種㓛𭛟云云撰者資持記上一之一九右日撰逑者通而為詮撰亦是述今既両摽故順別釈撰謂橾觚染翰詮次成章述謂謙己推他相循轍文依說一切等者北下第六入文解釈於中大二初正宗分二流通分初中二初摽二釈摽列中三初惣摽列二別列三結釈初中二初摽二列別列中五初色法列二心法列三心所法列四心不相應法列五者无為法列依說一切等者宗輪述記下七丁曰說一切有者有二一法色心一切謂五法即心心所色不相忍行每為二一切謂去今文余者可知就中木者以下第一釈此中二初分科二述釈畧釈以下於中二初標二釈釈中五初色二心三心所四不相応五無為初中二初摽色十一釈色義二十一色別釈此中七初五根釈二色三聲四香五味六触七無表初中二初眼根二余如根類釈可反礙故名色如无表者所依四大反碍生故名色俱舎論一十丁曰何故此薀色无表為後說為色耶由反壞者故如尊苾芻当知由反碍故名色取薀誰能反壞謂午触故即便反壞乃至廣說反壞乃是可𢙉壞義品中作如是說趣求謂欲人常起於希望諸欲若不遂𢙉壞如箭中色復云何欲所𢙉壞欲所擾𢙉反壞且故有說反碍故名為色若尒極微応不名色无反碍故此難不然無一極微各㨿而住眾微聚集反碍義成過去未応不名色此亦曾當有反碍故故及彼類故如所燒薪諸无表色応不名色有釈表色有反碍故无表隨彼亦受色名譬如樹動影亦隨動此此釈不然无反碍故又表滅時无表応滅如樹滅時影必隨滅有釈所依大種反碍故无表業亦得色名若尓所依有反碍故眼識等五応名亦色此難不竒无表依止大種博時如影依樹光依珠宝眼等五識依眼木時則不如是唯能為作助正緣故此影依樹光依宝言旦非符順毘婆沙師義彼宗影等顕色極微各自依止四大種故故設許影光依止樹宝而表无色不同彼依彼許所依大種𧈧滅而无表色不隨滅故是故所言未為釈復有別釈佊所言眼識等五所依不定或有及碍謂眼等根或無反碍謂无間意无表所依則不如是故前所定為不有反碍名色得成就文婆沙七十五法十二丁已下色義釈正理二九丁眼謂內処等者初五根釈中二初眼根二余四根類釈內処簡外非情顕內有情処能見色境文見者観義也眼根能観色境光記二四十丁見二種一観名見二推度名見云云婆沙十三初丁云有執眼識見色如尊者法救有執眼色相応惠見色如尊者妙音有執和合見色如譬喻者有執一眼見色如犢子部為止如是異執顕示己宗二眼見色故作此論云云四大所造淨色為体者簡大眾部大㐬部五根肉團為体宗輪論疏五十四丁品類足一二丁婆娑十三九丁論一四丁二七丁光二八丁有色者有反碍相名有色廣如婆沙七十五十三丁十二丁有見者無能現所現及可示現在此在彼義名無見如論二初丁婆娑七十五十六丁下釈十二右非有眼見名為無見文有𭔹者下十二右曰有障碍故為有對文論二初丁婆娑七十六初丁乃至者二余四根類釈乃至言触耳鼻舌身色諸外処等者第二色処釈此二初惣釋二別二十色明論二十一丁曰六根六識十二名內外謂余色木六境云云二七右曰五色根色木四境法界一分無表業色亦唯所造文婆娑七十四初丁內外建立廣釈色有二十木者論一六丁曰言色二者一顕二形顕色有四青黃赤白余顕是此四色差別形色有八謂長為初不正為后或二十者顕色処復說二十謂青黃赤白長短方圓高下正不正雲𤇆塵霧影光明暗有餘師說空一顕色第二十一此中正者謂形平等形不平等名為不正地水氣騰說之為霧日㷔名光月星火𦰔宝珠電等諸㷔名明障光明生於中余色可見名影羽此為闇余色易了故今不釈云云正理一十九丁顕架二二丁光記一六十丁曰言長短者長短極微名有差別相雜而住形長見短形短見長問若長短等別有極㣲何故婆娑一百三十六四丁云応加極微是最細色非長短方圓解云婆娑㨿別一徵是最細分更不可折非眼見言非長等此論拠見已去有実体類成故長等故名長等若泛明長短亦通假実𠰥二十種色中長短相𭔹以実対実𠰥通約諸仮聚相対亦長短品以対仮故婆沙第九解諸有中第三師云五相対有謂此彼岸事又解木又解宝六右有破可量已去名長不可量者名短間形長短為短者於彼長中仮說為短如於重中仮說為輕聞此短極㣲既有眾多如何說佊而不可量解云𧈧有多体而不可量如輕極微𧈧有多体而不可秤短極微𧈧多而不可量若言眼見非不可量𩔰亦眼見応當可量若言同聚応可量者香等同聚亦応可量光既雜住而不可量短与長雜亦不可量方謂果方圓謂周円中凸名高中凹名下問長与高何別短与下何殊解云長短拠四辺高下拠処中然人言物高下於長短中說高下故又解宝七破長短拠橫高下約竪間立竪名長短者於高下中說長短故龍氣名雲火氣名𤇆風吹細土名塵余色如文自釈云云婆娑十三九丁色處者二十乃至有說色処有二十一謂前二十及空一顕色云云謂木者第三釈此中二初惣釈二別明有種五事論下十三丁有一種乃至廣說云云婆沙十三十丁八種二說𩔰宗論二二丁正理一廾丁旧俱舎一十丁新俱舍一七丁入論一二丁光記一余六丁云云又俱舎論举破有說雜心論一十二曰有說有種通有執受及無受執大種為囙如牛皷木合所生如不許一顕色極微二四大造亦応禾文化語業非業等分別光一余七丁二解一義云化語業有実名定成就云云一義云化語非業非実名示非成就云云今謂第一解正義也第二解未熟宝一余云云未穗一有執受等者差別相隱知約囙用杲杲有執受大種無執受大種者囙如有情執受大種囙声無執受大種囙約囙釈有情名者上名句文以詮表備声名有情色異此名非有情有情名非情名者用由𩔰故如有情名非有情名為用釈可意不可意為杲囙生故生悅意名戀生不悅意名不可意也光一余十五丁云云香等者第四香釈此中二初惣釈二別列四香三香論一七丁四香三香云云品類足一二丁香有二種云云婆娑十三十一丁四香云云正理一廿二丁日香謂所齅此有四種好香𢙣香等香不等香有別故等不等者增益减依身別故有說微弱增盛異故本論中說香有三種好香𢙣香及平等香若能長養諸根大種名為好香与此相名為𢙣香無前二用名平等香或謂諸福業增上所生名為好香若諸罪業增上所生名為𢙣香唯四大種㔟力所生名平等香此𧈧增上杲而亦有差別故唯大種㔟力所生亦是有情增上果摂文顕宗三三丁五㕝論下十三丁曰諸悅意者既名好香不悅意者說名𢙣香順捨受処名平等香云云光一余十一丁曰正理解等不等香有両釈第一解云增益損减依身別故解云等謂平等香力均平增益依身不等者謂大強成大弱無益損减依身於好𢙣香中有增者名等不等余即是無益無損第二解云有說微弱增盛異故解云微劣是等增盛名不等正理解本論三香亦有両解第一解云若能長養諸根大種名好香与此相名𢙣香无前二用名平等香入論上二右亦同此解解云縦是𢙣香但能長養諸根大種亦名好香縦是好香若能損减諸根大種亦名𢙣香此師意說但能長養名好香但能損减名𢙣香无長養减者名平等香第解云或諸福業增上所生名為好香若諸罪業增上所生名為𢙣香唯四大種㔟力所生名平等香次師約勝劣処中以解又五㕝論云諸悅意者悅為好香不悅意者為𢙣香順捨受処者名平等香解云約情說故名好𢙣等香論体光記為与正理第二解義亦无違云云又云香相知約情亦云云味等者第五味釈於中二初惣釈二別列六味論一七丁五事論下十三丁日諸悅意者名可意味不悅意者名不可意味与二相違名順捨処味文婆沙十三十二丁味有六種云云顕宗二三丁正理一廿一丁論正理顕宗各味次香說顕宗正理云越次說者𩔰佊境識生无定故文光一四十九丁曰度造頌皆依明若先香後味即犯若先味後香即不犯今依本翻故味先香後云云宝一余三丁光不可触木者第六触釈二初惣釈二別列十一触論一七丁触有十一乃至柔輭名滑麤強為澁可秝名重翻此為輕煖欲名冷食欲名饑飲欲名濁此皆扵囙五果名故作如是說云云又曰地水火風能持自相乃所造色故名為果如是四果亦名大種一切余色所依性故体寛廣故或於地等增聚中形相大故或起種種大事用故此四大種能成何業如其次第能成持摂熟長四業地果能持水果能摂大果能熟風果能長長謂增盛或復流引業用既尓自性云何如其次第即堅濕煖動習性地界堅性水界濕性火界煖性風果動性由此能引大種造色令其相續生至余𭤧如吹燈光故名為動品類足及契經云何名風界謂輕等動性復說輕性為所造色故応風果動為自性舉業𩔰体故亦言輕文婆娑十三十二丁五事論下十二丁顕宗一三帋正記一二十一丁婆娑有廿七十三丁曰不由大種徧增故滑乃至渴但由大種性類差別有生滑果乃至有生渴界有余師言水火增故滑地風故澁火風增故輕地水增故重水風增故冷風增故飢謂增故擊動含渻引飢触生便発食欲火增故渴謂火增故𤋎迫飲渻引渴觸生便発飲欲然无評家正理一廾三丁云問不𮥷滑力則澀重劣在輕輭輕性中摂如是其余所触種類隨其所応十一中摂云云入論曰由此所逼𤌢欲囙名冷食欲囙名飢欲囙名渴此皆於囙立杲名云云覚天計大種外無所造色論二七帋婆娑百廿七初丁言無表者此下第七無表色釈於中二初牒票二解釈此句初也無表者親家訳若北凉曇无懺訳涅槃經善生經秦罗什訳智度及成実宋僧伽䟦摩訳雜心論等並名无作符秦僧伽提婆訳八揵度論宋僧伽䟦摩訳薩婆多論梁真諦訳旧俱舎等名為無無表色等者第二釈於中二初釈名二差別釋無表釋名論一九丁云云入論云无表者謂能自表諸心心所轉及差別故名表与彼同類而不能表故名無表此於相似言止言如於剎帝利等說非婆罗門等文正理二二丁従生者依身語表業生故云也阳心轉者隨定心轉故処中者處律儀不律儀中焉故云処中邊論十四初丁論云非律儀非不律儀也亦入論云云如下引非律等者身語業𧈧義非是律儀以不要期𣵀槃起故𧈧起眾𢙣而不要期一期活命故非𢙣律儀摂也如倫記十四上飾宗記二義林章云不可儀䡄同於律儀名非律儀非不可則如不律儀名非不律儀既有双非亦非六釈三未七丁別解脫者釈名論十四四右曰謂受戒初表無表別別棄捨種種𢙣故依初別捨義立別解脫名云云別解脫釈名無表疏上卅三丁淨影章十廾丁行事抄中一廾丁義林章三未五丁梵約疏一廾丁清凉玄談三四十丁対法論八十丁雜心十六丁光十四八右釈云謂初念表无表不殺戒等別別棄捨殺生業等種種𢙣故依初別捨義立別解脫名云云別解脫律儀異名論十四三右曰頌曰俱得名尸罗妙行業律儀唯初表无表名別解業道文論云別解脫律儀相差別有八一苾芻律儀二苾芻尼律儀三正学律儀四勤䇿律儀五勒䇿尼律儀六近事律儀七近㕝女律儀八近住律儀如是八種律儀相差別總名第一別解脫律儀𧈧有八種實体唯四一苾芻律儀二勤䇿律儀三近㕝律儀四近住律儀唯第四種別解脫律儀皆有体実相各別故所以者何𮥷苾芻律儀无別苾芻尼律儀𮥷勤䇿律儀無別近㕝女律儀云云入論云如是八種惟欲界繫文隨心等者定俱入論云靜慮律儀謂色界三摩地隨轉色此惟色界繫文道俱者入論云无口律儀謂无口三摩地隨轉色此惟不繫文此無漏戒依地者唯在無口未至中間四根本六地非余成尤通三果身除無口无処天梵三𢙣趣處中戒者入論云非律儀非不律儀者謂造毘阿罗窣堵波僧伽罗摩等及礼制多燒香散花讚誦願等并捶打等所起種種善不善無表色相疑轉文𢙣戒者論十四八丁右曰𢙣行業不律儀云云論十五四丁不律儀者明婆沙百十七初丁云云入論云不律儀者謂諸屠児及諸獵獸捕鳥捕𩵋劫盜典獄縛龍煮犳置弶膾此等心中不善无表色相續縛文論中十五四丁雜心三十丁婆沙百十七初丁正理三十六十一丁二十九二丁顕宗廿十丁大乗瑜伽九六丁対法八三丁義林章三未卅四丁対法八卅三丁倫記上九丁大乗義章七八丁北涅拌廾九十五丁說十六不律儀也第二心法者第二心法釈此中二初牒摽二解釈俱舎論一十二右頌曰識謂各了別此即名意処及七界応知六識轉為意論曰各各了別彼彼境果惣取境相故名識薀云云四十三丁曰集起故名心思量故名意了別故名識復有釈言淨不淨界種種差別故名為心即此為他作所依止故名為意作能作止故名為識故心識三名所詮義𧈧有異而体是一云云婆沙七十二初丁正理十一十九丁顕宗六十一丁入論云云光記四四十二右日梵名質多此云心是集起義謂理由心力集起心所及業等故經云心能導間心能遍摂受故能集記說名為心梵云末那此云意是思量義梵云毘者南此云識是了別義也文六識体一体別之異義一義云六識体一非体別一云云一義云六識体別非体一云云具如別記第三心所法四十六者者此下第三心所法釋於中三初牒標二解釈此中三初心所釈名二弁心所相三七右癈立心所有等者婆沙十六十二右曰問何故名心所是心所有故文光記四十一右曰心之所有故名心所応言心所有畧故但言心所猶如我所文就中等者第二并心所相此中二初正弁相二結釈初中六初大地法釈二大善地法釈三大煩𢙉地法釈四大不善地釈五小善地法釈六丁六不定地法釋大地法釈中二初牒票二解釋此中三初釈名二癈立三并相大有地法一者音牒摽地者至応知釈名謂此木句立論四三丁右曰地謂行処若此是彼所行処即說此為彼法地大法地故名為大地此中若法大地所有名大地法釈名謂法恒於一切心有文癈立正理十一三丁顕宗五十八丁婆沙四十二十七丁十六十二丁云云又秦疏四八丁日猶論師五義建立通大地二通三界二通六識三通三性四通漏無漏五通並顕起余此六不旲五義故不言也長耳三下具八通无八居五通大地体法師旲九義言通大地今依俱舎但一義立謂遍於一切心余此六不通一切心故不定也文受者正理第十一三丁云云顕宗五十八丁俞四三丁一十一丁受薀謂三領納隨觸即樂及苦不苦不樂文正理二十三丁隨触而生領納可愛及不可愛但相違触名為受薀領納即是云能受用義云云又云諸受畧有二緣境自性受者謂能領納自処隨触故乃至𧈧受亦能領納境界而此領納自性知故領納触為自性受此不共余易了差別如是諸受与心等法同所緣受故此異領納故所緣㕝別処緣㕝別由此触於受若時為処領是時非所緣若時為処緣是時非所領故緣領㕝別云云入論云領納三隨觸云云五㕝論下廿一丁曰是能領納自性隨触及所緣義彼領於境必有触故云云憂喜条捨五受発智十四婆沙百四十六俱舍論第三正理第九也想等者光四十四丁日想謂扵境執取男女木種種差別相能扵境中封疆尽果此是男女亦非男等故名男等正理云安立執立男女等等境差別相解云謂能為可安立廿等相念心心所執取女等境差別相是差別相囙文思等者思有㔟力能令心王扵境運動有造作用理実令余心所法有所造作従強說心故正理云由有思故令心於境有動作用猶如磁石㔟力能令鐵有動用文触等者光云根境識三和合而生举可以并以并䏻有作用触対前境𧈧心心所対境義辺並応名触触対強故偏得触名故入阿毘達摩云触謂根境識和合生令心触境以能養活心心所為順条受等差別有三解云従強令心理実亦令心所触境若依正理云触䏻為受囙解云举果文𩔰囙也欲等者光云欲謂扵境能有希求所作㕝業由有此欲心等趣境又入論云欲謂希求所作㕝業隨順精進謂我當作如是㕝業文惠等者元云推求名見决断名智簡択名惠謂於諸法能有簡択約用并也云云念等者光云念之作用扵所緣境分明記持能為後時不忘失囙非謂但念過去境也正理云於境明記不忘失囙說名為念又入論云念謂令心於境明記是即不忘已正當作諸事業義云云作意等者光云作動於意故名作意謂能令心驚覚前境心如睡眠况沒不行由作意力驚覚取境理実亦能驚覚心所従強說心故正理云諸心所法依心轉故但動於意余動亦成又正理云引心心所令於所緣有所驚覺說名作意此即間說為留意雜心名憶又入阿毘達磨云作意謂能令心驚覚即是引心趣境為義亦是境特曾受境等文勝解等者光云殊勝之解故名解勝謂扵境可審定是㕝必尓非不如是云云三摩地等者光云持力能令心王於一境轉若無等持心性掉動不能住境従強說心理實亦令諸心所法於一境轉故正理云令心無乱取所緣境不流散囙名三摩地三摩地者此云等持即平等心心所法令專一境有所成并故婆沙百四十一十二丁云問何故名等持平等持心令專一境有所成并故名等持文入論云定謂令心專住一境即是制如猨猴心惟於境而轉義毘婆沙者作如是說如虵在筒行便不由心若專定正直而轉文定七名如光記六卅九丁瑜伽抄五二丁同記四上二丁述六本上廿五丁中邊疏下十八丁第五本卅三丁瑜伽釈十六丁大善地法十者此下第二大善地法釈於中二初牒標二解釈此中四初釈名二癈立三并相四示諸論不同大善地等者牃票地如等者釈名謂此十法唯遍善心者癈立邊論一四右曰大善地法名大善地此中表法大善地所有名大善法謂法恒於諸善心一有云云正理十一六丁顕宗五十九丁婆沙四十二十八丁曰若法唯在一切光云今依此論一義癈立大善地法十謂唯遍善心大地十𧈧善心而非唯善心余心所法非唯善心亦非遍善心故皆不名大善地法文泰疏四九丁云猶命師具五義建立大善地一通三果二通六識三通口無口四并顕五唯是善今頌但一義釋謂唯通三性故遍善心簡余廿六數不遍善心文寳疏四十三丁云諸心所中有唯是善不遍善心欣厭也有遍善心非唯是善謂大地法有唯是善亦遍善心謂信等下有不遍善心及非唯是善謂尋伺二睡眠𢙣作唯染心所非善性加善言已蕳文善心中可得名大善地法云云信等者此下并相信者光云信謂令心澄淨理亦能令余心所澄淨従強說心由此信殊在心皆得法淨故入論解信云是能除遣心浊穢法如水精珠置於池內令浊穢水皆即澄淨如是信珠在心心池內心諸浊穢皆應除遺云云或於等者論有說云云諦者四諦等者等三宝善𢙣業異熟果等也不故逸等者光云謂能冬諸善法名不放逸即放逸文相違輕安者論廣云云光云謂心堤任性者輕安謂能令心於善有所湛任故正理十一六丁云正作意轉身心輕利安適之囙心堪任性說名輕安又入論云心堪任性說名輕安害惛沈隨順善法文有部意心輕安第六識相応通口无口通定散身輕安五識相応唯有口唯散意圣部意心輕安是心所而無別体即思差別唯定心有於散无五識相応理即非有輕安是輕触捨等者光云令心平等性従強說心亦令心所或心之平等性无驚覚性如持秤縷掉举相違說名為捨故入論云心平等性悅名為捨捨背非理及向理故由此㔟力令心於現及於非現无向无背字等而彼如持秤縷又正理云心平等性說名為捨掉举相違如理所引令心不越是為捨義文慙等者愧等者論四十一丁云云入論云云正理顕宗婆沙云云無貪等者光云於諸境界无愛染性說名無貪貪相違也無瞋等者光云於情非情无恚害性說若无瞋性相也不害者光云心賢善性無惱他名為不害能違害也懃等者光云勤謂令心勇悍為性即勤断二𢙣勤修一善无退也懈怠相故入論云精進謂於善不善法滅生㕝中勇悍為性即是沈溺生死泥者能業䇿勵心令速出義云云若依正理等者第四示諸論不同正理十一七丁婆沙二十八十五丁云有說猒以惠為自性云云有余師云猒以无貪為自性云云評曰有別法名猒非𢙣非無貪是心所法与心相応云云百九十六十二丁三說廾八同又婆沙一百四十三十二丁亦別言欣猒又婆沙七十五二丁云問若尓猒欣怖有何莂即名差別謂佊名猒此名怖尊者友作如是說怖惟欲界猒通三果復作是說怖在煩𢙉品猒在善根品復作此說怖通染无覆无記猒唯是善大住說曰於衰㕝深心於慮欲得遠𮥷說名為怖已淂遠𮥷深心增𢙣說名為猒如是為怖猒差別云云欣猒非並記𧈧唯善非通善通口无口唯意識相応非五識相応也又入論云欣謂欣向於還滅品見㓛往已令心欣慕隨順修善心有此故欣樂涅槃与此相名欣作意猒謂猒患於流轉不見過失已令心猒𮥷隨順𮥷染心有此故猒𢙣生死与以相応名猒作意文大煩𢙉等者第三大煩𢙉地法釈於中二初牃票二解釋此中三初釋名二癈立三弁相大煩𢙉等者牒摽地如等者釋名謂此六法等者癈立論四五右大煩𢙉法地名大煩𢙉地此中若法大煩惱地所有名大煩惱地法謂法恒於染污心有法佊是何頌曰痴逸怠不信惛掉恒唯染文正理十一七丁顕宗六初丁婆沙四十二十八丁云若法一切染污心中可得名大煩惱地法云云𬇦疏四十一丁云自古師諸師亦五義建立一通三果二通六識三通二輪四並𩔰起五唯不善友無記今依俱舎但一義釋謂恒唯染恒簡可教唯染簡遍十也文宝疏四十六丁此有四句有唯染非遍謂忿覆等及貪瞋等并无慙等有遍染非唯謂通中十有遍亦唯謂大煩𢙉地非唯非遍謂即尋伺睡眠𢙣作唯善心所非染性故染言已簡文无明等者此下第三并相無明者論四二丁云此中痴者謂所愚痴即無明無智無顕文婆沙四十三三右云云何无明三果無智此說応理謂三果繫無智共摂諸无明故若作此說不知三果名无明者則応不摂緣滅道諦二種無明佊不緣三界故文又婆沙卅八八丁云評日応作是說如是无明扵四聖諦一向闇昧一向不明了一向不訳以為自性無明不共云云无明相婆沙卅八八丁一解云不共無明見断有說五部皆有云云光云痴謂愚痴於所知境障如理无弁了相說名愚痴眼名明審名智彰了名𩔰此三皆是惠之別名也無明故名為无明無知无顕即是無痴所対除法云云放逸等者光云逸謂放逸不修諸善恐濫無記故言是修諸善即不放逸所対法治文又正理云於專己利棄捨縦情名放逸怠木者論同可知又正理十一八丁云怠謂懈怠於善㕝業欠减勝能於𢙣㕝業順成勇悍无明等流名為懈怠由此說為鄙劣勤性勤習鄙穢故名懈怠文不信者論可知又正理云不信者謂心不澄淨邪見等流於諸諦実靜慮等至現前輕毀於施等囙及於佊果心不現許名為不信文惛沈等者論四三丁右云惛謂惛沈対法中說云何惛沈謂身重性心重性身無堪任性心無堪任性身惛沈性心惛沈性是名惽沈対法此是心所如何名身如自受言故亦无失文正理云怪安処治文掉舉等者論同光云即実亦能令心所不靜従強說心正理論說捨所対治文又論中并本論十大煩𢙉地法与大煩𢙉地法相対四句分別大不善地等者第四大不善地法釋於中二初牒標二解釋此中三初釋名二癈立三并相大不善等者牒標地等者釋名謂此二法者廢立論四六丁右云大不善法地名大不善地此中若法大不善地所有名大不善心謂恒於不善心有佊法是何頌曰遍不善心無慙及無愧文婆沙四十二十八丁云若法一切不善心中可得名大不善地法云云𬇦疏四十二丁云古師亦以五義建立一道六識二通二相三並頭起四唯不善五唯欲界今依俱舎但一義釈謂唯遍不善心唯簡通十遍不善心簡此四欲此解不尒如大煩𢙉地法六尋伺此八既遍不善心云何轉遍不善心簡応以唯不善心簡司大地十以上可又善地已下未宝可等云云宝疏四十九丁云此有四句有不善非遍不善謂忿等七及不定中嗔有遍不善非唯不善謂大地十大煩𢙉六不定中尋伺有遍不善亦唯不善謂不善地二法有非唯不善非遍不善謂小惑三不定之中睡眠𢙣作貪慢疑等唯善心所不善已簡不労唯遍文正理十一八丁顕宗六二丁無慙等者并相論四十丁云有余師說於処造罪自覌无恥名曰無慙覌他無耻說名无愧若尒者此二所觀不同云何俱起不說此二一時俱起別觀自他尒有无耻視自眨勝說名無慙復有無耻覌他時增說為无愧文婆沙說五種大不善地法婆沙四十二十七丁云大不善地法有五種一无明二惛此三掉举四無慙五無愧文小煩惱等者第五小煩𢙉地法釋於中二初牒票二解釋此中四初釋名二癈立三并相四示諸論說不同小煩𢙉等者牒票也地等者釈名謂此等者癈立論四七右云小煩𢙉法地名小煩𢙉地此中若法小煩𢙉地所有名小煩𢙉地法謂法少分染污心俱乃至如是類法唯尽所断意識地起無心相応各別現行故名為小煩𢙉地法文婆沙四十二十八丁云若法少分染污心中可淂名小煩𢙉地法乃至又此十種唯修所断唯在意地若一起必無第二五相迸故名小煩𢙉地法文正理十一九丁顕宗六二丁泰疏曰十三丁故名小煩𢙉地法文正理十一九丁顕宗六二丁泰疏曰十三丁古師亦以五義建立一不通三果二不通六識三不通三性四不通三輪五別頭起今依俱舎以三義建立一如是類法唯修所断二意識地起三无明相応各別現行具此三義名為小煩𢙉地法宝疏云一唯修所断二唯意識地起三唯无明相応四各別現行大善地法不与一切染心相応煩𢙉之名以簡此法尋伺𧈧通染心欠四義故不名為小煩𢙉地法大煩𢙉地大不善地𧈧復唯与无明相応欠三義故不淂名小慢疑二種𧈧唯意地起唯无明相応各別頭起非唯冬断欠一義故不淂名小𢙣作一種𧈧唯断唯意地起以非唯与无明相応𧈧別頭起不名為小睡眠一種𧈧唯意地欠三義故不名為小貪瞋二種復唯与無明相応各別頭起欠三義故不名為小前之四地皆名為大此一地不淂大名者通大地法以遍一切心故名大大善地法以遍一切善心名大大煩𢙉地以遍一切善心名大大不善地以遍一切不善心故名為大又上四地法皆並頭起故名為大文忿木者此下弁相忿等者論同如文可知論廿一五丁無慙慳掉举貪等流无愧眠惛沈无明等流痴忿是瞋木流悔是疑等流有說覆是貪等流有說是无明等流有說是俱等流有知無知如其次第乃至誑憍是貪等流害恨是瞋等流𢙉是見取等流諂是諸見等流文如言何由謂諸𢙣見故定是諸見等流光四四十二丁云憍謂染著種姓色等自法為先令心傲逸於諸善法无所顧性故婆沙四十三八丁云此中憍者謂不方他但自染著種姓色力戝位智等心傲逸相文若依正記等対示諸論說不同可知不定八等者第六不定地法釋於中二初牒票二解釋此中三初釋名二相辨三示婆沙說不定八者牒票不定八等者釋名尋等者弁相論四十一丁廣云云正理十一十六丁顕宗六九丁婆沙四十二十二丁云或有執尋伺即心如譬喻者為彼執顕尋与伺是心所法或復有執尋伺是假為佊執𩔰此二種是実有法故作斯論何尋答諸心尋求弁了顕示推度搆尽分別類是謂尋諸心尋求等名𧈧有異而体无差別皆為顕了自性故云何伺答諸心伺察隨行隨轉隨流隨属是謂伺諸心察等名𧈧有異而体天差別皆為顕了伺自性故尋伺何差別答心性名尋心細性名伺是謂差別乃至有說云云有余師云云評日應作異說此中顕示即一心中性名尋細性名伺若作是說顕一心中有尋有伺尋令心伺令心細云云睡眠等者婆沙卅七八丁廣云云宗輪述記上四十七丁云云𢙣作等者論四八丁云𢙣作者何𢙣所作体名為𢙣作応知此中緣𢙣作法說名𢙣作謂緣𢙣作心追悔性如緣空解脫門說名為空緣不淨天貪說為不淨又見世間約所說依能依事如言一切村邑国土皆集會𢙣作即是追悔所依故約所依說先𢙣作又於杲体假立囙名如說此六触処応知名宿作業若緣未作㕝云何名𢙣作於未作事亦立作名如追悔言我先不作如是㕝業是我𢙣作何木𢙣作說名為善謂於善𢙣不作中心追悔性与此相違名為不善此二各依二処而起文婆沙卅七六丁云此中𢙣作惣有四句一有𢙣作是善於不善処起二有𢙣作是不善於善処起三有𢙣作是善於善処起四有𢙣作是不善於不善処起文貪等瞋等可知論十九初丁貪分二欲貪有貪云云慢等者慢或七或九發智論廿九丁品類足一三丁論十九十丁婆沙四十三十七丁百九十九八丁婆沙四十三八丁云憍慢何差別乃至此中慢者謂𭤧於他種姓色力財位智等自举特相文又云評日応作是說非一切慢要方他起無始時數習力故依自相續慢亦現行云云疑等者如文性若依等者三示婆沙說婆沙四十五十五丁云睡眠𢙣作怖尋伺及心又婆沙七十五初帋云怖以何煩𢙉為自性有說以有身見為自性云云有余師說以愛為自性云云復有說以無知為自性云云評日応知作是說此所起中応別說怖所以者何別心所与心相応是怖自性云云問此怖自性於何処有答在欲界有非上二界云云問異生聖者誰有怖耶有說異生有怖聖者無怖云云評曰異生聖者二皆怖云云問何等聖者有余小怖為有学位无学位耶有說惟何等聖者余小怖云云評曰学無学位皆容有怖学謂預流一不還者不学謂阿罗漢独学除佛尊佛無恐怖毛竪㕝於一切法如實通達得无畏故云云上等者第二結釋也婆沙更說欣猒怖心所法薀足論第八四丁雜㕝品中更說有眾多小煩𢙉名云云正理十一九丁云云光四廿七丁諸論說不同了簡云云問心所等者第三癈立此中二初問二答此中二初惣二別此中二初約正翻釈二約傍翻釋諸經論等者婆沙說四十九心所法薀足論說種種小惑名也如大地等者大地尋伺眠通三性𢙣作通善𢙣二性也西方師義𢙣作通三性也余等者大煩𢙉地大不善地貪瞋通五断遍六識也小惑唯修断不通五断唯意識相応不遍六識慢通五断唯意我相応不遍六識疑見四断不通五断唯意識相応不遍六𧥾也五断者一見苦断二見集断三見滅断四見道断五修道断也𢙉乱菩提者婆沙四十四四丁多說云云且大說曰菩薩昔居某樹下初夜魔女相媚乱尒時菩薩蹔起欲尋中夜魔軍總逼惱菩薩於彼蹔起恚尋漸後歇薄復起害尋須覚察即入慈定令魔兵眾推敗隨落文余小惑等文第二約傍翻於中二初總二別此中二初分科二弁相此中二初約并流門二約行相相似門文相易知身正道者五𧥾相応行捨正直者意𧥾相応行捨也第四心不者第四不相意釋於中二初牒摽二解釋此中二初釋名二辨相不与心等者釋名光記四四十六丁二解一義云心不相應簡異心所行謂行薀簡色及無為非行薀故又解心不相応簡薀中諸心所法行謂行薀簡色受想成及与无為非行薀故文宝疏四卅五丁云心不相応者簡心心所非色等性行薀所摂者簡色及无為法是故名心不相応行畧結名也廣応言非色非心不相應行今但言不相応行亦淂簡諸法尽言不相応簡一切心心所言行行是行薀簡色無為由此諸論多存畧名文論四十三丁不相応但有十四正理十二初丁更加和合性記四四十六丁了簡俱舎論正理論不同云云顕宗六十三丁大乗不相応行說瑜伽五十二十一丁六十五二丁五十六初丁唯識論一廿三丁二初丁𩔰揚論一十四丁雜集論二初丁樞要上未八丁倫記十五下初丁淂等者第二并相此中九𫨻初淂二非淂三同分四無想異熟五無想定六滅尽定七命根八四相九名句文釋淂者均獲或就三名一体通門婆沙三十二十八丁百五十七四丁說淂或就差別百六十二十五丁七說成就実有九十三初丁百五十七初丁光二卅二丁未穩四四十九丁善說也光云得獲成就義𧈧是一而依異門說差別名改於此釈總言一得於中義別立獲成就謂若有法従未此及已夫俱今初淂此法上淂創至生相將成就將名獲若流至現淂已不失名成就獲時不名成就成就時不名獲設有文言淂至生相名成就者於佊獲中說成就故設有文言淂至現在名為獲者於成就中說佊獲故如是名為獲成就別応知若於佊法有獲定有成就淂至相定流入現在世故白有於法有成就无獲如非想見惑无始或無初淂故文宝四卅六丁云云得大淂小淂大淂云淂小淂云淂淂也婆沙百五十八四丁然淂惣有四種在彼法前二在彼法后三每彼法俱四非佊法前后及俱若所得法則有六種一有所淂法唯有俱淂如異熟生等二有所得法唯有前後如三類智辺俗智等有說此等無有俱三有所約法唯有俱后如別解脫戒等四有所淂法唯有俱淂如道類智忍等五有所淂法旲有前后俱約如所余善染污等六有所得法不可說有前后俱淂而有諸得謂択滅非択滅必无有法唯有法后淂者現在前時必有淂故文光宝云云所淂法唯有情數法択滅非択滅也非情法虛空得无也非得等者第二非得釋論四十八丁正理十二十丁顕宗七初丁无記四四十九帋云謂若有法先未曾失及重得已但今初失此法非得創至生相將不成時說名不獲若緣至現在名不成就不獲𣆅未名不成就不成就時不名不獲設有文言非得至生相名不成就者於不獲中說不成就故設有文言非淂至現在名不獲者於不成就中說不獲故応知若於彼法說有不獲定有不成就非得至生相定流入現在故自有於彼法有不成就无不獲如无生智以於佊智无初非得故文宝疏云云婆沙百五十八九丁云一切非得惣有三種一在佊法前二在彼法后三非彼法前后及俱所不得法亦有三種一有所不得法唯有彼法非淂謂未情数畢竟不生法及入無余涅槃㝡后剎那心等二有所不淂法通有彼前復后非淂謂余隨応有情数法三有所不得法无彼前后及俱非佊而有非淂謂択滅非択滅必无非淂可与法俱以法現在前時是所得必有得故非所得者无淂无非淂故亦無唯有彼后非淂非無始恒或尤彼未捨必起彼類尽故然諸非得性劣故唯成就現在一一剎那約已即捨於未淂彼法及已捨位恒有此非得応知文光宝云云所不淂法唯有情数択滅非択滅也非情法虛空非得无也同分水者第三同分者論五初丁有別実物名同分謂諸有情展轉類等本論說此名眾同分此有二種一無差別二有差別无差別者謂諸有情同分一切有情各等有故差別者謂諸有情界地生種性男女近㕝苾芻学無学等各別同分一類有情各等有故復有法同分謂隨蘊処界云云光記五卷初帋宝疏五初丁正理十三十三丁顕宗七三丁婆沙廿七四丁同分体一物不相応行蘊摂惟无覆无記性惟有漏通三界異熟及等流云云有餘師說有情同分通善不善无記性摂云云評日乃至前說為善文无想異熟者第四无想異熟釈論五二丁若生無想有情天中有法能令心心所滅名為无想是実有物能未心心所如堰江河此法一向是異熟杲正理十二十丁顕宗七五丁婆沙百五十四八丁云无想天身量五百踰𧬆那壽五百劫有說結伽趺㘴云云有說却踞而座如是說者如先入北定所定威儀即以此威儀於復五百刧住文又云出无者說通五断云云有余師修行云云評日說好云云又云聖者有情前心多那后心多那有說前心多云云有說后心多云云如是說者此㕝不定云云又云佊想或善哉无記云云婆沙百五十四六丁従无想天沒定生欲界問定生何処有說生地獄有說生𢙣趣如是說者定生欲界処処不定云云無想定者第五無想定釈論五三丁如所処說有法能令心心所滅名為无想如是復有別法能令心心所滅名无想定无想者定名相无定或定无想名无想定云云光記五十三丁如前処說有無想異熟法能令心心所滅名為无想如是復復別心不相應行法能令心心所滅名无想定体身中無想名無想者无想者之定名無想定依主釈也或即定無想名无想定持業釈文婆沙百五十一卷至百五十四卷正理十二十六丁顕宗七六丁定感異熟婆沙十九十一丁五說百十八九十丁八說入北定次第婆沙百五十二初丁起北定処処婆沙百五十二初丁有說唯欲界人云云有說亦色界下三定起有說亦第四定起無想天除云云婆沙百五十二三丁云退如譬喻者不退有部也婆沙百五十一十四丁云𮥷第三徧淨天染此定現云云二無心定大乘唯七卷述記七本六十二丁六十八丁灯五未演秘六本対法論対法抄五六丁瑜伽十二廾丁五十六初丁六十二七丁卅二十四丁唯識論一廾七丁智論卅九初丁瑜伽抄十五四十一丁十五下初丁十七下十丁八上十七丁十四上廿丁瑜伽抄十五初丁十六七丁十三六十八丁九十丁樞要上未廿一丁対法抄五三十六丁灯二未四十五丁演秘二本五十丁隨滅尓所心心法等者滅第六意識大地法大善地法欣猒廿三心心所示所物現前為此定体也光五十六丁滅尽定等者第六滅尽定釈論五四丁復有別法能令心心所滅名滅尽定云云婆沙百五十二十四丁云問此滅尽定多物為体有說此定一物為体若滅現前即名无心問曰何一滅剎那現前即名无心如一受剎那現前即名有受一想剎那現前即名有想一識剎那現前即名有識如是一滅剎那現前即名無心斯有何過有說此定十一物為体以十大地法及心滅故有說定二十一物為体以十大地法十大善地法及心滅尽故如是說者隨滅示所心心所法即有示所物現前為定体云云又百五十三三丁云問入滅尽定時滅何等心心所法為過去為未來為現在若過去者已過去滅復所滅若未未未至云何可滅若現在者現前不住何滅設非定力亦自滅故荅応作是說滅於未問未未至云何可滅住現在於未心心所法令不相故說為滅如断城路閉門竪幢不令人入出說名除冠此亦如是有說通滅未現在云云光五十五丁婆沙百五十至百五十四正理十二十八丁顕宗七八丁滅定入心有漏出心有漏無漏婆沙百五十三二丁三說隨滅尓所心心所等者滅意戈大地法大善地法欣猒廿三心心所有尓所物現前為北定体光五十六丁命等者第七命根釈論五八丁云命体即壽故対法言云何命根謂三界壽北復未了何法名壽謂有別法能持煖𧥾名為壽云云正理十二六丁顕宗七十三丁婆沙廿七三丁云有說命根体是多物云云評日應說命根体是一切有一命故名有命根云云唯異熟增上名根者論三初右云根是何義㝡勝自在光顕名根由此總成根增義文光三初右云云婆沙百四十二八丁云問何故名根根是何義增上是根義明義是根義現義是根義喜覌義是根義端主義是根嚴義是根義最義是根義勝義是根義主義是根義云云生住異滅等者第八四相釈論五十二丁云頌曰相謂諸有為生住異滅性論曰由此四種是有名相法若有此應是有為与此相違是无為法此於諸法能起名生能安名住能衰名異能壞名滅性是体義文正理十三十丁顕宗七十四丁婆沙従卅八十三丁至卅九十三丁大小四相各有三名大相三名者一名本相二名大相名生住異滅小相三名者一名本相二名小相三名生生等光五卅八丁具釈論五卷十三丁云四本四隨於八扵一切能別故何謂卭能謂法作用或謂士用四種本相一一皆扵八法有用四種隨相一一皆扵一法有用其義云何謂法生轉並其自体九法俱起自体為一相隨相八本相才生除其自性生余八法隨相生生於九法唯生本生謂如雌雞有生多子有唯生一生与生生生八生一其力亦然本相中住亦除自性住余八法隨相住住於九法中唯住本住異及滅相隨応亦尓是故生等相復有相隨相唯四無无窮失文又北体滅用滅爭南寺傳用滅云云北寺傳体滅云云具如三聖佛法傳通記及予別記也名等者第九名句文釈此中三初名二句三文釈也論五十九丁云名謂作意如說色香味等想句寺謂章詮義究竟如說諸行無常等章或能并了業用往時相応差別此章句文者謂字如說哀阿壹伊等字云云正理十四十二丁顯宗八五丁発者一十丁婆沙従十四十一丁至十五卷名者梵云那去摩唐言名是隨義皈義赴義名義謂隨音皈赴於境呼召色等名能詮義能非義合非能詮義亦非義合故入論云非即語音親能詮義勿說火𣆅便燒於口要依語故火等名由火等名詮火等義詮者謂能於所詮義生地学惠与義合句梵云鉢陀唐言迹如一眾身有四足迹如一頌總四句成故就義之為句句能詮義究竟梵云傳迦吉阿文唐言章還是詮義究竟如說諸行無常等章章即句句是囙又者梵云便那唐云文是能彰顕義近顕名句遠顯於義梵云𢙣剎那唐言字是等流轉義謂不隨方流轉改易亦是能彰顯義能近彰名句遠顯義也字即文具也即哀阿等字是不相應行摂非同此方墨書字也字又无詮表有詮表者即是名句字但是名句所依能顯佊二体无詮表云云光五三十三丁大乘義林一本卅丁対法抄一十一丁第五无為等者第五无為釈於中二初牃標二解釈此中二初總釈無為義二別釈三无為也无囙多者婆沙七十六七丁有為无義釈几說章釈依第八覚天說欤虛空多者第二別釈此中三初虛空二択滅三非択滅也虛虛空但以無碍為性由无障故色於中行文正理一十三丁十九卅三丁顕宗一十一丁光記一廿六丁云虛空空界別也依之婆沙虛空空界五種別婆沙七十五九丁云虛空非色空界是色也虛空无見空有見虛空無𭔹空界有𭔹虛空無漏空界有漏虛空無為空界有為文又婆沙七十五十丁問以何義故知有虛空尊者友云云乃至評云応作是說実有虛空非佊不知即謂非有由前教理有虛空文択滅等者第二択滅釈於中二初牃票二解釈此中二初釈名二明択滅体量論一三右云択滅即以𮥷繫為性諸有漏法遠𮥷証得解脫名為択滅択謂揀択則惠差別也各別揀択四聖諦故択力所得滅名為択滅如牛所駕車名曰牛車畧去中言故作是說云云正理一十三丁顕宗一十三丁光記一卅七丁択滅十三畧名婆沙卅一初丁云如是択滅亦名𣵀拌亦名不同類亦名非聚亦名非顯亦名通達亦名阿罗漢亦名不親近亦名不修習亦名可愛樂亦名近亦名妙亦名出𮥷問何故択滅亦名𣵀拌槃名為趣涅名為出永出諸趣故名𣵀槃復次等云云択滅釈名婆沙卅一十三丁光記一四十丁或无染異染名惠名別此差別惠各別簡択四聖諦故滅体先有但不成就由択力所得名為択滅畧力所得但言択滅択之滅故名為択滅依主釈云云隨有漏等者第二択滅体量也択滅体七說婆沙卅一十四丁云択滅自在有說一物云云有說二物一見所断法択滅二修所断法択滅有一云云有說五物謂見所断法択滅有四修所断択滅有一云云有說有十一物謂見所断法択滅有八修所断法択滅有三云云有說有三十五謂見所断法択滅有八修所断法択滅三界各九為二十七足八為三十五云云有說有八十九謂見所断法択滅有八修所断法択滅九地各九為八十一足前八為八十九云云評日応作是說隨有漏法有欠佊体択滅亦尓隨処繫㕝体有尓所𮥷繫亦尓有欠所体故云云非択滅等者第三非択滅釈也於中二初牒揀二解釈此中二初明釈名得緣或科応云初釈名二明非択滅体量非由等者釈名解曰非択力所得滅故名非択滅但由等者約緣謂但由緣欠約非択滅故論云約不由択由欠緣婆沙三十三五丁答由欠緣故云云又解云非由等但由等共釈名一假也謂非択滅力所得滅故但由欠緣故名非択滅為言二由初解為勝論一四丁云永礙当生得非択滅謂能永碍未法生得滅異前名非択滅得不囙択但由欠緣故云云婆沙卅二五丁問已知非択滅体非𮥷繫応說何說名非択滅耶不由択惠得此滅故名非択滅非択杲故復次此滅不由一向加行一向㓛用揀択諸法得故名非択滅復次此滅不要由数数决択苦等得故名非択滅問尓此滅何而得由緣故云云光一四帋正理一十四丁顯宗一十三丁隨有為等者第二明非択滅体量婆沙廾二六丁評家日非択如有為法數量文雖在等者論一四丁婆沙三十二五丁云問於何諸法得非択滅耶有說是說於三諸法皆得非択滅是有為故云云有余師說但於過去未諸法淂非択滅非於現在以現在法在身行故云云或有說者唯於未法淂非択滅非過去現在所以者何過去諸法已在身行現在諸法在身行故云云評日此非択滅唯於未不生法淂所以者何此滅本欲者為法令緣不生若法不生北淂便起如此欲法繫故属有情現在正行過去已行未當行皆有生義故於彼法不淂此滅文論体等者有云此解當婆沙不正義云云今謂此解不可也婆沙評家云云非択滅休如有為法数量故云論体實通三也光一四十一丁択滅与非択滅体多少㕝婆沙卅二六丁有說択滅多非択滅少云云有余師說非択滅多択滅少云云評日非択滅多択滅少所以者何非択滅如有為法數量択滅但如有漏法數量故云云択滅与非択滅得四句分別論一四丁婆沙三十三六丁
