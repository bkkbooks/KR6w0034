body:
  text: 智山沙門釋龍謙撰六門分別者第五六門分別釋於中二初票列二釋此中五𫨻六界等者第一𫨻於中二初列名二釋界名三經法分別論一草二丁婆沙七十五四丁正理三草丁顯宗三五丁心王即是有漏者由許六界是諸有情生所依故如是諸界續生心至命終心恆持生故諸無漏法別不別如是故局有漏不通無漏也六通等者第二𫨻于中三初列名釋名二出體三經法分別論草七十丁婆沙九十九八丁百四十一十三丁集異門足十五十四丁正理七十六八丁顯宗卅七九丁智證境無倒了名通者婆沙百四十一十三丁云問何故名通答於自所緣無倒了達妙用無礙故名為通文定及境能證為名者謂定云神境云境能證云智證通也根及等者天眼二字根智證通三字能證也天耳釋凖可知他心等者他心二字加行加行觀他心故智證通三字能證也漏尽等者漏尽二字所證或所依智通三字能證智也於此六通中四唯有漏謂神境通天眼天耳宿住通二通漏無漏謂他心通漏尽通也三性中天眼天耳唯無記余四通唯善性依地前五通唯依四靜慮漏尽通依一切地六垢等者第二𫨻於中三初列名二經法分別三釋名論草一五丁婆沙四十七十六丁正理五十四十六丁顯宗草七十五丁穢污等者依論也論云如是六種垢文于六垢中誑憍是貪等流害恨是瞋等流𢙉是見取等流諸見等流也六因等者第四𫨻於中二初列名釋二解釋此中六𫨻初能作因二俱有因三同類因四相應因五行因六異熟因六𫨻中隨應釋名出體經法釋或釋名經法釋論六初丁婆沙十六七丁十七十一丁十八二丁十九卷草卷草一卷發智論一十一丁正理十五初丁顯宗八十四丁能作因等者釋名能作者不障礙義或有所辨義婆沙廾一十一丁謂法生此因不障礙故不障礙義此因能作果故能作有所辨義因能作果是所作能作即因名能作因持業釋或謂能行是親因余不相障者踈因此踈因是能作之因名能作因依主傳傳為因能生果故故正理十九草六丁云或是佊能作之因名能作因是此故與彼傳為因義文以一切等者出體遍通等者經法分別俱有因等者釋名俱有石相應同一果義相隨順義婆沙十七十一丁或俱有有力用故名俱有俱有即因名俱有因持業釋或因與果俱故名俱有俱有之因名俱有因依主釋或得作俱有即因持業釋以三等者經法分別同類因等者釋名同類者種類義界地等義部類等義婆沙十八九丁因果相似名為同類若同類即因名同類因持業釋者同類之因名同類因依主釋以通等者經法分別過去等者唯過去現在七十二法為體未七十二法非此因體未無同類因故相應因等者釋名心心所法三義平等故曰相應即因名相應因持業釋也若不相應因名相應因依主釋以三世四十六心心所法為依者經法分別六字恐誤應作七遍行因等者釋名遍行者遍為因義能遍緣義遍增隨增義婆沙十九九丁遍與自地五部染法為因故名遍行遍行即因名遍行因持業釋以過去等者出體若諦下遍行七謂五見疑無明也集下遍行四謂邪見見取疑無明也相應法第六識大地法大地法大不善地法尋伺睡眠草二心心所也俱有者四相也未苦集下十一遍行隨眠相應俱有法非遍行因未無遍行因故遍行隨眠義者是三㕝故名為遍行一於五部法遍隨增故二於五部法遍能緣故三于五部法遍為因故是以遍說彼相應法俱有二㕝除遍隨增彼俱有法俱有一㕝謂遍為因故婆沙十八十五丁遍行隨眠等得非遍行因婆沙十八十五丁評家義以七十等者經法分別心王取第六識前五識與遍行隨眠不相應故異熟因等者釋名異類而熟是異熟義謂善不善因以無記為果果是異熟義婆沙草丿十七丁若異之熟名異熟依主釋異熟之因名異熟因第二依主釋即兩重依主釋或異熟名能熟善不善異即熟名異熟持業釋異熟即因名異熟因第二持業釋即兩重持業釋此六因並不得作有財釋若言用能作等為因名能作因等即顯此六體非是因用他為因然此六種體是因故三世等者出體以七十等者經法分別六波羅等者第五假於中二初列二名解釋此中初釋波羅密義二別釋此中六𫨻論十八九丁婆沙百七十八初丁正理四十四四丁顯宗草四三丁婆沙百七十八二丁外國師說有六波羅密多謂於前四加忍靜慮迦濕羅國諸論師言二波羅密即前四所攝謂忍攝在戒中靜慮根在般若戒惠滿時即名彼滿故云云布施財法等者財法等者所施施有三種謂財施法施無畏施等者等無畏施以能等者辨能施體能施體無貪同時心心所心王大地法大善地法尋伺所發身色無表語無表二業也七門分別等者第六七門分別釋於中二初票列二釋此中五𫨻七慢等者第一𫨻於中三初列名二辨相三經法分別論十九十丁品類足一三丁發智論二十十丁正理四十七十五丁顯宗草五十丁婆沙四十三十七丁此七慢通見修二斷通三界繫唯有意戈地也七識住等者第二𫨻於中四初列名辨相二廢立三出體四經法分別論八七丁集異門足十七四丁品類足七九丁發智論十三卅三丁正理草二初丁顯宗十二九丁婆沙百卅九六丁分天天者分天二字字誤應作一分謂欲界天及初靜慮等者今依論婆沙不言初天婆沙意初靜慮天一分第一識住攝一分第二識住攝以不定故是故不言具如光記八十七丁了簡也除劫初起者初定劫初起非第一𧥾住故第二識住攝也想異謂彼若等者謂約相應受分成三種若在欲界具有三想若在初定除若有二也二身異想一如梵衆天等者梵衆天言舉初顯後總攝初定三天唯取初定三天劫初起不取後恃初定三天也余𢙣起第四等者論二釋中依第一釋釋也起字誤應作趣三𢙣趣有重苦受能于識第四靜慮有無想定及無想㕝有頂天中有滅尽定能壞於識令相續斷故非識住余六十九法隨應等者第一識住以六十九法為性於中人通六十九法初天以五根色觸無表心王大地法大善地大善地誑憍尋伺貪慢疑除無表異熟二定余不相應法五十五法為性第二第三第四識住以五根色觸無表心王大地法大善地大地憍貪慢疑得非得同分四相命根四十八法為性若約隨身繫更加名句文後三識住以心王大地法大善地法大地法憍貪慢疑得非得同分命根四相三十九法為性也七種聖人等者第三𫨻于中五初列名二釋名三明位四出體五經法分別論二十五九丁草三十四丁草四九丁集異門足十六十一丁婆沙五十四初九丁隨信行者等者論云依加異立初二種謂依先隨他及法於所求義修加行故立隨信行隨法行名依根不同立次二種謂依鈍利信惠根增如次名為信解見至依得滅定立身證名由身證得滅尽定故依解脫異立後二種謂依唯惠離障者立惠解脫依兼得定離解脫者立俱解脫此名𧈧七㕝別唯六謂見道中有二聖者一隨信行二隨法行此至修道別立二名一信解二見至此無學復立二名謂時解脫不時解脫應知此中一隨信行根故成三謂下中上性故成五時法等者道故成十五謂八忍七智離染故成七十三謂具縛離八地染依身故成九謂三洲欲天善根性道離染依身相秉合成一億四七千八百二十五種隨法行等者如理應思文婆沙五十四五丁已下七聖人釋名并由五象故建立七種及約根性道離染依身廣釋往見此七等者若約無為為體可云擇滅也以無表等者無表唯取道俱無表心王唯無漏心王余心所得四相無漏為體七若約無為為體亦更應云擇滅為體也七支等者第四𫨻於中三初列名二出體三經法分別論十四十八丁十六十七丁行㕝鈔資持記中三一八丁十三丁草七丁四分律十一八丁十二四丁十誦律九十丁草八夕論六九丁五分律六三丁法苑珠林九十三至九十四卷婆沙百十三三丁百草三十六丁此七支戒通定俱戒道俱戒別解脫戒也具釋別解脫七支者前四支者如前五戒𫨻釋五不𢙣語者以染心發非愛語毀訾於他名𢙣語離此名不𢙣語此戒制戒因緣者佛在舍衛六鄭毀罵斷㕝人因制四分律十一五丁云信佛言凡有所說当說善語不應𢙣語便自熟𢙉乃至畜生聞毀慙愧况於人也次犯緣明者具四種一染污心二發非愛語三解義四不誤也六不離間語者染污心發壞他語名離間語離此名不離間語先明制戒因緣者佛在舍衛六郡傳他佊此語令衆鬪淨不能除滅故制次云犯緣者具四種一染污心二發壞他語三解義四不誤也或具六緣一比丘二說鄙𢙣㕝三傳於彼此四分離意五言了六時知也七不離穢語者離字誤應作種也一切染心所發諸語名雜穢語離此名不雜語先明制戒因緣者佛在抅睒闡陀犯罪余比丘問以余㕝作自制已遂𢙉僧喚不等又作白制自而作故制次明犯緣者具四緣一作自口業倚二數𢙉不正三為僧單白止四更作便犯也無表以無等者通別解定俱道俱無表非余無表也七覺支等者第五𫨻於中三初列名二經法分別三釋名論二十五十二丁集異門足十六九丁品類足七十丁十初丁十五初丁正理七十一五丁顯宗卅四初丁婆沙九十六三丁百四十一九丁七覺支唯無漏於修道中建立故依地者喜覺支者初定第二定余六通未至中間四根本下三無色地前四等者念覺支念定覺支定擇法覺支惠喜覺支喜受輕安覺支輕安捨覺支行捨精進覺支勤覺謂覺等者婆沙九十六八丁有說此能覺語故名覺支云云百四十一九丁問何故此七名覺支耶覺謂究竟即尽無生智或如實覺即無漏惠七為彼分故名為支擇法亦覺等支余是支非覺此七廣辨如余處說文八門分別等者第七八門分別釋於中二初票別二釋八戒等者第二釋此中五𫨻先第𫨻此中二初正八戒釋二因未十戒初中三初列名二出體三經法分別論十四三丁婆沙百廾四六丁廾八夕論一草丁業㐬二下十五丁法苑珠林百六行㕝資持記下三四草二丁一不殺等者婆沙百草四六丁云如契經說近住律義具足八支何為八謂離害生命離不與取離非梵行離虛誑語離飲酒諸放逸處離歌舞倡妓離𡍼飾香鬘離廣離非時食問此有九支何以言八二合為一故說八支謂離𡍼飾鬘與離歌舞倡妓同於莊廣處博故合立一支問云何名近住云何近住支離非時食名為近住離害生等名近支問此近住支應惟有七離非時食名為近住亦近住支故不惟七如王見名道亦道支余名道支非道云云又云問近住律儀云何而得他教得謂為師教自發誠言恭敬受得問受律儀者或先自發言或與師俱說得律儀不不得要隨師語如師語而說方受得故問近住律儀從誰應受七衆受得皆非餘所以者何若無尽壽戒者則不堪任為戒師故問著何服飾受此律儀常所受用衣服嚴具著之皆得受此律儀若為暫時莊嚴身者必頃棄捨方受此戒牀座等具准此應知問齊何時受齊一晝夜不增不減謂清旦師受得至明清且律儀便捨問若有頓受半月一月或復多時得律儀不應言不得所以何一晝夜時分限定故云云不𡍼飾等者不著香華瓔珞不香以𡍼身不著香薰衣不自歌舞作條亦不往觀聽也高廣等者業㐬二下十五丁云何舍中八種牀金銀牙角等者嚴飾故勝佛及師僧父母人故勝俱不合升也有余文中高廣牀者約相辨離高即八指以上廣謂𭤧三時者不可俱有單高亦制文列高者即蕳釋六已下開用又言勝者即列八種不必高大如用師父所褥即是長慢故特制也文又法珠林百六三丁云又阿𭇥經云高廣大牀者梐下足長釋六非高闊四釋非高長八釋非大越北量者方名高廣大牀復有八種牀初四約物辨貴體不合㘴下約人辨大令地鋪擬於尊人亦不合㘴一金牀二銀牀三牙牀四角牀五佛牀六辟支佛牀七羅漢牀八師僧牀父母牀座不在禁限非時食者多論七草四丁四一且至中其明轉盛名之為時中後明沒名為非時二且至中作食時節乞不生惱中後已去及上可知三中前俗人㕝務淫惱未發中後間預入村乞食多被譏謗四中前乞食濟身過中靜因修道非是食時名為非時毗羅三昧經云早起諸天食日中三世諸佛食日西畜生食日暮鬼神食云云又婆沙百八十二十二丁世尊唯離非時食五人不尓云云五分律八七丁迦留陀夷夜乞食緣制非時食云云此八戒制戒㕝流記三草丁佛成道九年說八𨵿戒經云云第六開二等者不𡍼飾香鬘為第六不舞歌觀𦗟為第七也八正道等者第二𫨻于中二初列名二經法分別論草五十二丁集異門足十初丁正理七十一五丁顯宗卅四初丁婆沙百四十一十丁九十六八丁此八名為道支其釋名婆沙云有說此能非趣故名道支問若尓則應一是七非七是道分能隨順道勝而說亦名道支復有說者是道之支故名道支問若尓則應七是一非正見是道亦是道支余七是道支而非道云云八正道依地正見正精進正念正定四通未至中間四根本下三無色地正思惟唯在未至初定正語正業正命通未至中間四根本地也正思惟以不定中尋伺為性者伺字恐衍字正思惟遍尋不通伺故是故論云正思惟以尋為體文婆沙云正思惟即尋又九十六十五丁問何故尋伺俱通無漏唯立尋為菩提分法伺無彼相是故不立復次菩薩分法行相猛利伺用微劣是故不立復次伺用為尋所復故䇿於正見尋用偏增故伺不立等分法文語業命三等者正語正業正命以道俱無表為性也八解脫等者第三𫨻於中六初列名二辨相三釋名四出體五經法分別六明依地論草九四丁婆沙八十四八丁集異門足十八九丁品類足七十二丁正理八十四丁顯宗四十八丁初二解脫一一通依初二靜慮治欲界初靜慮中顯色貪第三解脫依後靜慮離八災患心證淨故四無色定善各能解脫次下地心故為次四解脫滅受想定棄皆一切有所緣心名第八解脫也棄皆受等者婆沙八十四九丁問何故名解脫解脫是何義棄背義是解脫義問若棄背故名解脫者何等解脫棄背何心初二解脫棄背色貪心第三解脫棄背不淨觀心四無色處解脫名自棄皆次下地心想受滅解脫棄背一切有處緣心故棄背義是解脫義尊者世反云云大德云云𦚰尊者云云若並助伴者皆五薀者此依論說論與婆沙不同光記草九十丁問何故婆沙云欲界者以四薀為自性色界者以三薀為自性解脫云此論據勝婆沙兼據似說問婆一明依論故言四薀界地唯約勝悅不言欲界文四無色解脫以心王大地法十為體者恐大地法十字下悅大善地法十得四相八字歟無色解脫以心王大地法大善地法得四相為體故也八勝處等者第四𫨻於中五初列名二辨相三出體四辨解脫勝處差別五釋名論草九五丁婆沙八十五四丁集異門足十九初丁品類足七十三丁正理八十九丁顯宗四十十一丁前修解脫乃至或終不起者或字恐誤應作惑故北下辨解脫勝處差別論云若等八勝處何殊三解脫前修解脫唯能棄背後修勝處能制所緣隨所樂觀惑終不起文心脫境處故名勝處者釋名心字恐衍字歟或心勝境處四字應作勝處緣境然光記草九十五右同今恐字誤婆沙二釋中今章依初釋歟婆沙八十五四丁問何故名勝處勝處是何義勝所緣境故名勝處復次勝諸故名勝處𧈧視行者非一切能勝處緣復於所緣不起亦名為勝如契經說於此處勝故名勝處文八難等者第五𫨻于中四初列名二釋名三出體四經法分別三藏法數卅三九丁梵網古迹下六丁標指抄中二七丁三藏法數云八難出維摩詰所說經八者所障難也此之八所𧈧感報苦條有異而皆不得見佛不聞正法故總為也一住地獄難謂南瞻部洲之下過五百由旬有八寒八熱等獄皆名地獄衆生因𢙣業所感隨於彼處長夜受苦無間障於見佛聞法故名地獄二在畜生難謂畜生種類不一亦各隨受報或為人畜養或居山海等處常受鞭打殺害又或互相吞噉受苦無窮障於見佛聞法故名畜生三住餓鬼餓鬼有三種一其業嚴重者長劫不聞漿水之名二其業次重者唯有人間伺求䔽滌膿血糞穢三其業輕者時或一飽加以刀杖驅逼填河塞海受苦無量障於見佛聞法故名餓鬼四在長壽天謂此天以五百劫為壽即色界第四禪中無想天也言天想者以其心想不行如氷𩵋蟄蟲外道修行多生其處障於見佛聞法故名長壽天五在北𬅕單越難梵語𬅕單越華言勝處謂此天處感報勝東西南三洲也其人壽一千嵗命無中夭為著樂故不受教化是以聖人不出其中不得見佛聞法故名北𬅕單越六盲聾瘖啞謂此等人𧈧生中國而業障深重盲聾瘖啞諸根不俱值隨佛出世而不能見佛𧈧說法亦不能聞故名盲聾瘖啞𮥷七世智辨聰謂世間之人邪智聰利者唯務耽習外道經書不信出世正法故名世智辨聰八生在佛前佛後謂佛出現於世為大導師令諸衆生𮥷生死苦得𣵀拌條人有緣者乃得值遇其生在佛前佛後者由業重緣薄不見佛亦不聞佛故名生在佛前佛後文長壽天多說華某大㐬卅四中四十四丁摽指抄中二七丁第八異義標指抄中二七丁佛前佛后者何云勒出世已前釋尊入滅已後謂之佛前佛后然有佛法人能傳說猶名佛世是故增劫人壽七歲時羅漢入滅已后勒出世已前是佛前佛后分有云劫初唯條謂之佛前劫尽唯若謂之佛后以唯苦故不修勝業以唯條故無厭離心是故為化時文私云此八難中七難不能入聖𮥷染佛前佛后𧈧有𮥷染不能入聖也又佛前佛後除如在世及滅后千年余佛前佛后謂如出世以前佛前也釋迦如滅后千年后無入見道者八草意是則佛后也九門分別等者第八九門分別釋於中二初票列二釋此中五𫨻九結等者第一𫨻於中四初列名二出體三經法分別四釋名論草一初丁集異門足十九三丁品類足一三丁六初丁發智論三初丁正理五十四初丁顯宗草七七丁婆沙五十四丁四十六五丁結何義繫轉義是結義合若義是結義雜毒義是結義乃至應說九有情等者第二𫨻於中三初列名二配立三出體論八九丁集異門足十九四丁品類足六初丁八二丁發智論十三草三丁正理草二十一丁顯宗十十二丁婆沙百卅七十丁余處皆非者余處謂諸𢙣處非有情類自條居中𢙣業羅剎逼之令住故彼如𥤱獄不立有情居第四靜慮除無想天余非有情居也論八十丁婆沙百卅七十一丁問何緣𢙣趣及無想所不攝廣果等非有情居有作是說彼亦應立為有情居而不立者是有余說尊者世友作如是說此是世尊要略而說然𢙣趣等者攝在此中謂𢙣趣當知攝在初劫有情居無想所不攝廣果天等当知攝在第五有情居所以者何以地同故有說云云九地等者第三𫨻于中四初列名二釋名三出體四經法分別四是三無色通百漏無漏者初定近分根本俱通有漏無漏上三靜慮及下三無色近分唯有漏根本通有口無口也無表通欲界四定者散無表唯欲界繫定俱無表通四定根本近分地道俱無表唯在未至中間四根本地也九地第定者第四𫨻於中四初列名二釋名三出體四經法分別論五七丁云入九次第定次第婆沙百五十二五丁諸欲入佊定者先起欲界善心次入初靜慮次入第二靜慮如是乃至入無所有處次入非想非非想處於非想非非想處二中下心上入中中入下下品心斷入滅尽定云云九遍知等者第五𫨻于中三初列名二經法分別三釋名論二十一十四丁發智論四十八丁婆沙六十二八丁正理五十六九丁顯宗草八十三丁云遍智建立前六偏知由三緣謂得無漏𮥷繫得故缺有頂滅雙因故諸斷要具如是三緣立偏知名闕則不尓後三偏知具由四緣謂於前三加越界故言趣界者謂此界中煩惱等法皆全𮥷故論意若依婆沙等前六由四緣後三由五緣更如𮥷俱繫故也論意𮥷俱繫與滅雙因及越界緣用無別𧈧義有異而不別說也此九等者欲見苦集斷偏知欲界見苦集所斷擇滅為性欲界見滅斷偏知欲界見滅所斷擇滅為性欲見道斷偏知欲界見取道所斷擇滅為性色無色見苦集斷偏知上二界見苦所斷擇滅為性色無色見滅斷偏知上二界見滅所斷擇滅為性色無色見道斷偏知上二界見道所斷擇滅為性五順下分結尽偏知三界見所斷擇滅及欲界修所斷擇滅為性色愛尽偏知色界修所斷擇滅為性一切結永尽偏知三界見修所斷擇滅為性也言遍知等者依論釋也云論即諸𮥷繫彼彼位中得遍知名遍知名遍知有二一智遍知二所遍知智遍知者謂無漏智斷遍智者謂即諸斷此於果上立因名故文又婆沙六十六八丁問斷是無為不能緣慮無决了用何名遍知此𧈧不能緣慮决了而是智果故名遍知云云十門分別等者第九十門分別釋於中二初票列二釋此六𫨻十纏者等者第一𫨻此中三初列名二釋名三經法分別論草一四丁正理五十四十四丁顯宗草七十三丁婆沙四十七十六丁纏縛有情故為纏者入論云此十纏縛身心相續故名為纏文十隨眠等者第二𫨻於中四初列名二釋名三約部界辨體四經法分別論十九三丁正理四十六初丁顯宗草五二丁隨謂等者論草十五丁論云根本煩𢙉現在前時行相難知故名微細二隨增者能於所緣及所想應憎惛滯故言隨逐者謂能起得恆隨有情常為過患不作加行為令彼生或設劬勞為彼起而數現起故名隨縛由如是義故名隨眠文又婆沙五十初丁問何故名隨眠隨眠是何義微細義隨增義隨縛義乃至廣說十善業等者第三𫨻於中三初列名二出體三經法分別論十六四丁發智論十一初丁四十一七丁顯宗草二二丁婆沙百十三九丁十善業道者業道義婆沙百十三十六丁問何故名業道業道有何義名思為業思處遊履究竟而轉名為業道問若思名業思所遊履究竟而縛名業道者余善不善一切無記無不皆為思所遊履究竟而轉一切皆應說名業道有何殊勝不共因緣惟說此十以為業道此是世尊有余師之說大師觀彼所化有情心行願條蕳略而說乃至廣說十業道中前七業及業道後三惟業道非業論十七初丁十業道中後三唯道業之道故立業道名佊想應思說名為業彼轉故轉彼行故行加佊㔟力耶造作故前七是業身語業故亦業之道思所遊故由能等起身語業思記身語業為境轉故業業之道立業道名故于中言業道者具顯業道業業道義𧈧不同類而一為余於世典中俱極成故離殺等七無貪等三立業道名顯此應釋文十遍處等者第四𫨻於中四初列名二釋名三明休境四經法分別論草九六丁婆沙八十五十丁集異門足十九七丁品類足六初丁八四丁正理八十十二丁顯宗四十十三丁周遍等者依論論云周遍觀地水火風青黃赤白及空與識二無邊處於一切處周遍觀察無有間隙故名遍處文又婆沙八十五十丁問何名遍處是何義由二緣故名為遍處一由無間二由廣大由無間者謂純青等勝解作意不相間雜故名無間者謂純青等勝解作意境相無邊故名廣大大德說曰所緣寬廣無有間隙故名遍處文此十遍處界者前八遍處是色界後二遍處是無色界地者前八遍處在第四靜慮第九遍處在空無邊處第十遍處在識無邊處也若辨似勝也婆沙八十五十一丁前八偏所以無貪善根為自性對治貪故兼取相應轉即欲界者以四薀為自性色界者以五薀為自性後二遍處俱以四薀為自性如是名為遍處云云前八以無表乃至大善地法十為性者恐十字下脫得四相三字歟八皆唯有漏者八字恐誤應作十字十皆唯有漏故也此十遍處諸門分別廣如婆沙八十五十一丁十智等者第五𫨻於中三初列名二釋名三約法分別論草六初丁品類足一六丁正理七十三二丁顯宗三十五二丁婆沙百五十七丁百六初丁十智者智義者婆沙七十五十八丁智是决斷義百六三丁定義是智義云云多取瓶等者俗智釋名依論釋論云前有漏智總名世俗智多取瓶等世俗境故文望百六六丁七說中第一說也緣欲界等者法智類智釋名婆沙百六四丁問何故名法智智體是法故名法智云云乃至復次初覺知法故名法智復覺知法故名類智乃至廣說論云法類二種如其次第以欲上界四諦為境文即前法類由等者苦集滅道四智釋名婆沙百六六丁問何故名苦智乃至道智耶緣苦聖諦四行相轉故名苦智乃至緣道聖諦四行相轉故名道智云云知他心等者他心智釋名婆沙百六五丁何故名他心智知他心故名他心智問此亦知他諸心所法何故但名他心智耶以期心故謂修觀者先起意條欲知他心由此意樂復知心時亦知心所如人意條本欲見王後見王時亦見臣等乃至廣說法智類智等者尽智無生智釋名婆娑百二十丁應作是說惟煩惱尽身中起故名為尽智云云有作是說此緣尽故名為尽智云云此十智中性世俗智通三性余九唯善依地俗智在一切地他心智唯依四根本靜慮法智依此四及未至中間余七智依此六地及下三無色依身別者謂他心智依欲色界俱可現前法智但依欲界現起余八智現起通依三界身也十力等者第六𫨻于中二初列名辨相二經法分別論草七初丁姣卅十四丁正理七十五初丁顯宗論卅六十六丁十力者力義婆沙卅十四丁問何故名力力是何義不可屈義是力義不可伏義不可摧義不可害義不可轉義不可覆義能遍覺義能荷擔義堅固義最勝義能制他義是是義文論云何故名力以於一切所知境中智無礙轉故名為力文此十力依地別者第八第九依四靜慮余八通依十一地起欲四靜慮未至中間并四無色名十一地依身別者皆依瞻部男佛身也謂但緣漏尽為境等者漏尽滅也余文可知且為初學等者第二流通分也廣如別録者指俱舍記也明治六癸酉初秋於西亰録
